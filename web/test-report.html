  /* ---------- mobile in-place zoom (上半图区内双击/捏合/拖动,不进黑屏) ---------- */
  // 上半 sticky 图区作为缩放视口:img 用 transform translate(x,y) scale(s),origin 0 0。
  // 下半信息区(评分/结论/评语)完全不受影响、始终可滚动可操作。
  var MZ = {
    el: null,        // 图区容器 .mimg
    img: null,       // <img>
    s: 1, x: 0, y: 0,
    minS: 1, maxS: 5,
    dragging: false,
    lastX: 0, lastY: 0,
    // pinch
    pinch: false, startDist: 0, startS: 1, pinchMidX: 0, pinchMidY: 0, pinchImgX: 0, pinchImgY: 0,
    // double-tap detect
    lastTapTime: 0, lastTapX: 0, lastTapY: 0,
    moved: false
  };
  function mzApply(animate){
    if (!MZ.img) return;
    MZ.img.classList.toggle('zanim', !!animate);
    MZ.img.style.transform = 'translate('+MZ.x+'px,'+MZ.y+'px) scale('+MZ.s+')';
  }
  function mzReset(animate){
    MZ.s = 1; MZ.x = 0; MZ.y = 0;
    mzApply(animate);
  }
  function mzClamp(){
    // 限制平移,确保图不被拖出视口太多(放大态图比容器大,允许在差值范围内平移)
    if (!MZ.el || !MZ.img) return;
    var cw = MZ.el.clientWidth, ch = MZ.el.clientHeight;
    var iw = MZ.img.clientWidth * MZ.s, ih = MZ.img.clientHeight * MZ.s;
    // x 范围:[cw-iw, 0](当 iw>cw);否则居中(0)
    var minX = Math.min(0, cw - iw), maxX = 0;
    var minY = Math.min(0, ch - ih), maxY = 0;
    if (iw <= cw){ MZ.x = (cw - iw)/2; } else { MZ.x = Math.max(minX, Math.min(maxX, MZ.x)); }
    if (ih <= ch){ MZ.y = (ch - ih)/2; } else { MZ.y = Math.max(minY, Math.min(maxY, MZ.y)); }
  }
  // 以视口内 (px,py) 为锚点缩放到 ns
  function mzZoomTo(ns, px, py, animate){
    ns = Math.max(MZ.minS, Math.min(MZ.maxS, ns));
    // 锚点在图坐标(scale 前):(px - x)/s
    var ix = (px - MZ.x) / MZ.s;
    var iy = (py - MZ.y) / MZ.s;
    MZ.s = ns;
    MZ.x = px - ix * MZ.s;
    MZ.y = py - iy * MZ.s;
    mzClamp();
    mzApply(animate);
  }
  function mzDistance(t1, t2){
    var dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function mzLocal(clientX, clientY){
    var r = MZ.el.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top };
  }
  function mzOnTouchStart(e){
    if (!MZ.img) return;
    if (e.touches.length === 2){
      MZ.pinch = true; MZ.dragging = false;
      MZ.startDist = mzDistance(e.touches[0], e.touches[1]);
      MZ.startS = MZ.s;
      var mid = mzLocal((e.touches[0].clientX+e.touches[1].clientX)/2,
                        (e.touches[0].clientY+e.touches[1].clientY)/2);
      MZ.pinchMidX = mid.x; MZ.pinchMidY = mid.y;
      MZ.pinchImgX = (mid.x - MZ.x) / MZ.s;
      MZ.pinchImgY = (mid.y - MZ.y) / MZ.s;
      e.preventDefault();
    } else if (e.touches.length === 1){
      var p = mzLocal(e.touches[0].clientX, e.touches[0].clientY);
      MZ.dragging = MZ.s > 1; // 放大态才允许单指拖动平移
      MZ.lastX = e.touches[0].clientX; MZ.lastY = e.touches[0].clientY;
      MZ.moved = false;
      // double-tap detect
      var now = Date.now();
      var dt = now - MZ.lastTapTime;
      var near = Math.abs(p.x - MZ.lastTapX) < 30 && Math.abs(p.y - MZ.lastTapY) < 30;
      MZ._pendingTap = { time: now, x: p.x, y: p.y, isDouble: (dt < 300 && near) };
      if (MZ.dragging) e.preventDefault();
    }
  }
  function mzOnTouchMove(e){
    if (!MZ.img) return;
    if (MZ.pinch && e.touches.length === 2){
      var d = mzDistance(e.touches[0], e.touches[1]);
      var ratio = d / (MZ.startDist || d);
      var ns = Math.max(MZ.minS, Math.min(MZ.maxS, MZ.startS * ratio));
      MZ.s = ns;
      MZ.x = MZ.pinchMidX - MZ.pinchImgX * MZ.s;
      MZ.y = MZ.pinchMidY - MZ.pinchImgY * MZ.s;
      mzClamp();
      mzApply(false);
      MZ.moved = true;
      e.preventDefault();
    } else if (MZ.dragging && e.touches.length === 1){
      var dx = e.touches[0].clientX - MZ.lastX;
      var dy = e.touches[0].clientY - MZ.lastY;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) MZ.moved = true;
      MZ.x += dx; MZ.y += dy;
      MZ.lastX = e.touches[0].clientX; MZ.lastY = e.touches[0].clientY;
      mzClamp();
      mzApply(false);
      e.preventDefault();
    }
  }
  function mzOnTouchEnd(e){
    if (!MZ.img) return;
    if (MZ.pinch && e.touches.length < 2){
      MZ.pinch = false;
      if (MZ.s <= 1.02) mzReset(true);
      return;
    }
    // 单指抬起:若是 tap(没移动)→ 处理双击缩放
    if (!MZ.moved && MZ._pendingTap){
      var t = MZ._pendingTap;
      if (t.isDouble){
        if (MZ.s > 1.05) mzReset(true);            // 已放大 → 还原
        else mzZoomTo(2.5, t.x, t.y, true);        // 以点击点为中心放大
        MZ.lastTapTime = 0; // 消费掉,避免三连
      } else {
        MZ.lastTapTime = t.time; MZ.lastTapX = t.x; MZ.lastTapY = t.y;
      }
    }
    MZ.dragging = false;
    MZ._pendingTap = null;
  }
  // 绑定到当前图区(每次 renderModal 重建 img 后调用)
  function mzAttach(el, img){
    MZ.el = el; MZ.img = img;
    mzReset(false);
    if (img && !img._mzBound){
      img._mzBound = true; // 监听挂在容器上,img 重建时容器不变,故标记容器即可
    }
  }
  // 容器级监听只绑一次(容器 #m-imgwrap 不随 renderModal 重建)
  function mzBindContainerOnce(){
    var el = document.getElementById('m-imgwrap');
    if (!el || el._mzBound) return;
    el._mzBound = true;
    el.addEventListener('touchstart', mzOnTouchStart, { passive:false });
    el.addEventListener('touchmove', mzOnTouchMove, { passive:false });
    el.addEventListener('touchend', mzOnTouchEnd, { passive:false });
    el.addEventListener('touchcancel', mzOnTouchEnd, { passive:false });
  }
  // 桌面 modal 放大态(.zoomed):鼠标按下+拖动 → 通过 .mimg 滚动偏移平移图片。绑一次。
  function mimgBindDragOnce(){
    var el = document.getElementById('m-imgwrap');
    if (!el || el._panBound) return;
    el._panBound = true;
    var d = { on:false, sx:0, sy:0, sl:0, st:0 };
    el.addEventListener('mousedown', function(e){
      var img = document.getElementById('m-bigimg');
      if (isMobileViewport() || !img || !img.classList.contains('zoomed')) return;
      d.on = true; el._panMoved = false;
      d.sx = e.clientX; d.sy = e.clientY; d.sl = el.scrollLeft; d.st = el.scrollTop;
      el.classList.add('grabbing');
      e.preventDefault();
    });
    window.addEventListener('mousemove', function(e){
      if (!d.on) return;
      var dx = e.clientX - d.sx, dy = e.clientY - d.sy;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) el._panMoved = true;
      el.scrollLeft = d.sl - dx;
      el.scrollTop  = d.st - dy;
    });
    window.addEventListener('mouseup', function(){
      if (!d.on) return;
      d.on = false; el.classList.remove('grabbing');
    });
  }

  function renderModal(){
    var m = MODULES[modalIndex];
    var bids = modBranchIds(m);
    // 守卫:当前 modalBranch 不在该模块 → 回主线
    if (bids.indexOf(modalBranch) === -1) modalBranch = MAIN_BRANCH;

    document.getElementById('m-num').textContent = '#' + m.id;
    document.getElementById('m-name').textContent = m.name;
    document.getElementById('m-en').textContent = m.desc || m.en;

    // 当前分支下该轮是否存在;不存在则切到该分支最新有数据的轮
    function branchHasRound(bid, rid){ return !!modBranchRound(m, bid, rid); }
    if (!branchHasRound(modalBranch, modalRound)){
      var brr = branchReadyRounds(m, modalBranch);
      modalRound = brr.length ? brr[brr.length-1].id : modalRound;
    }

    // 复制定位信息 + 备份/还原
    var mcp = document.getElementById('m-copy');
    if (mcp) mcp.onclick = function(){ copyText(caseInfo(m, modalBranch, modalRound), mcp); };
    var mbk = document.getElementById('m-backup');
    if (mbk){
      var bk = backupForBranch(m, modalBranch);
      mbk.className = 'mbackup' + (bk ? ' has' : ' none');
      mbk.innerHTML = bk
        ? '💾 备份 <code>'+esc(bk.file)+'</code> @ '+esc(bk.env||bk.instance||'')+' · '+esc(bk.date||'')+(bk.note?(' · '+esc(bk.note)):'')+
          ' <button class="bkrestore" id="m-bkcopy" title="复制还原命令">复制还原命令</button>'
        : '<span class="nobk">⚠ 本分支无备份(搭建前/后未存档,无法还原追溯)</span>';
      var bc = document.getElementById('m-bkcopy');
      if (bc) bc.onclick = function(){ copyText('nb api backup restore --filename '+bk.file+' -e '+bk.env+' --yes', bc); };
    }

    // branch tabs(只有一条分支时隐藏整条)
    var bbox = document.getElementById('m-branch');
    bbox.innerHTML = '';
    if (bids.length > 1){
      bbox.style.display = '';
      var lbl = document.createElement('span');
      lbl.className = 'blabel'; lbl.textContent = '复刻线路:';
      bbox.appendChild(lbl);
      bids.forEach(function(bid){
        var brr = branchReadyRounds(m, bid);
        var bt = document.createElement('button');
        var cls = 'bt';
        if (bid !== MAIN_BRANCH) cls += (branchColorClass(bid)==='blind' ? ' blind' : ' exp');
        if (bid === modalBranch) cls += ' active';
        bt.className = cls;
        var rcount = brr.length ? '<span class="bro">'+esc(brr.length)+'轮</span>' : '';
        bt.innerHTML = esc(branchLabel(m, bid)) + rcount;
        bt.onclick = function(){
          modalBranch = bid;
          // 切分支后,把 round 收敛到该分支有数据的最新一轮
          var rr2 = branchReadyRounds(m, bid);
          if (rr2.length && !modBranchRound(m, bid, modalRound)) modalRound = rr2[rr2.length-1].id;
          renderModal();
        };
        bbox.appendChild(bt);
      });
    } else {
      bbox.style.display = 'none';
    }

    var rd = modBranchRound(m, modalBranch, modalRound);

    // round tabs inside modal:**只列当前所选分支实际有数据的轮次**(ROUNDS 顺序),
    // 不再把全局 r1/r2/r3 都铺出来。盲测线只有 r1 → 只显「第一次」;该分支以后加 r2 → 自动多出。
    // label 用全局 ROUNDS[].label(第一次生成/第二次生成…);不挂日期,改挂该轮在当前线下的用例数(· N)。
    // 单个用例的真实搭建日期在下方「🗓 搭建于」行另外显示,这里不重复挂日期。
    var rbox = document.getElementById('m-round');
    rbox.innerHTML = '';
    ROUNDS.forEach(function(r){
      if (!modBranchRound(m, modalBranch, r.id)) return; // 该分支没这轮 → 不列
      var ready = roundReady(r);
      var hasData = hasRoundData(modBranchRound(m, modalBranch, r.id));
      var b = document.createElement('button');
      var clickable = ready;
      b.className = 'rt' + (r.id===modalRound?' active':'') + (clickable?'':' disabled');
      var tip = !ready ? '(待补)' : (hasData ? (' · ' + roundCaseCount(r.id, modalBranch)) : '(未涉及)');
      b.textContent = r.label + tip;
      if (clickable) b.onclick = function(){ modalRound = r.id; renderModal(); };
      rbox.appendChild(b);
    });

    // image
    var iw = document.getElementById('m-imgwrap');
    var fszoomBtn = document.getElementById('m-fszoom');
    if (rd && rd.image){
      iw.innerHTML = '<img src="'+esc(rd.image)+'" alt="'+esc(m.name)+'" id="m-bigimg">';
      var img = document.getElementById('m-bigimg');
      // 桌面:点图原地放大切换。放大态下 .mimg 溢出 → 可鼠标拖动平移(见 mimgBindDragOnce)。
      img.onclick = function(e){
        if (isMobileViewport()) return;
        if (iw._panMoved){ iw._panMoved = false; return; } // 刚拖过不算点击
        img.classList.toggle('zoomed');
        iw.classList.toggle('zoomed-pan', img.classList.contains('zoomed'));
        if (!img.classList.contains('zoomed')){ iw.scrollTop = 0; iw.scrollLeft = 0; }
      };
      // 移动端:绑定图区手势 + 切模块/轮次/分支重置为 1x
      mzBindContainerOnce();
      mimgBindDragOnce();
      iw.classList.remove('zoomed-pan');                 // 换图回到 fit 态
      mzAttach(iw, img);
      // ⛶ 可选入口:仍可进全屏 overlay(供想看全屏的人)
      if (fszoomBtn){
        fszoomBtn.style.display = '';
        fszoomBtn.onclick = function(){ openFullImg(rd.image, m.name); };
      }
    } else {
      var dir = (modalBranch===MAIN_BRANCH) ? 'acceptance-'+esc(modalRound) : 'acceptance-'+esc(modalBranch)+'-'+esc(modalRound);
      iw.innerHTML = '<div class="imgplaceholder">⏳ 该轮次对比图待补<br><small style="opacity:.7">放图到 '+dir+'/pair-'+esc(m.id)+'.jpg</small></div>';
      // 无图:重置缩放态 + 隐藏 ⛶
      MZ.el = iw; MZ.img = null; mzReset(false);
      if (fszoomBtn){ fszoomBtn.style.display = 'none'; fszoomBtn.onclick = null; }
    }

    // info column
    var info = document.getElementById('m-info');
    if (!roundReady(roundById(modalRound))){
      info.innerHTML = '<div class="empty-round"><div class="big">该轮次尚未开始</div><div>评测数据待补,完成本轮生成后回填 JSON 即可。</div></div>';
      return;
    }

    var html = '';

    // 分支实例信息(baseUrl / note)+ 应用页面/原型 直达链接(点击自动复制)。
    // pageUid 取分支级 branchObj(m,modalBranch).pageUid;**仅主线**可回退模块级 m.pageUid
    // (m.pageUid 是主应用 14220 的页,回退给非主线会拼成跨实例 404)。其它线缺 uid → 只给 baseUrl 根链接。
    // 有 pageUid → 「🔗 应用页面」深链 baseUrl/admin/<uid>;无 pageUid 仍把 baseUrl 本身做成可点链接(指向应用根),不再是死 <code>。
    var meta = branchMeta(m, modalBranch);
    var bObj = branchObj(m, modalBranch) || {};
    var pageUid = bObj.pageUid || (modalBranch === 'main' ? (m.pageUid || '') : '');
    var metaParts = [];
    if (meta.baseUrl){
      var rootUrl = meta.baseUrl.replace(/\/$/, '');
      if (pageUid){
        var pageUrl = rootUrl + '/admin/' + pageUid;
        metaParts.push('<a href="'+esc(pageUrl)+'" target="_blank" onclick="copyLinkFlash(event, this)" style="color:#2563eb;text-decoration:none;">🔗 应用页面 '+esc(pageUrl.replace(/^https?:\/\//,''))+'</a>');
      } else {
        metaParts.push('<a href="'+esc(rootUrl)+'" target="_blank" onclick="copyLinkFlash(event, this)" style="color:#2563eb;text-decoration:none;">🔗 '+esc(rootUrl.replace(/^https?:\/\//,''))+'</a>');
      }
    }
    if (m.proto){
      var protoHuman = m.proto.replace('http://localhost:4321', 'https://kb.mahuan.site');
      metaParts.push('<a href="'+esc(protoHuman)+'" target="_blank" onclick="copyLinkFlash(event, this)" style="color:#2563eb;text-decoration:none;">🎨 原型页</a>');
    }
    if (meta.note) metaParts.push('<span>'+esc(meta.note)+'</span>');
    var bModel = (branchObj(m, modalBranch) || {}).model;
    if (bModel) metaParts.push('<span title="产出模型" style="color:var(--text2);">🤖 '+esc(bModel)+'</span>');
    if (metaParts.length){
      html += '<div class="sec" style="margin-bottom:14px;"><div style="font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:8px;align-items:center;">'+
        '<span style="color:var(--text3);">'+esc(branchLabel(m, modalBranch))+':</span>'+metaParts.join(' · ')+'</div></div>';
    }

    // 本轮(当前分支×轮次)实例备份下载入口 —— 仅当该 round 有 backup 字段时显示。
    // backup.file = 相对路径(如 ./backups/expagents-ds-r1-….nbdata),download 属性直接落本地。
    var bkp = rd && rd.backup;
    if (bkp && bkp.file){
      html += '<div class="sec" style="margin-bottom:14px;">'+
        '<a href="'+esc(bkp.file)+'" download style="color:#2563eb;text-decoration:none;font-size:13px;">'+
        '📦 下载本轮备份 '+esc(bkp.size||'')+(bkp.instance?'(<span style="opacity:.8">'+esc(bkp.instance)+'</span>)':'')+'</a></div>';
    }

    // 搭建时间(🗓):优先用审计记录的真实搭建时刻(start,规范成 YYYY-MM-DD HH:MM);
    // 无审计记录(如 main/design 线)则回退到本轮 library.json rounds[].date(标名「本轮日期」以区分)。
    // build-audit.json 可能缺失 → au 为 null 时静默走 nominal 分支或不显示。
    var au = auditFor(modalBranch, m.id);
    var buildDateHtml = '';
    var auStart = auditStartFull(au);
    if (auStart){
      buildDateHtml = '🗓 搭建于 <b style="font-weight:600;color:var(--text2);">'+esc(auStart)+'</b>';
    } else {
      var rObj = roundById(modalRound);
      if (rObj && rObj.date){
        buildDateHtml = '🗓 本轮日期 <b style="font-weight:600;color:var(--text2);">'+esc(rObj.date)+'</b>';
      }
    }
    if (buildDateHtml){
      html += '<div class="sec" style="margin-bottom:14px;"><div style="font-size:12px;color:var(--text3);">'+buildDateHtml+'</div></div>';
    }

    // 本分支×本模块的搭建审计(成本/时长/调用/错误/自评/产出规模)——有记录才显示。
    // 审计按"线+模块"维度(每会话一次性 r1 搭建),与轮次无关,故全轮共享展示。
    if (au){
      var estTag = (au.engine==='claude') ? '<span title="估算" style="color:var(--text3)">~</span>' : '';
      var chips = [];
      chips.push('<span class="ac">💰 <b>$'+money(au.cost_usd)+estTag+'</b></span>');
      chips.push('<span class="ac">⏱ <b>'+num(au.minutes)+'</b>min</span>');
      chips.push('<span class="ac">🔁 <b>'+num(au.llm_calls)+'</b> 轮</span>');
      chips.push('<span class="ac">🛠 <b>'+num(au.tool_calls)+'</b> 工具</span>');
      chips.push('<span class="ac">⚠️ <b>'+Math.round((Number(au.err_rate)||0)*100)+'%</b> 错误</span>');
      if (au.self_score!=null) chips.push('<span class="ac">⭐ 自评 <b>'+num(au.self_score)+'</b>/10</span>');
      if (au.out_collections) chips.push('<span class="ac">📦 <b>'+num(au.out_collections)+'</b> 表 / <b>'+num(au.out_fields)+'</b> 字段</span>');
      html += '<div class="sec"><div class="sectitle"><span class="ico">🏗️</span>本线搭建审计 <span style="font-size:11px;color:var(--text3);font-weight:400">('+esc(au.engine)+' · '+esc(au.model)+')</span></div>'+
        '<div class="audit-chips">'+chips.join('')+'</div></div>';
    }

    // 最终结论徽章(综合:用户 verdict(本分支) > 该分支 JSON 记录 verdict(AI 建议) > 待评审)
    // 自动 supersede:被更晚轮次取代的早轮 → 显「已整改(→下一轮)」,无需用户在此轮评分。
    var fcb = branchConclusion(m, modalBranch, modalRound);
    var superseded = isSuperseded(m, modalRound, modalBranch);
    if (superseded && fcb.src !== 'user'){
      html += '<div class="sec"><span class="badge superseded" style="font-size:13px;padding:3px 12px;">✓ 结论:已整改(→下一轮)</span> <span style="font-size:12px;color:var(--text3);">该轮已被更晚轮次取代,无需在此轮评分;请在最新一轮评审。</span></div>';
    } else if (fcb.verdict === 'review'){
      html += '<div class="sec"><span class="badge review" style="font-size:13px;padding:3px 12px;">⏳ 结论:待评审</span></div>';
    } else {
      var fvb = VERDICT[fcb.verdict];
      var srcTxtb = fcb.src==='user' ? '(用户)' : fcb.src==='ai' ? '(AI 建议)' : '';
      html += '<div class="sec"><span class="badge '+fvb.cls+(fcb.src==='ai'?' ai':'')+'" style="font-size:13px;padding:3px 12px;">'+fvb.icon+' 结论:'+fvb.label+srcTxtb+'</span></div>';
    }

    // 历史用户评价原文(来自 JSON userNote;只读展示)
    var jsonNote = rd ? (rd.userNote||'') : '';
    if (jsonNote){
      html += '<div class="sec"><div class="sectitle"><span class="ico">💬</span>用户评价原文(历史)</div>';
      html += '<div class="quote">'+esc(jsonNote)+'</div></div>';
    }

    // 标准提示词:默认用模块级 m.prompt(同原型各线共用);若该轮/线自带 rd.prompt 则覆盖(本线自定义提示词)。
    var stdPrompt = (rd && rd.prompt) || (m && m.prompt);
    if (stdPrompt){
      var promptHtml = esc(stdPrompt).replace(/(https?:\/\/[^\s]+)/,
        '<a href="$1" target="_blank" rel="noopener" style="color:var(--primary);">$1</a>');
      var _ovr = !!(rd && rd.prompt);
      html += '<div class="sec"><div class="sectitle"><span class="ico">📝</span>提示词 · Prompt'+(_ovr?'(本线自定义·覆盖标准)':'(标准·可公开)')+'</div>'+
        '<div class="prompt-pre" style="cursor:auto;">'+promptHtml+'</div></div>';
    }
    // 实际发出给该线的完整需求(含 skill/前缀/nb-spec/视觉环等 harness 细节,凭证已脱敏)——
    // 给评审看真实输入,避免误以为只用上面那段干净提示词就做出来了。
    if (rd && rd.actualPrompt){
      var afirst = rd.actualPrompt.split('\n')[0];
      html += '<div class="sec"><div class="sectitle"><span class="ico">🔧</span>实际发出 · 本线收到的完整需求(harness,脱敏)</div>'+
        '<details class="prompt-d"><summary>'+esc(afirst.length>96?afirst.slice(0,96)+'…':afirst)+'</summary>'+
        '<pre class="prompt-pre">'+esc(rd.actualPrompt)+'</pre></details></div>';
    }

    // ai reasoning
    html += '<div class="sec"><div class="sectitle"><span class="ico">🤖</span>AI 推理过程 / 做法说明</div>';
    var reasoning = (rd && rd.reasoning && rd.reasoning.length) ? rd.reasoning : null;
    if (reasoning){
      html += '<div class="reason">' + reasoning.map(function(p){ return '<p>'+esc(p)+'</p>'; }).join('') + '</div>';
    } else { html += '<div class="todo-pill">待补</div>'; }
    html += '</div>';

    // ai score
    html += '<div class="sec"><div class="sectitle"><span class="ico">⭐</span>AI 自评分</div>';
    if (rd && rd.aiScore!==null && rd.aiScore!==undefined){
      var pct = (rd.aiScore/10*100);
      html += '<div class="scorebox"><div class="scoreline">'+
        '<span class="big ai">'+rd.aiScore+'</span><span class="of">/ 10</span>'+
        '<div class="scorebar-track"><div class="scorebar-fill ai" style="width:'+pct+'%"></div></div>'+
        '</div></div>';
    } else { html += '<div class="todo-pill">待补</div>'; }
    html += '</div>';

    // 非主线分支提示一行(评分仍开放,只是说明这是哪条线的评审)
    if (modalBranch !== MAIN_BRANCH){
      html += '<div class="sec" style="margin-bottom:14px;"><div class="exp-readonly">正在评审 <b>'+esc(branchLabel(m, modalBranch))+'</b>(实验线)。评分/结论/评语按分支独立保存;当前状态视图与汇总仍以主应用线为生命周期主轴。</div></div>';
    }

    // user score (interactive) —— 任意分支可用,读写都带 modalBranch
    var us = getUserScore(m, modalRound, modalBranch);
    html += '<div class="sec"><div class="sectitle"><span class="ico">👤</span>用户评分(可点选 0–10)</div>';
    html += '<div class="scorebox">';
    var curBig = (us.val!==null) ? '<span class="big usr">'+us.val+'</span><span class="of">/ 10</span>' :
                                   '<span class="big usr" style="color:var(--text3)">—</span><span class="of">/ 10</span>';
    var curPct = (us.val!==null) ? (us.val/10*100) : 0;
    html += '<div class="scoreline">'+curBig+
      '<div class="scorebar-track"><div class="scorebar-fill usr" style="width:'+curPct+'%"></div></div></div>';
    html += '<div class="rate" id="rate-row">';
    for (var s=0; s<=10; s++){
      html += '<div class="dot'+(us.val===s?' on':'')+'" data-score="'+s+'">'+s+'</div>';
    }
    html += '</div>';
    var srcLabel = us.src==='server' ? '<span class="src server">已落盘</span>' :
                   us.src==='local'  ? '<span class="src local">本地已存</span>' :
                   us.src==='json'   ? '<span class="src">JSON 默认</span>' :
                                       '<span class="src">未评分</span>';
    html += '<div class="rate-meta">'+srcLabel;
    html += '<span class="sync-badge" id="rate-sync" style="display:none"></span>';
    if (us.src==='server' || us.src==='local') html += '<button class="clearbtn" id="rate-clear">清除评分</button>';
    html += '</div>';
    html += '</div></div>';

    // 评审结论(按钮组 + 评语)—— 任意分支可用
    var uvObj = getUserVerdict(m, modalRound, modalBranch);
    var uv = uvObj.val;
    var noteObj = getUserNote(m, modalRound, modalBranch);
    html += '<div class="sec"><div class="sectitle"><span class="ico">⚖️</span>评审结论</div>';
    html += '<div class="scorebox">';
    html += '<div class="verdict-group" id="verdict-group">';
    ['pass','fix','redo'].forEach(function(k){
      var vv = VERDICT[k];
      html += '<button class="vbtn '+k+(uv===k?' on':'')+'" data-verdict="'+k+'">'+vv.icon+' '+vv.label+'</button>';
    });
    html += '</div>';
    html += '<textarea class="note-input" id="note-input" placeholder="评语(可选,需修时写改进点)">'+esc(noteObj.val||'')+'</textarea>';
    var vsrc = '';
    if (uvObj.src==='server') vsrc = '<span class="tag server">已落盘</span>';
    else if (uvObj.src==='local') vsrc = '<span class="tag">本地已存</span>';
    else { var av = aiVerdict(m, modalRound, modalBranch); vsrc = av ? '<span class="tag ai">AI 建议:'+VERDICT[av].label+'</span>' : '<span class="tag">待评审</span>'; }
    html += '<div class="verdict-src">'+vsrc+' <span class="sync-badge" id="verdict-sync" style="display:none"></span></div>';
    html += '</div></div>';

    info.innerHTML = html;

    // 闭包锁定当前分支(避免后续切分支后回调错位)
    var BR = modalBranch;

    // wire rate dots
    var row = document.getElementById('rate-row');
    if (row){
      row.querySelectorAll('.dot').forEach(function(d){
        d.onclick = function(){
          var sc = Number(d.getAttribute('data-score'));
          // 乐观更新:本地兜底先写,UI 立即刷新
          localStorage.setItem(lsKey(m.id, modalRound, BR), String(sc));
          optimisticSet(modalRound, m.id, { score: sc }, BR);
          renderModal();   // refresh modal
          renderSummary(); // refresh page summary avg
          renderGrid();    // refresh card score
          syncPatch(m.id, modalRound, { score: sc }, 'rate-sync', BR);
        };
      });
    }
    var clr = document.getElementById('rate-clear');
    if (clr){
      clr.onclick = function(){
        localStorage.removeItem(lsKey(m.id, modalRound, BR));
        optimisticSet(modalRound, m.id, { score: null }, BR);
        renderModal(); renderSummary(); renderGrid();
        syncPatch(m.id, modalRound, { score: null }, 'rate-sync', BR);
      };
    }

    // wire verdict buttons:点结论 → 连同当前评语一起提交
    var vg = document.getElementById('verdict-group');
    if (vg){
      vg.querySelectorAll('.vbtn').forEach(function(btn){
        btn.onclick = function(){
          var k = btn.getAttribute('data-verdict');
          var cur = getUserVerdict(m, modalRound, BR).val;
          var nextV = (cur === k) ? null : k; // 再点一次取消(回到待评审)
          var noteEl = document.getElementById('note-input');
          var noteVal = noteEl ? noteEl.value : '';
          // 本地兜底
          if (nextV) localStorage.setItem(lsVerdictKey(m.id, modalRound, BR), nextV);
          else localStorage.removeItem(lsVerdictKey(m.id, modalRound, BR));
          localStorage.setItem(lsNoteKey(m.id, modalRound, BR), noteVal);
          optimisticSet(modalRound, m.id, { verdict: nextV, note: noteVal }, BR);
          renderModal(); renderSummary(); renderGrid();
          syncPatch(m.id, modalRound, { verdict: nextV, note: noteVal }, 'verdict-sync', BR);
        };
      });
    }
    // wire note input:失焦提交评语(不改结论)
    var ni = document.getElementById('note-input');
    if (ni){
      ni.onblur = function(){
        var noteVal = ni.value;
        var prev = getUserNote(m, modalRound, BR).val || '';
        if (noteVal === prev) return; // 无变化不提交
        localStorage.setItem(lsNoteKey(m.id, modalRound, BR), noteVal);
        optimisticSet(modalRound, m.id, { note: noteVal }, BR);
        syncPatch(m.id, modalRound, { note: noteVal }, 'verdict-sync', BR);
      };
    }
  }

  // 乐观更新内存里的 SERVER(仅服务端可达时),让重渲染立即反映 —— 分支感知
  function optimisticSet(roundId, modId, patch, branchId){
    if (!(serverReachable && SERVER)) return;
    branchId = branchId || MAIN_BRANCH;
    SERVER[branchId] = SERVER[branchId] || {};
    SERVER[branchId][roundId] = SERVER[branchId][roundId] || {};
    var e = SERVER[branchId][roundId][modId] || {};
    if ('score' in patch){ if (patch.score===null) delete e.score; else e.score = patch.score; }
    if ('verdict' in patch){ if (!patch.verdict) delete e.verdict; else e.verdict = patch.verdict; }
    if ('note' in patch){ if (!patch.note) delete e.note; else e.note = patch.note; }
    if (e.score===undefined && e.verdict===undefined && (e.note===undefined||e.note==='')){
      delete SERVER[branchId][roundId][modId];
      if (Object.keys(SERVER[branchId][roundId]).length===0) delete SERVER[branchId][roundId];
      if (Object.keys(SERVER[branchId]).length===0) delete SERVER[branchId];
    } else {
      SERVER[branchId][roundId][modId] = e;
    }
  }

  // 把部分更新推送到服务端,并在指定徽章上显示同步状态(不打断)—— 分支感知
  function syncPatch(modId, roundId, patch, badgeId, branchId){
    function setBadge(cls, txt){
      var b = document.getElementById(badgeId);
      if (!b) return; // modal 可能已重渲染
      b.style.display='';
      b.className = 'sync-badge ' + cls;
      b.textContent = txt;
    }
    setBadge('saving', '同步中…');
    postPatch(roundId, modId, patch, branchId || MAIN_BRANCH).then(function(){
      setBadge('synced', '已同步 ✓');
    }).catch(function(){
      serverReachable = false;
      setBadge('localonly', '仅本地');
    });
  }

  /* ---------- EXPORT ---------- */
  // 导出分支感知结构 { branch: { round: { module: {score?,verdict?,note?} } } }
  function buildExport(){
    // 收集所有出现过的分支 id(各模块声明分支的并集)
    var brSet = {};
    MODULES.forEach(function(m){ modBranchIds(m).forEach(function(b){ brSet[b]=1; }); });
    var branchIds = Object.keys(brSet);
    if (branchIds.indexOf(MAIN_BRANCH) === -1) branchIds.unshift(MAIN_BRANCH);

    var out = {};
    branchIds.forEach(function(bid){
      ROUNDS.forEach(function(r){
        MODULES.forEach(function(m){
          var entry = {};
          // 分数
          var val = null;
          if (serverReachable){ var sv = srvGet(m.id, r.id, bid); if (sv !== null) val = sv; }
          else { var v = localStorage.getItem(lsKey(m.id, r.id, bid)); if (v !== null && v !== '') val = Number(v); }
          if (val !== null) entry.score = val;
          // 结论
          var verdict = null;
          if (serverReachable){ verdict = srvVerdict(m.id, r.id, bid); }
          else { var lv = localStorage.getItem(lsVerdictKey(m.id, r.id, bid)); if (lv==='pass'||lv==='fix'||lv==='redo') verdict = lv; }
          if (verdict) entry.verdict = verdict;
          // 评语
          var note = null;
          if (serverReachable){ note = srvNote(m.id, r.id, bid); }
          else { var ln = localStorage.getItem(lsNoteKey(m.id, r.id, bid)); if (ln !== null && ln !== '') note = ln; }
          if (note) entry.note = note;

          if (Object.keys(entry).length){
            out[bid] = out[bid] || {};
            out[bid][r.id] = out[bid][r.id] || {};
            out[bid][r.id][m.id] = entry;
          }
        });
      });
    });
    if (Object.keys(out).length === 0){
      return '// 暂无评审记录。在模块详情里打分 / 点结论 / 写评语后再导出。\n{}';
    }
    return JSON.stringify(out, null, 2);
  }
  function openExport(){
    document.getElementById('exp-text').value = buildExport();
    var s = document.getElementById('exp-sync');
    if (s){
      if (serverReachable){
        s.innerHTML = '<span class="sync-badge synced">已落盘 ✓</span> 评审记录(分数/结论/评语)已写入仓库 <code>user-scores.json</code>,导出仅作备份。';
      } else {
        s.innerHTML = '<span class="sync-badge localonly">仅本地</span> 服务端不可达,评审记录仅存浏览器 localStorage,请用本导出手动固化。';
      }
    }
    document.getElementById('exp-overlay').classList.add('open');
  }
  function closeExport(){ document.getElementById('exp-overlay').classList.remove('open'); }

  /* ---------- util ---------- */
  function esc(s){
    if (s===null||s===undefined) return '';
    return String(s).replace(/[&<>"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }

  /* ---------- events ---------- */
  document.getElementById('m-close').onclick = closeModal;
  document.getElementById('m-prev').onclick = function(){ navModal(-1); };
  document.getElementById('m-next').onclick = function(){ navModal(1); };
  document.getElementById('m-prev-fab').onclick = function(){ navModal(-1); };
  document.getElementById('m-next-fab').onclick = function(){ navModal(1); };
  document.getElementById('fullimg-close').onclick = closeFullImg;
  document.getElementById('fullimg-fs').onclick = function(e){ e.stopPropagation(); toggleFullimgFullscreen(); };
  (function wireFullImgViewer(){
    var sc = document.getElementById('fullimg-scroll');
    if (!sc) return;
    var drag = { on:false, moved:false, sx:0, sy:0, sl:0, st:0 };
    // 点图:放大 ↔ 还原(以点击点为中心保持视觉锚点);点空白关闭
    sc.addEventListener('click', function(e){
      if (drag.moved){ drag.moved = false; return; }            // 刚拖过 → 不当点击
      var img = sc.querySelector('img');
      if (!img || e.target !== img){ closeFullImg(); return; }   // 点图外空白 → 关闭
      var r = sc.getBoundingClientRect();
      var fx = (sc.scrollLeft + (e.clientX - r.left)) ; // 当前内容坐标(fit 态下= viewport)
      if (sc.classList.contains('zoomed')){
        sc.classList.remove('zoomed');
        sc.scrollTop = 0; sc.scrollLeft = 0;
      } else {
        // 记录点击在图上的相对位置,放大后把该点滚到鼠标处
        var relX = (sc.scrollLeft + (e.clientX - r.left)) / Math.max(1, img.clientWidth);
        var relY = (sc.scrollTop + (e.clientY - r.top)) / Math.max(1, img.clientHeight);
        sc.classList.add('zoomed');
        // 放大后图尺寸变化 → 用 rAF 等布局完成再定位
        requestAnimationFrame(function(){
          sc.scrollLeft = relX * img.clientWidth - (e.clientX - r.left);
          sc.scrollTop  = relY * img.clientHeight - (e.clientY - r.top);
        });
      }
    });
    // 桌面鼠标拖动平移(放大态下)——通过滚动偏移实现,free-pan
    sc.addEventListener('mousedown', function(e){
      if (!sc.classList.contains('zoomed')) return;
      drag.on = true; drag.moved = false;
      drag.sx = e.clientX; drag.sy = e.clientY;
      drag.sl = sc.scrollLeft; drag.st = sc.scrollTop;
      sc.classList.add('grabbing');
      e.preventDefault();
    });
    window.addEventListener('mousemove', function(e){
      if (!drag.on) return;
      var dx = e.clientX - drag.sx, dy = e.clientY - drag.sy;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
      sc.scrollLeft = drag.sl - dx;
      sc.scrollTop  = drag.st - dy;
    });
    window.addEventListener('mouseup', function(){
      if (!drag.on) return;
      drag.on = false; sc.classList.remove('grabbing');
    });
  })();
  document.getElementById('overlay').addEventListener('click', function(e){
    if (e.target === this) closeModal();
  });
  document.getElementById('export-btn').onclick = openExport;
  document.getElementById('exp-close').onclick = closeExport;
  document.getElementById('exp-ok').onclick = closeExport;
  document.getElementById('exp-overlay').addEventListener('click', function(e){
    if (e.target === this) closeExport();
  });
  document.getElementById('exp-copy').onclick = function(){
    var ta = document.getElementById('exp-text');
    ta.select();
    try { document.execCommand('copy'); this.textContent='已复制'; var b=this; setTimeout(function(){b.textContent='复制';},1200);} catch(e){}
  };
  document.getElementById('back-btn').onclick = function(){ location.href='index.html'; };

  document.addEventListener('keydown', function(e){
    if (document.getElementById('fullimg-overlay').classList.contains('open')){
      if (e.key==='Escape') closeFullImg();
      return;
    }
    if (document.getElementById('exp-overlay').classList.contains('open')){
      if (e.key==='Escape') closeExport();
      return;
    }
    if (!document.getElementById('overlay').classList.contains('open')) return;
    if (e.key==='Escape') closeModal();
    else if (e.key==='ArrowLeft') navModal(-1);
    else if (e.key==='ArrowRight') navModal(1);
  });

  /* ---------- boot ---------- */
  function applyData(d){
    DATA = d;
    ROUNDS = DATA.rounds || [];
    // 测试报告只展示已测模块(有 branches);未测模块仅存在于示例库画廊;废弃模块(status=deprecated)排除
    MODULES = (DATA.modules || []).filter(function(m){
      return m.status !== 'deprecated' && m.branches && Object.keys(m.branches).length > 0;
    });
    // skill 版本:MODULES 到手才能算;只在首次设默认(最新版本),不覆盖用户已切的版本
    BACKUPS = {};
    (DATA.backups || []).forEach(function(b){ if (b && b.id) BACKUPS[b.id] = b; });
    var _firstVer = (SKILL_VERSIONS.length === 0);
    SKILL_VERSIONS = allSkillVersions();
    _GBL = null;  // 失效线缓存(版本集变了)
    // 默认「全部版本」:这是所有测试报告的总入口,每条线(含 Qwen/bench)都应一打开就可见,不默认藏到某个 skill 版本里
    if (_firstVer) filterSkillVersion = ALL_VERSIONS;
  }
  // 搭建审计独立 fetch:到手即重渲染,失败静默(不阻塞评审主流程)
  // 审计数据仅供 modal 内 per-module chips(聚合仪表盘已移到 dashboard.html)
  fetch('build-audit.json').then(function(r){ return r.ok ? r.json() : null; }).then(function(a){
    if (a){ AUDIT = a; if (document.getElementById('overlay').classList.contains('open')) renderModal(); }
  }).catch(function(){ /* 审计缺失不影响报告 */ });

  fetch('library.json').then(function(r){ return r.json(); }).then(function(d){
    applyData(d);
    renderAll(); // 先用 JSON/本地兜底渲染,避免等待网络
    fetchServerScores().then(function(){
      renderAll(); // 服务端到手后用权威分数覆盖
    });
  }).catch(function(e){
    var g = document.getElementById('grid');
    if (g) g.innerHTML = '<div style="padding:24px;color:#c0392b">library.json 加载失败: ' + e + '</div>';
  });
})();
</script>
