<script>
(function(){
  "use strict";
  var DATA = { project:{}, reviewer:'', rounds:[], modules:[] };
  var ROUNDS = DATA.rounds;
  var MODULES = DATA.modules; // 仅含有 branches 的已测模块(boot 时从 library.json 过滤)
  var LS_PREFIX = 'apptest-score:'; // + moduleId + ':' + roundId

  /* ---------- 搭建审计(build-audit.json,scripts/build-audit.py 产出)---------- */
  // 与 library.json 同目录;失败则审计相关 UI 静默不显示(不影响评审主功能)。
  var AUDIT = null;
  // 取某条线某模块的搭建成本/调用/时长记录(line=branch id,mnum=模块号如 "12")
  function auditFor(branchId, moduleId){
    if (!AUDIT || !AUDIT.modules) return null;
    for (var i=0;i<AUDIT.modules.length;i++){
      var a = AUDIT.modules[i];
      if (a.line===branchId && a.mnum===moduleId) return a;
    }
    return null;
  }
  // 防御:audit JSON 独立 fetch,字段可能缺/非数;强转 Number,坏值回退 '—',避免 toFixed 崩 render。
  function money(n){ n=Number(n); if(!isFinite(n)) return '—'; return (n>=1? n.toFixed(2) : n.toFixed(3)); }
  function num(n, d){ n=Number(n); if(!isFinite(n)) return '0'; return (d!=null? n.toFixed(d) : String(n)); }
  // 把审计记录的 start 规范成 "YYYY-MM-DD HH:MM"。start 可能是全格式("2026-06-08 01:23")
  // 也可能缺年份只到 "MM-DD HH:MM"(如 "06-09 17:55"),此时从同记录的 .date 取年份,取不到回退 "2026"。
  function auditStartFull(au){
    if (!au) return '';
    var s = (au.start!=null) ? String(au.start).trim() : '';
    if (!s) return '';
    // 已含 4 位年份前缀 → 原样
    if (/^\d{4}-/.test(s)) return s;
    // 形如 "MM-DD HH:MM" → 从 date 推年份
    var m = /^(\d{1,2}-\d{1,2})(\s.*)?$/.exec(s);
    if (m){
      var yr = '2026';
      if (au.date!=null){
        var dm = /^(\d{4})-/.exec(String(au.date).trim());
        if (dm) yr = dm[1];
      }
      return yr + '-' + s;
    }
    return s; // 未知格式原样(下游 esc)
  }

  /* ---------- 分支(branch)层 ---------- */
  // main = 生产主线(当前状态/汇总/排序的生命周期主轴)。
  // 评分/结论/评语:**所有分支平等开放**(主应用与临时测试实例都可能是测试目标)。
  var MAIN_BRANCH = 'main';
  function branchObj(mod, branchId){ return (mod.branches && mod.branches[branchId]) || null; }
  function branchLabel(mod, branchId){
    var b = branchObj(mod, branchId);
    return (b && b.label) ? b.label : branchId;
  }
  function branchMeta(mod, branchId){
    var b = branchObj(mod, branchId) || {};
    return { baseUrl: b.baseUrl || '', note: b.note || '' };
  }
  // 模块拥有的分支 id 列表(保持 main 在最前,其余按对象声明顺序)
  function modBranchIds(mod){
    if (!mod.branches) return [];
    var ids = Object.keys(mod.branches);
    ids.sort(function(a,b){
      if (a===MAIN_BRANCH) return -1;
      if (b===MAIN_BRANCH) return 1;
      return 0;
    });
    return ids;
  }
  // 全局分支清单(数据驱动):扫所有模块的 branches 键去重,main 优先、其余按首次出现序。
  // 用于筛选栏「线」分段 + modal 分支 tab,新加一条线只改 library.json 即自动出现。
  var _GBL = null, _GBL_key = null;
  function globalBranchList(){
    if (_GBL && _GBL_key === filterSkillVersion) return _GBL;
    var seen = {}, list = [];
    MODULES.forEach(function(m){
      if (!m.branches) return;
      Object.keys(m.branches).forEach(function(k){
        if (k === MAIN_BRANCH || seen[k]) return;
        if (versionActive() && branchSkillVersion(k) !== filterSkillVersion) return;  // skill 版本 scope
        seen[k] = 1; list.push(k);
      });
    });
    // main 只在「全部版本」或 main 自身匹配所选版本时纳入
    var withMain = (!versionActive() || branchSkillVersion(MAIN_BRANCH) === filterSkillVersion);
    _GBL = withMain ? [MAIN_BRANCH].concat(list) : list;
    _GBL_key = filterSkillVersion;
    return _GBL;
  }
  // 某分支 id 的展示 label(取首个拥有它的模块的 branch.label,缺省用 key)
  function globalBranchLabel(branchId){
    if (branchId === MAIN_BRANCH) return '主应用线';
    for (var i=0;i<MODULES.length;i++){
      var b = branchObj(MODULES[i], branchId);
      if (b && b.label) return b.label;
    }
    return branchId;
  }
  // 分支 id → 配色 CSS 类(blind 系=橙,design 系=紫,其余无类=蓝)。用于筛选分段/modal tab/chips。
  function branchColorClass(branchId){
    if (branchId === MAIN_BRANCH) return '';
    if (branchId === 'blind' || branchId.indexOf('blind-') === 0) return 'blind';
    if (branchId === 'design' || branchId.indexOf('design-') === 0) return 'design';
    return '';
  }
  // 「线」筛选两级分组:一级 = MODEL,二级 = 该 model 下的各条线。
  // model 优先取 AUDIT.lines[branchId].model(如 sonnet-4-6 / deepseek-v4-pro / deepseek-v4-flash),
  // 缺省回退 branch id / note 推断。group 顺序固定:Claude → DeepSeek-Pro → DeepSeek-Flash → 其他。
  var MODEL_GROUP_ORDER = ['Claude', 'DeepSeek-Pro', 'DeepSeek-Flash', 'Qwen', '其他'];
  function branchModelGroup(branchId){
    // 1) 显式映射(已知线)
    if (branchId === MAIN_BRANCH || branchId === 'design' || branchId === 'blind') return 'Claude';
    if (branchId === 'blind-dspro') return 'DeepSeek-Pro';
    if (branchId === 'blind-dsflash' || branchId === 'flash-retest') return 'DeepSeek-Flash';
    if (branchId === 'bench' || branchId.indexOf('bench-') === 0 || branchId.indexOf('qwen') >= 0) return 'Qwen';
    // 2) 从 AUDIT.lines[branchId].model 推断
    var model = '';
    if (AUDIT && AUDIT.lines && AUDIT.lines[branchId] && AUDIT.lines[branchId].model){
      model = String(AUDIT.lines[branchId].model).toLowerCase();
    }
    // 3) 回退用 note 文本
    if (!model){
      for (var i=0;i<MODULES.length;i++){
        var b = branchObj(MODULES[i], branchId);
        if (b && b.note){ model = String(b.note).toLowerCase(); break; }
      }
    }
    var hay = (branchId + ' ' + model).toLowerCase();
    if (hay.indexOf('pro') >= 0) return 'DeepSeek-Pro';
    if (hay.indexOf('flash') >= 0) return 'DeepSeek-Flash';
    if (hay.indexOf('deepseek') >= 0 || hay.indexOf('ds') >= 0) return 'DeepSeek-Pro';
    if (hay.indexOf('claude') >= 0 || hay.indexOf('sonnet') >= 0 || hay.indexOf('opus') >= 0) return 'Claude';
    return '其他';
  }
  // 把 globalBranchList() 按 model 分组,返回有序 [{group, branches:[bid,...]}](空组略过)。
  function branchModelGroups(){
    var buckets = {};
    globalBranchList().forEach(function(bid){
      var g = branchModelGroup(bid);
      (buckets[g] = buckets[g] || []).push(bid);
    });
    var out = [];
    MODEL_GROUP_ORDER.forEach(function(g){ if (buckets[g]){ out.push({ group:g, branches:buckets[g] }); delete buckets[g]; } });
    // 兜底:出现未列入固定顺序的 group 名(理论上不会),按出现序追加
    Object.keys(buckets).forEach(function(g){ out.push({ group:g, branches:buckets[g] }); });
    return out;
  }
  // 某分支下的某轮数据
  function modBranchRound(mod, branchId, roundId){
    var b = branchObj(mod, branchId);
    return (b && b.rounds && b.rounds[roundId]) || null;
  }
  // 某分支拥有的(ready)轮次列表
  function branchReadyRounds(mod, branchId){
    var b = branchObj(mod, branchId);
    if (!b || !b.rounds) return [];
    return ROUNDS.filter(function(r){ return roundReady(r) && !!b.rounds[r.id]; });
  }
  // 卡片底部分支 chips HTML;只有 main 一条时返回 ''(不显示)
  // activeBid:当前所选线(高亮对应 chip);null = 不高亮(轮次快照视图)
  function branchChipsHtml(mod, activeBid){
    var ids = modBranchIds(mod);
    if (ids.length <= 1) return '';
    var chips = ids.map(function(bid){
      var rr = branchReadyRounds(mod, bid);
      var suffix;
      if (bid === MAIN_BRANCH){
        // main 显示最新一轮 id(如 R2)
        suffix = rr.length ? rr[rr.length-1].id.toUpperCase() : '';
      } else {
        suffix = rr.length ? (rr.length + '轮') : '';
      }
      var sel = (activeBid && bid === activeBid) ? ' sel' : '';
      // 配色类(blind 系/design 系)+ 原始 bid 类(供细粒度样式),数据驱动新线自动着色
      var ccls = branchColorClass(bid);
      var cls = 'bchip '+esc(bid)+(ccls && ccls!==bid ? ' '+ccls : '')+sel;
      return '<span class="'+cls+'"><span class="bdot"></span>'+esc(branchLabel(mod,bid))+(suffix?' '+esc(suffix):'')+'</span>';
    }).join('');
    return '<div class="branch-chips">'+chips+'</div>';
  }

  /* ---------- server sync (dev API → 落盘 user-scores.json) ---------- */
  var API_URL = '/api/app-library-scores';
  // 服务端权威记录:分支感知 { branch: { round: { module: {score?,verdict?,note?,ts} } } };不可达时为 null
  var SERVER = null;
  var serverReachable = false;
  // 所有 srv*/ls* 都带 branchId,缺省 main(向后兼容旧调用)
  function srvEntry(modId, roundId, branchId){
    if (!SERVER) return null;
    branchId = branchId || MAIN_BRANCH;
    var br = SERVER[branchId]; if (!br) return null;
    var r = br[roundId];
    return (r && r[modId]) ? r[modId] : null;
  }
  function srvGet(modId, roundId, branchId){
    var e = srvEntry(modId, roundId, branchId);
    return (e && typeof e.score === 'number') ? e.score : null;
  }
  function srvVerdict(modId, roundId, branchId){
    var e = srvEntry(modId, roundId, branchId);
    return (e && (e.verdict==='pass'||e.verdict==='fix'||e.verdict==='redo')) ? e.verdict : null;
  }
  function srvNote(modId, roundId, branchId){
    var e = srvEntry(modId, roundId, branchId);
    return (e && typeof e.note === 'string') ? e.note : null;
  }
  function applyServerData(data){
    SERVER = (data && typeof data === 'object') ? data : {};
    serverReachable = true;
  }
  function fetchServerScores(){
    return fetch(API_URL, { headers: { 'Accept':'application/json' } })
      .then(function(res){ if (!res.ok) throw new Error('status '+res.status); return res.json(); })
      .then(function(data){ applyServerData(data); })
      .catch(function(){ serverReachable = false; SERVER = null; });
  }
  // POST 部分更新(score/verdict/note 任意子集;传 null 清除该字段);成功 → 用返回全量覆盖 SERVER
  function postPatch(roundId, modId, patch, branchId){
    var body = { round: roundId, module: modId, branch: branchId || MAIN_BRANCH };
    if ('score' in patch) body.score = patch.score;
    if ('verdict' in patch) body.verdict = patch.verdict;
    if ('note' in patch) body.note = patch.note;
    return fetch(API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    }).then(function(res){ if (!res.ok) throw new Error('status '+res.status); return res.json(); })
      .then(function(data){ applyServerData(data); return true; });
  }

  var VERDICT = {
    pass: { cls:'pass', icon:'✅', label:'通过' },
    fix:  { cls:'fix',  icon:'🔧', label:'需修' },
    redo: { cls:'redo', icon:'🔴', label:'重做' }
  };

  // CURRENT = 「当前状态」生命周期视图;否则是某个轮次快照视图
  var CURRENT_VIEW = '__current__';
  // 当前主视图:默认进「当前状态」
  var activeView = CURRENT_VIEW;

  /* ---------- 「当前状态」视图的多维筛选(仅作用于当前状态视图) ---------- */
  // 线 / branch 筛选:'__all__'(全部线=按 main,现有行为)| 'main' | 'blind' | 'design' | …
  var ALL_BRANCHES = '__all__';
  var filterBranches = [];   // 多选:选中的线 id 数组;空 = 全部线(不筛,封面走 main)
  var _msOpen = false, _msScroll = 0;  // 线多选下拉:展开状态 + 滚动位置(跨 renderAll 保留)
  // 状态筛选:'all' | 'review' | 'fixredo'(需修·重做合并) | 'pass'
  var filterStatus = 'all';
  // 部门筛选:'all' | 具体 tag 值
  var filterDept = 'all';
  // 搜索关键词(cn/en/desc 子串,大小写不敏感)
  var filterSearch = '';

  // ── skill 版本筛选 ───────────────────────────────────────────────
  // 每个分支带 skillVersion(如 'v260605' 归档 / 'v260611' 新)。默认聚焦最新版本,
  // 把旧版本用例从画面排除(排除很多没用的);切「全部版本」恢复旧的全量行为。
  var ALL_VERSIONS = '__allver__';
  function allSkillVersions(){
    var seen = {}, vs = [];
    MODULES.forEach(function(m){ if (!m.branches) return; Object.keys(m.branches).forEach(function(k){
      var v = (m.branches[k] && m.branches[k].skillVersion) || 'v260605';
      if (!seen[v]){ seen[v] = 1; vs.push(v); }
    }); });
    vs.sort(function(a,b){ return a < b ? 1 : (a > b ? -1 : 0); }); // 倒序:最新(数值大)在前
    return vs;
  }
  var SKILL_VERSIONS = [];                // MODULES 异步到手后在 applyData 里填充
  var filterSkillVersion = ALL_VERSIONS;  // applyData 首次设为最新版本
  function versionActive(){ return filterSkillVersion && filterSkillVersion !== ALL_VERSIONS; }
  function branchSkillVersion(bid){
    for (var i=0;i<MODULES.length;i++){ var b = branchObj(MODULES[i], bid); if (b) return b.skillVersion || 'v260605'; }
    return 'v260605';
  }
  // 版本切换后复位:所选线不在该版本范围 → 落到该版本第一条线(无则全部线)
  function normalizeBranchForVersion(){
    if (!versionActive()) return;
    var gl = globalBranchList();
    filterBranches = filterBranches.filter(function(b){ return gl.indexOf(b) >= 0; });  // 丢掉不属于该版本的线;空=全部线
  }
  function skillVersionLabel(v){ return v === ALL_VERSIONS ? '全部版本' : ('skill ' + v); }

  // ── 备份 registry + 用例定位串 + 复制 ──────────────────────────────
  var BACKUPS = {};  // applyData 里从 DATA.backups 填充:{id: {file,env,instance,date,note,...}}
  function backupForBranch(m, branchId){
    var b = branchObj(m, branchId); if (!b || !b.backupId) return null;
    return BACKUPS[b.backupId] || null;
  }
  // 用例唯一定位串(给用户复制后发我,快速定位某个测试用例)
  function caseInfo(m, branchId, roundId){
    var b = branchObj(m, branchId) || {};
    var rd = modBranchRound(m, branchId, roundId) || {};
    var sc = (rd.aiScore!==null && rd.aiScore!==undefined) ? (rd.aiScore+'/10') : '未评';
    var page = b.pageUid ? ((b.baseUrl||'')+'/admin/'+b.pageUid)
             : (branchId===MAIN_BRANCH && m.pageUid ? ((b.baseUrl||'')+'/admin/'+m.pageUid) : '');
    var bk = backupForBranch(m, branchId);
    var L = [
      '#'+m.id+' '+(m.cn||m.name)+(m.desc?(' ('+m.desc+')'):''),
      '分支: '+globalBranchLabel(branchId)+' ['+branchId+']'+(b.skillVersion?(' · '+b.skillVersion):''),
      '轮次: '+(roundId||'')+' · AI '+sc+(rd.verdict?(' · '+rd.verdict):'')+(b.model?(' · '+b.model):'')
    ];
    if (page) L.push('页面: '+page);
    if (bk)   L.push('备份: '+bk.file+' @ '+(bk.env||bk.instance)+'  (还原: nb api backup restore --filename '+bk.file+' -e '+bk.env+' --yes)');
    return L.join('\n');
  }
  // clipboard + 兜底(http/跳板机无 clipboard API 时用 textarea)
  function copyText(str, btn){
    function ok(){ if (btn){ var t=btn.textContent; btn.textContent='✓'; setTimeout(function(){ btn.textContent=t; },900); } }
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(str).then(ok, function(){ fallback(); });
    } else { fallback(); }
    function fallback(){
      try{ var ta=document.createElement('textarea'); ta.value=str; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); ok(); }catch(e){}
    }
  }

  // 线筛选 = 多选(filterBranches 数组)。空数组 = 全部线(不筛、封面走主线)。
  function branchAll(){ return filterBranches.length === 0; }
  function branchSelected(bid){ return filterBranches.indexOf(bid) >= 0; }
  // 网格取数的单一分支:恰好选 1 条非主线 → 那条;0 条(全部)或多条 → 主线(封面/排序走主轴,逐线对比在 modal 内切分支)。
  function viewBranch(){
    return (filterBranches.length === 1 && filterBranches[0] !== MAIN_BRANCH) ? filterBranches[0] : MAIN_BRANCH;
  }
  // 模块是否命中筛选:全部线=恒真;否则拥有任一所选线即可(并集)。
  function modHasViewBranch(mod){
    if (branchAll()) return true;
    return filterBranches.some(function(b){ return !!branchObj(mod, b); });
  }

  // modal state
  var modalIndex = -1;        // 索引进 currentNavList()
  var modalRound = null;      // modal 内查看的轮次
  var modalBranch = MAIN_BRANCH; // modal 内查看的分支(默认主线)
  var modalFromPassed = false;   // 本次 modal 是否从「已通过」折叠区的卡片点开(决定折叠态下 ←→ 在哪组轮转)
  // 「已通过」折叠区是否展开(当前状态视图)
  var passedOpen = false;

  function roundReady(r){ return !!(r && r.date); }
  function readyRounds(){ return ROUNDS.filter(roundReady); }
  function firstReadyRound(){
    for (var i=ROUNDS.length-1;i>=0;i--){ if (roundReady(ROUNDS[i])) return ROUNDS[i].id; }
    return ROUNDS.length ? ROUNDS[0].id : null;
  }
  function roundById(id){ return ROUNDS.filter(function(r){return r.id===id;})[0]; }
  // 默认读 main 分支(生产主线)——当前状态/轮次快照/汇总/排序/评分全部走这条
  function modRound(mod, roundId){ return modBranchRound(mod, MAIN_BRANCH, roundId); }
  function hasRoundData(rd){
    if (!rd) return false;
    var hasImg = !!rd.image;
    var hasReason = !!(rd.reasoning && rd.reasoning.length);
    return hasImg || hasReason;
  }

  // 自动 supersede:某模块某分支的某轮,若存在「更晚且有数据」的 ready 轮 → 该早轮已整改进下一轮。
  //   被 supersede 的轮:不再算待评审、不需用户评分、不显示「待评审」徽章,只显「✓ 已整改(→下一轮)」。
  //   只有该分支「最新一个有数据的轮」是 live(待用户评)。
  function isSuperseded(mod, roundId, branchId){
    branchId = branchId || MAIN_BRANCH;
    var rr = readyRounds();
    var idx = -1;
    for (var i=0;i<rr.length;i++){ if (rr[i].id === roundId){ idx = i; break; } }
    if (idx < 0) return false;
    // 该轮之后是否还有「更晚且本分支有数据」的轮
    for (var j=idx+1;j<rr.length;j++){
      if (hasRoundData(modBranchRound(mod, branchId, rr[j].id))) return true;
    }
    return false;
  }

  // 模块「当前轮」= 最新一个有数据(image 或 reasoning 非空)的 ready 轮次
  // branchId 缺省 main(汇总/排序主轴);当前状态视图按所选线传 viewBranch()。
  function currentRoundId(mod, branchId){
    branchId = branchId || MAIN_BRANCH;
    var rr = readyRounds();
    for (var i=rr.length-1;i>=0;i--){
      if (hasRoundData(modBranchRound(mod, branchId, rr[i].id))) return rr[i].id;
    }
    // 全无数据(理论不该出现):退回该分支最新 ready 轮 / 全局最新 ready 轮
    var brr = branchReadyRounds(mod, branchId);
    if (brr.length) return brr[brr.length-1].id;
    return rr.length ? rr[rr.length-1].id : firstReadyRound();
  }

  // localStorage key:main 沿用旧 key(无分支段,向后兼容已存的主线分数);其它分支前缀 'b:<branch>:'
  function lsBr(branchId){
    branchId = branchId || MAIN_BRANCH;
    return branchId===MAIN_BRANCH ? '' : ('b:'+branchId+':');
  }
  function lsKey(modId, roundId, branchId){ return LS_PREFIX + lsBr(branchId) + modId + ':' + roundId; }
  function lsVerdictKey(modId, roundId, branchId){ return LS_PREFIX + lsBr(branchId) + 'v:' + modId + ':' + roundId; }
  function lsNoteKey(modId, roundId, branchId){ return LS_PREFIX + lsBr(branchId) + 'n:' + modId + ':' + roundId; }

  // 优先级:服务端(权威) > JSON 默认值;localStorage 仅在服务端不可达时兜底。
  // branchId 缺省 main(卡片/汇总/排序走主线);modal 传当前分支。
  function getUserScore(mod, roundId, branchId){
    branchId = branchId || MAIN_BRANCH;
    if (serverReachable){
      var sv = srvGet(mod.id, roundId, branchId);
      if (sv !== null) return { val: sv, src:'server' };
    } else {
      var v = localStorage.getItem(lsKey(mod.id, roundId, branchId));
      if (v !== null && v !== '') { return { val: Number(v), src:'local' }; }
    }
    var rd = modBranchRound(mod, branchId, roundId);
    if (rd && rd.userScore !== null && rd.userScore !== undefined) return { val: rd.userScore, src:'json' };
    return { val: null, src:'none' };
  }

  // 用户结论(可写):服务端 verdict > 不可达时 localStorage > 无 = null。
  // 不含 AI 建议——AI 建议单独从 JSON 取。
  function getUserVerdict(mod, roundId, branchId){
    branchId = branchId || MAIN_BRANCH;
    if (serverReachable){
      var sv = srvVerdict(mod.id, roundId, branchId);
      if (sv) return { val: sv, src:'server' };
    } else {
      var v = localStorage.getItem(lsVerdictKey(mod.id, roundId, branchId));
      if (v==='pass'||v==='fix'||v==='redo') return { val: v, src:'local' };
    }
    return { val: null, src:'none' };
  }
  // AI 建议结论(来自该分支该轮 JSON 的 verdict 字段)
  function aiVerdict(mod, roundId, branchId){
    var rd = modBranchRound(mod, branchId || MAIN_BRANCH, roundId);
    return (rd && (rd.verdict==='pass'||rd.verdict==='fix'||rd.verdict==='redo')) ? rd.verdict : null;
  }
  // 用户评语(可写):服务端 > localStorage > JSON userNote
  function getUserNote(mod, roundId, branchId){
    branchId = branchId || MAIN_BRANCH;
    if (serverReachable){
      var sv = srvNote(mod.id, roundId, branchId);
      if (sv !== null) return { val: sv, src:'server' };
    } else {
      var v = localStorage.getItem(lsNoteKey(mod.id, roundId, branchId));
      if (v !== null) return { val: v, src:'local' };
    }
    var rd = modBranchRound(mod, branchId, roundId);
    if (rd && rd.userNote) return { val: rd.userNote, src:'json' };
    return { val: '', src:'none' };
  }

  // 「最终结论」综合视图(用于卡片排序 / 徽章 / 汇总):
  //   1) 用户 verdict(服务端 / 本地) → 用户表态
  //   2) 内嵌 userScore/userNote 推断:有用户评语但用户没显式表态 → 仍视为「待评审」
  //      (评语原文是历史反馈;只有显式 verdict 才算「用户结论」)
  //   3) AI verdict:仅当 AI=pass 且该轮 reasoning 含「未改动」→ 默认沉底,源标 ai
  //   4) 否则 → 待评审(review)
  // 返回 { verdict: 'pass'|'fix'|'redo'|'review', src:'user'|'ai'|'none' }
  var PASS_SCORE = 8; // 用户规则(2026-06-07):人工分 >= 8 通过,< 8(尤其带评语)继续推进

  // 链接点击自动复制 URL 到剪贴板 + 短暂「已复制 ✓」反馈
  // 手机端:只复制不跳转(127.0.0.1 在手机上开不了,跳出去反而打断评审);桌面端:复制 + 照常新开页
  window.copyLinkFlash = function(ev, a){
    var mobile = (typeof isMobileViewport === 'function') ? isMobileViewport()
                 : window.matchMedia('(max-width:768px)').matches;
    if (mobile && ev) ev.preventDefault();
    var url = a.href;
    function flash(){
      if (a.__orig) return;
      a.__orig = a.innerHTML;
      a.innerHTML = '✓ 已复制';
      setTimeout(function(){ a.innerHTML = a.__orig; a.__orig = null; }, 1200);
    }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(flash, function(){});
      } else {
        var t = document.createElement('textarea');
        t.value = url; document.body.appendChild(t); t.select();
        document.execCommand('copy'); document.body.removeChild(t); flash();
      }
    } catch(e){}
  };
  // branchId 缺省 main(轮次快照视图/汇总主轴);当前状态视图按所选线传 viewBranch()。
  function finalConclusion(mod, roundId, branchId){
    branchId = branchId || MAIN_BRANCH;
    var uv = getUserVerdict(mod, roundId, branchId);
    if (uv.val) return { verdict: uv.val, src:'user' };
    var us = getUserScore(mod, roundId, branchId);
    if (us && us.val !== null && us.val !== undefined){
      return us.val >= PASS_SCORE ? { verdict:'pass', src:'score' } : { verdict:'fix', src:'score' };
    }
    var av = aiVerdict(mod, roundId, branchId);
    if (av === 'pass'){
      var rd = modBranchRound(mod, branchId, roundId);
      var untouched = !!(rd && rd.reasoning && rd.reasoning.some(function(p){ return /未改动|未涉及|本轮未/.test(p); }));
      if (untouched) return { verdict:'pass', src:'ai' };
    }
    return { verdict:'review', src:'none' };
  }

  // 分支感知结论(用于 modal 内任意分支的结论徽章):
  //   用户 verdict(本分支) > 该分支 JSON 记录的 verdict(作 AI 建议)> 待评审
  function branchConclusion(mod, branchId, roundId){
    var uv = getUserVerdict(mod, roundId, branchId);
    if (uv.val) return { verdict: uv.val, src:'user' };
    var av = aiVerdict(mod, roundId, branchId);
    if (av) return { verdict: av, src:'ai' };
    return { verdict:'review', src:'none' };
  }

  // 模块「最早通过轮」:用户结论 pass 或人工分 >= 8 的最早 ready 轮;无则 null
  function passedRound(mod){
    var rr = readyRounds();
    for (var i=0;i<rr.length;i++){
      var uv = getUserVerdict(mod, rr[i].id);
      if (uv.val === 'pass') return rr[i].id;
      if (!uv.val){
        var us = getUserScore(mod, rr[i].id);
        if (us && us.val !== null && us.val !== undefined && us.val >= PASS_SCORE) return rr[i].id;
      }
    }
    return null;
  }

  function isCurrentView(){ return activeView === CURRENT_VIEW; }

  /* ---------- HEADER ---------- */
  function renderHeader(){
    document.getElementById('page-title').textContent = DATA.project.title || '复刻测试报告';
    var sub = (DATA.project.subtitle||'');
    sub += ' · 评审人 ' + (DATA.reviewer||'—');
    if (isCurrentView()){
      sub += ' · 当前状态(模块生命周期)';
    } else {
      var rd = roundById(activeView);
      if (rd && rd.date) sub += ' · 轮次快照 ' + rd.label + '(' + rd.date + ')';
      // 本轮实例备份下载(主应用线)
      var bk = rd && rd.backups && rd.backups.main;
      if (bk && bk.file){
        document.getElementById('page-sub').innerHTML = esc(sub) +
          ' · <a href="' + esc(bk.file) + '" download style="color:#2563eb;text-decoration:none">📦 本轮备份 ' +
          esc(bk.size || '') + '(' + esc(bk.instance || '') + ')</a>';
        return;
      }
    }
    document.getElementById('page-sub').innerHTML = esc(sub);
  }

  /* 轮次选择已并入筛选栏(renderFilterBar 内的「轮次」fgroup),不再有顶部独立「查看」tab 行。
     activeView 仍是单一真相:CURRENT_VIEW=当前状态;否则某轮 id。 */

  /* ---------- SUMMARY ---------- */
  // 当前状态视图:按「模块当前轮的用户结论」统计;轮次视图:按该轮统计
  function summarize(){
    // 三档计数:review(待评审) / todo(需修·重做) / done(已完成=通过∪已整改)
    var counts = { review:0, todo:0, done:0 };
    var aiSum=0, aiN=0, usrSum=0, usrN=0;
    function avg(s,n){ return n? (Math.round(s/n*10)/10) : null; }
    function bump(group){ if (counts[group] !== undefined) counts[group]++; }

    // 当前状态视图:对「筛选后的列表」逐条统计(线/状态/部门/搜索叠加后的实际结果)。
    if (isCurrentView()){
      var br = viewBranch();
      currentOrderedList().forEach(function(x){
        var rd = modBranchRound(x.m, br, x.rid);
        bump(x.group);
        if (rd && rd.aiScore !== null && rd.aiScore !== undefined){ aiSum += rd.aiScore; aiN++; }
        var us = getUserScore(x.m, x.rid, br);
        if (us.val !== null){ usrSum += us.val; usrN++; }
      });
      return { counts: counts, aiAvg: avg(aiSum,aiN), usrAvg: avg(usrSum,usrN) };
    }

    // 轮次快照视图:走 roundOrderedList(已叠加 线/状态/部门/搜索),与网格一致。
    // 被更晚轮次取代的早轮 = 已整改,计入「已完成」;其分数不掺进本轮均分(最新效果在更晚轮评)。
    var rbr = viewBranch();
    roundOrderedList(activeView).forEach(function(x){
      var rd = modBranchRound(x.m, rbr, x.rid);
      bump(x.group);
      if (x.superseded) return;
      if (rd && rd.aiScore !== null && rd.aiScore !== undefined){ aiSum += rd.aiScore; aiN++; }
      var us = getUserScore(x.m, x.rid, rbr);
      if (us.val !== null){ usrSum += us.val; usrN++; }
    });
    return { counts: counts, aiAvg: avg(aiSum,aiN), usrAvg: avg(usrSum,usrN) };
  }
  function renderSummary(){
    var box = document.getElementById('summary');
    var s = summarize();
    var c = s.counts;
    var cells = [
      { cls:'',     lbl:'⏳ 待评审',        val: c.review },
      { cls:'fix',  lbl:'🔧 需修·重做',     val: c.todo },
      { cls:'pass', lbl:'✅ 已完成',        val: c.done },
      { cls:'',     lbl:'AI 均分',          val: s.aiAvg!==null? s.aiAvg : '—', suf:'/10' },
      { cls:'',     lbl:'用户均分',         val: s.usrAvg!==null? s.usrAvg : '—', suf:'/10' }
    ];
    box.innerHTML = cells.map(function(cell){
      var v = cell.val;
      var suf = (cell.suf && v!=='—' && v!=='') ? '<small>'+cell.suf+'</small>' : '';
      return '<div class="stat '+cell.cls+'"><div class="lbl">'+cell.lbl+'</div><div class="val">'+v+suf+'</div></div>';
    }).join('');
  }

  /* ---------- 排序权重 / 分组(待评审 → 需修·重做 → 已完成) ---------- */
  // 分组三档(顶部 → 中部 → 底部折叠):
  //   'review' 待评审   → rank 0(顶部,展开,醒目)
  //   'todo'   需修·重做 → rank 1(中部,展开)
  //   'done'   已通过 ∪ 已整改(superseded)→ rank 2(底部,默认折叠)
  // 入参 isSuperseded:该项(模块×轮×分支)是否被更晚轮次取代 → 不论结论一律归「已完成」底部折叠。
  function itemGroup(verdict, superseded){
    if (superseded) return 'done';            // 已整改 → 和已通过同档(底部折叠)
    if (verdict === 'pass') return 'done';
    if (verdict === 'fix' || verdict === 'redo') return 'todo';
    return 'review';                          // review 及其它 → 待评审
  }
  function groupRank(group){
    return group === 'review' ? 0 : group === 'todo' ? 1 : 2;
  }
  // 兼容保留:仅按 verdict 给权重(superseded 单独由 itemGroup 处理)
  function sortRank(verdict){ return groupRank(itemGroup(verdict, false)); }

  // 真实卡片(可点开 modal)
  // opts.branch:当前状态视图取数的分支(封面/状态/评分都取该 branch);缺省 main。
  function buildCard(m, idx, roundId, opts){
    opts = opts || {};
    var cardBranch = opts.branch || MAIN_BRANCH;
    // 多选 / 无 main 模块:若该模块没有 cardBranch 的数据,回退到它拥有的「首个已选线」,
    // 否则像 202(只有 plus/max 两条线、无 main)在多选时会落到 main → 取空 → 显示「对比图待补」占位。
    if (!branchObj(m, cardBranch)) {
      var _alt = (filterBranches || []).filter(function(b){ return branchObj(m, b); })[0]
                 || (modBranchIds(m).filter(function(b){ return b !== MAIN_BRANCH; })[0]);
      if (_alt) cardBranch = _alt;
    }
    var rd = modBranchRound(m, cardBranch, roundId);
    // 轮次也可能错配(多选时 roundId 按 main 取了全局最新轮,而该线数据在别的轮)→ 取该线「最新有数据的轮」
    if (!rd) {
      for (var _ri = ROUNDS.length - 1; _ri >= 0; _ri--) {
        var _r = modBranchRound(m, cardBranch, ROUNDS[_ri].id);
        if (_r) { roundId = ROUNDS[_ri].id; rd = _r; break; }
      }
    }
    var card = document.createElement('div');
    card.className = 'card';
    card.onclick = function(){ openModal(idx, roundId, !!opts.fromPassed, cardBranch); };

    var thumb;
    if (rd && rd.image){
      thumb = '<div class="thumb"><img loading="lazy" src="'+esc(rd.image)+'" alt="'+esc(m.name)+'"></div>';
    } else {
      thumb = '<div class="thumb placeholder">⏳ 对比图待补</div>';
    }

    // 徽章:当前状态视图显示综合结论 + 轮次前缀;轮次快照视图显示该轮(所选线)结论。两视图都按 cardBranch 取数。
    var fc = finalConclusion(m, roundId, cardBranch);
    var badge, rtag = '';
    if (isCurrentView()){
      var rdObj = roundById(roundId);
      var rname = rdObj ? rdObj.label.replace(/[（(].*$/,'') : roundId;
      rtag = '<span class="rtag">' + esc(rdObj ? rdObj.id.toUpperCase() : roundId) + '</span>';
      if (fc.verdict === 'review'){
        badge = '<span class="badge review">⏳ 待评审</span>';
      } else {
        var v = VERDICT[fc.verdict];
        var suffix = (fc.src==='ai') ? '(AI)' : '';
        badge = '<span class="badge '+v.cls+(fc.src==='ai'?' ai':'')+'">'+v.icon+' '+v.label+suffix+'</span>';
      }
    } else {
      // 轮次快照视图:被更晚轮次 supersede 的早轮(所选线) → 显示「已整改」徽章,不算待评审。
      if (isSuperseded(m, roundId, cardBranch)){
        badge = '<span class="badge superseded">✓ 已整改(→下一轮)</span>';
      } else if (fc.verdict === 'review'){
        badge = '<span class="badge review">⏳ 待评审</span>';
      } else {
        var v2 = VERDICT[fc.verdict];
        var suffix2 = (fc.src==='ai') ? '(AI)' : '';
        badge = '<span class="badge '+v2.cls+(fc.src==='ai'?' ai':'')+'">'+v2.icon+' '+v2.label+suffix2+'</span>';
      }
    }

    var ai = (rd && rd.aiScore!==null && rd.aiScore!==undefined) ? '<b>'+rd.aiScore+'</b>' : '<span class="todo">待补</span>';
    var us = getUserScore(m, roundId, cardBranch);
    var usHtml = (us.val!==null) ? '<b>'+us.val+'</b>' : '<span class="todo">未评</span>';

    var bk = backupForBranch(m, cardBranch);
    var bkBadge = bk ? '<span class="bkbadge" title="有备份 '+esc(bk.file)+' @ '+esc(bk.env||'')+'(可还原追溯)">💾</span>' : '';
    card.innerHTML = thumb +
      '<div class="body">'+
        '<div class="ctop"><span class="cnum">'+esc(m.id)+'</span>'+rtag+badge+'</div>'+
        '<h3>'+esc(m.name)+' <button class="copybtn" title="复制用例定位信息(发给 AI 用于定位)">📋</button>'+bkBadge+'</h3>'+
        '<div class="cen">'+esc(m.en)+'</div>'+
        '<div class="cfoot"><div class="scorepair">'+
          '<span>AI '+ai+'</span><span>用户 '+usHtml+'</span>'+
        '</div></div>'+
        branchChipsHtml(m, cardBranch)+
      '</div>';
    var cbtn = card.querySelector('.copybtn');
    if (cbtn) cbtn.onclick = function(e){ e.stopPropagation(); copyText(caseInfo(m, cardBranch, roundId), cbtn); };
    return card;
  }

  // 轮次快照里「已于早轮通过、本轮未涉及」的占位卡(不可点)
  function buildPlaceholderCard(m, passRid){
    var card = document.createElement('div');
    card.className = 'card ph-passed';
    var rdObj = roundById(passRid);
    var rlabel = rdObj ? rdObj.id.toUpperCase() : (passRid||'').toUpperCase();
    card.innerHTML =
      '<div class="ph-ic">✓</div>'+
      '<div class="ph-num">'+esc(m.id)+' · '+esc(m.en)+'</div>'+
      '<div class="ph-name">'+esc(m.name)+'</div>'+
      '<div class="ph-msg">已于 '+esc(rlabel)+' 通过,本轮未涉及</div>';
    card.onclick = function(){
      // 点了只给提示,不开 modal
      var msg = card.querySelector('.ph-msg');
      if (msg){ var old=msg.textContent; msg.textContent='该模块在 '+rlabel+' 已通过,无需本轮整改。'; setTimeout(function(){ msg.textContent=old; },1600); }
    };
    return card;
  }

  /* ---------- 当前状态视图的多维筛选 ---------- */
  // 状态筛选匹配:'all' 全过;'fixredo' 合并需修+重做。
  function statusMatch(verdict){
    if (filterStatus === 'all') return true;
    if (filterStatus === 'fixredo') return (verdict === 'fix' || verdict === 'redo');
    return verdict === filterStatus;
  }
  function deptMatch(mod){
    return filterDept === 'all' || (mod.tag || '') === filterDept;
  }
  function searchMatch(mod){
    if (!filterSearch) return true;
    var q = filterSearch.toLowerCase();
    return ((mod.cn||'') + ' ' + (mod.name||'') + ' ' + (mod.en||'') + ' ' + (mod.desc||''))
      .toLowerCase().indexOf(q) >= 0;
  }
  // 部门下拉候选(来自 MODULES.tag 去重,保留出现顺序)
  function deptOptions(){
    var seen = {}, out = [];
    MODULES.forEach(function(m){
      var t = m.tag || '';
      if (t && !seen[t]){ seen[t] = 1; out.push(t); }
    });
    return out;
  }

  /* ---------- CARD GRID(双视图) ---------- */
  // 当前状态视图的排序导航列表(待办优先);各项 {m, idx, rid, fc}
  // 已应用「线 ∩ 状态 ∩ 部门 ∩ 搜索」四维筛选;rid/fc 取所选线(viewBranch)的最新轮。
  function currentOrderedList(){
    var br = viewBranch();
    var list = [];
    MODULES.forEach(function(m, idx){
      if (!modHasViewBranch(m)) return;            // 线:只显示拥有所选 branch 的模块
      if (!deptMatch(m)) return;                   // 部门
      if (!searchMatch(m)) return;                 // 搜索
      var rid = currentRoundId(m, br);
      var fc = finalConclusion(m, rid, br);
      if (!statusMatch(fc.verdict)) return;        // 状态(看所选线最新轮的结论)
      // 当前状态视图看的是「最新有数据轮」→ superseded 恒 false;沿用 itemGroup 统一分组。
      var grp = itemGroup(fc.verdict, false);
      list.push({ m:m, idx:idx, rid:rid, fc:fc, branch:br, group:grp, superseded:false });
    });
    list.sort(function(a,b){
      var ra = groupRank(a.group), rb = groupRank(b.group);
      if (ra !== rb) return ra - rb;
      return Number(a.m.id) - Number(b.m.id);
    });
    return list;
  }
  // 轮次快照导航列表:该轮在所选线下有数据的模块,按分组排序(待评审 → 需修·重做 → 已完成[通过∪已整改])。
  // 轮次现在是筛选维度之一 → 在「该轮有数据」基础上再叠加 线/状态/部门/搜索 四维筛选(与 currentOrderedList 一致)。
  // 被更晚轮次 supersede 的早轮 → 一律归「已完成」(底部折叠),不再因结论浮到顶部。
  function roundOrderedList(roundId){
    var br = viewBranch();
    var list = [];
    MODULES.forEach(function(m, idx){
      if (!modHasViewBranch(m)) return;                       // 线
      if (!deptMatch(m)) return;                              // 部门
      if (!searchMatch(m)) return;                            // 搜索
      if (!hasRoundData(modBranchRound(m, br, roundId))) return; // 该轮(所选线)有数据
      var sup = isSuperseded(m, roundId, br);
      var fc = finalConclusion(m, roundId, br);
      if (!statusMatch(fc.verdict)) return;                   // 状态
      var grp = itemGroup(fc.verdict, sup);
      list.push({ m:m, idx:idx, rid:roundId, fc:fc, branch:br, group:grp, superseded:sup });
    });
    list.sort(function(a,b){
      var ra = groupRank(a.group), rb = groupRank(b.group);
      if (ra !== rb) return ra - rb;
      return Number(a.m.id) - Number(b.m.id);
    });
    return list;
  }
  // modal 导航用的当前视图列表 = 网格的显示顺序(返回 [{m,idx,rid,fc,group,branch}])。
  // ←→ 直接走这条列表(见 navModal),保证翻页落到网格里视觉相邻的卡片。
  function currentNavList(){
    return isCurrentView() ? currentOrderedList() : roundOrderedList(activeView);
  }
  // 某轮在某线下的「测试用例数」= 该轮有数据的模块数。轮次 tab 上显示这个数(替代日期)。
  // 轮 = 概念,每个用例(模块×线)各自的轮在不同时间发生,故 tab 不挂单一全局日期,改挂用例计数。
  function roundCaseCount(roundId, branchId){
    branchId = branchId || MAIN_BRANCH;
    var n = 0;
    MODULES.forEach(function(m){
      if (hasRoundData(modBranchRound(m, branchId, roundId))) n++;
    });
    return n;
  }

  function renderGrid(){
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    // 清掉上次的 passed-section
    var oldPs = document.getElementById('passed-section');
    if (oldPs) oldPs.remove();

    if (isCurrentView()){
      renderCurrentView(grid);
    } else {
      renderRoundView(grid, activeView);
    }
  }

  function renderCurrentView(grid){
    var list = currentOrderedList();
    var br = viewBranch();
    // 顶部+中部 = 待办(待评审 + 需修·重做);底部折叠 = 已完成(通过∪已整改,当前视图只会有通过)
    var todo = list.filter(function(x){ return x.group !== 'done'; });
    var done = list.filter(function(x){ return x.group === 'done'; });

    if (!list.length){
      grid.innerHTML = '<div style="grid-column:1/-1;padding:48px 20px;text-align:center;color:var(--text3);">'+
        '<div style="font-size:15px;color:var(--text2);margin-bottom:6px;">没有匹配的模块</div>'+
        '<div>调整线 / 状态 / 部门 / 搜索条件再试。</div></div>';
      return;
    }

    // 状态筛选 = 已通过:用户明确只看通过,直接平铺进主网格(不折叠),其余按原规则折叠
    if (filterStatus === 'pass'){
      done.forEach(function(x){ grid.appendChild(buildCard(x.m, x.idx, x.rid, { fromPassed:true, branch:br })); });
      return;
    }

    todo.forEach(function(x){ grid.appendChild(buildCard(x.m, x.idx, x.rid, { branch:br })); });

    renderDoneSection(grid, done, { branch:br });
  }

  // 底部「已完成 / 已通过」折叠分组(通过 ∪ 已整改),两视图共用。
  // items:已分组为 done 的 [{m,idx,rid,...}];opts.branch 取数线(缺省 main);opts.placeholders 占位卡列表。
  function renderDoneSection(grid, items, opts){
    opts = opts || {};
    var phs = opts.placeholders || [];
    var total = items.length + phs.length;
    if (!total) return;
    var sec = document.createElement('div');
    sec.className = 'passed-section';
    sec.id = 'passed-section';
    var toggle = document.createElement('button');
    toggle.className = 'passed-toggle' + (passedOpen?' open':'');
    toggle.innerHTML = '<span class="arrow">▸</span> ✓ 已完成 / 已通过(' + total + ')';
    var pgrid = document.createElement('div');
    pgrid.className = 'passed-grid' + (passedOpen?' open':'');
    items.forEach(function(x){
      pgrid.appendChild(buildCard(x.m, x.idx, x.rid, { fromPassed:true, branch:(opts.branch||MAIN_BRANCH) }));
    });
    // 占位卡(轮次视图里「已于早轮通过、本轮未涉及」的模块)也归入折叠区
    phs.forEach(function(ph){ pgrid.appendChild(buildPlaceholderCard(ph.m, ph.labelRid)); });
    toggle.onclick = function(){
      passedOpen = !passedOpen;
      toggle.classList.toggle('open', passedOpen);
      pgrid.classList.toggle('open', passedOpen);
    };
    sec.appendChild(toggle);
    sec.appendChild(pgrid);
    grid.parentNode.appendChild(sec);
  }

  function renderRoundView(grid, roundId){
    var br = viewBranch();
    // 该轮(所选线)有数据 + 通过 线/状态/部门/搜索 的模块 → 已分组排序
    var ordered = roundOrderedList(roundId);
    var todo = ordered.filter(function(x){ return x.group !== 'done'; });
    var done = ordered.filter(function(x){ return x.group === 'done'; });

    if (!ordered.length){
      grid.innerHTML = '<div style="grid-column:1/-1;padding:48px 20px;text-align:center;color:var(--text3);">'+
        '<div style="font-size:15px;color:var(--text2);margin-bottom:6px;">没有匹配的模块</div>'+
        '<div>调整轮次 / 线 / 状态 / 部门 / 搜索条件再试。</div></div>';
      return;
    }

    // 顶部+中部:待办(待评审 + 需修·重做)。已整改不在此。
    todo.forEach(function(x){ grid.appendChild(buildCard(x.m, x.idx, roundId, { branch:br })); });

    // 占位卡(本轮无数据、已于早轮通过)只在主线 / 全部线 / 主应用线下有意义;选具体复刻线时不铺占位。
    var placeholders = [];
    if (br === MAIN_BRANCH){
      MODULES.forEach(function(m){
        if (hasRoundData(modRound(m, roundId))) return;
        if (!deptMatch(m) || !searchMatch(m)) return;       // 占位卡也尊重 部门/搜索 过滤
        var pr = passedRound(m);
        var labelRid = pr || lastDataRoundBefore(m, roundId);
        placeholders.push({ m:m, labelRid:labelRid });
      });
    }

    // 底部折叠:已完成(本轮已通过/已整改) + 占位(早轮已通过)
    renderDoneSection(grid, done, { branch:br, placeholders:placeholders });
  }
  // 某轮之前(含)最后一个有数据的轮 id
  function lastDataRoundBefore(m, roundId){
    var rr = readyRounds();
    var stop = false, found = null;
    for (var i=0;i<rr.length;i++){
      if (hasRoundData(modRound(m, rr[i].id))) found = rr[i].id;
      if (rr[i].id === roundId) break;
    }
    return found || firstReadyRound();
  }

  /* ---------- FILTER BAR(始终显示;轮次=其中一维筛选) ---------- */
  // 状态 pills 的计数:反映 轮次 ∩ 线 ∩ 部门 ∩ 搜索(不含状态本身)。
  //   当前状态视图 → 看每模块所选线的最新轮结论;轮次视图 → 看该轮(所选线)结论。
  function branchStatusCounts(){
    var br = viewBranch();
    var c = { all:0, review:0, fix:0, redo:0, pass:0 };
    MODULES.forEach(function(m){
      if (!modHasViewBranch(m)) return;
      if (!deptMatch(m)) return;
      if (!searchMatch(m)) return;
      var rid, v;
      if (isCurrentView()){
        rid = currentRoundId(m, br);
        v = finalConclusion(m, rid, br).verdict;
      } else {
        rid = activeView;
        if (!hasRoundData(modBranchRound(m, br, rid))) return; // 该轮(所选线)无数据 → 不计
        // 被更晚轮取代的早轮归「已完成」,与网格分组一致(superseded → 视作 pass 计入 all/pass)
        var sup = isSuperseded(m, rid, br);
        v = sup ? 'pass' : finalConclusion(m, rid, br).verdict;
      }
      c.all++;
      if (c[v] !== undefined) c[v]++;
    });
    return c;
  }
  function renderFilterBar(){
    var bar = document.getElementById('filterbar');
    if (!bar) return;
    // 单页:筛选栏始终显示。轮次 = 其中一维(当前状态 / 第N次生成),与 线/状态/部门/搜索 组合。
    bar.className = 'filterbar show';

    // 轮次分段:当前状态(默认)+ 各 ready 轮,各带「· N」用例数(所选线口径)。
    var rbr = viewBranch();
    var roundSegs = '<button data-round="'+esc(CURRENT_VIEW)+'" class="'+(isCurrentView()?'on':'')+'">📍 当前状态</button>';
    readyRounds().forEach(function(r){
      var on = (activeView === r.id);
      roundSegs += '<button data-round="'+esc(r.id)+'" class="'+(on?'on':'')+'">'+esc(r.label)+
        ' <span style="opacity:.7;font-weight:400">· '+roundCaseCount(r.id, rbr)+'</span></button>';
    });

    // 各分支可用模块数(全部线=全部模块数;其余=拥有该分支的模块数)
    function branchCount(bid){
      if (bid === ALL_BRANCHES) return MODULES.length;
      var n = 0; MODULES.forEach(function(m){ if (branchObj(m, bid)) n++; }); return n;
    }
    // 线 = 多选下拉组件(数据驱动):按 model 分组勾选,可跨模型任意组合对比;空选 = 全部线。
    // 一级 model 由 branchModelGroups() 派生,新增线/新 model 只改 library.json 即自动出现。
    // skill 版本分段(默认最新;切「全部版本」恢复全量)
    var verSegs = SKILL_VERSIONS.map(function(v){
      var on = (filterSkillVersion === v), cnt = 0;
      MODULES.forEach(function(m){ if (m.branches && Object.keys(m.branches).some(function(k){ return ((branchObj(m,k)||{}).skillVersion||'v260605')===v; })) cnt++; });
      return '<button data-skillver="'+esc(v)+'" class="'+(on?'on':'')+'">'+esc(skillVersionLabel(v))+' <span style="opacity:.7;font-weight:400">· '+cnt+'</span></button>';
    }).join('') +
    '<button data-skillver="'+esc(ALL_VERSIONS)+'" class="'+(filterSkillVersion===ALL_VERSIONS?'on':'')+'">'+esc(skillVersionLabel(ALL_VERSIONS))+'</button>';

    var msSummary = branchAll() ? '全部线'
      : (filterBranches.length === 1 ? globalBranchLabel(filterBranches[0]) : (filterBranches.length + ' 条线'));
    var msGroups = branchModelGroups().map(function(g){
      var gids = g.branches;
      var allSel = gids.length > 0 && gids.every(branchSelected);
      var opts = gids.map(function(bid){
        return '<label class="ms-opt"><input type="checkbox" class="ms-cb" data-bid="'+esc(bid)+'"'+(branchSelected(bid)?' checked':'')+'>'+
          '<span class="ms-dot '+esc(branchColorClass(bid))+'"></span><span class="ms-lab">'+esc(globalBranchLabel(bid))+'</span>'+
          '<span class="ms-n">'+branchCount(bid)+'</span></label>';
      }).join('');
      return '<div class="ms-grp"><div class="ms-grp-h"><span>'+esc(g.group)+'</span>'+
        '<button type="button" class="ms-grpsel" data-grp="'+esc(g.group)+'">'+(allSel?'取消':'全选')+'</button></div>'+opts+'</div>';
    }).join('');
    var linesHtml =
      '<div class="ms" id="f-lines">'+
        '<button type="button" class="ms-trig'+(branchAll()?'':' on')+'" id="ms-trig">'+esc(msSummary)+'<span class="ms-caret">▾</span></button>'+
        '<div class="ms-pop" id="ms-pop"'+(_msOpen?'':' hidden')+'>'+
          '<label class="ms-opt ms-all"><input type="checkbox" id="ms-all"'+(branchAll()?' checked':'')+'><span class="ms-lab">全部线(不筛)</span></label>'+
          msGroups+
          '<div class="ms-foot"><button type="button" id="ms-clear-lines">清空</button>'+
            '<span class="ms-cnt">命中 '+MODULES.filter(modHasViewBranch).length+' 模块</span>'+
            '<button type="button" id="ms-done">完成</button></div>'+
        '</div>'+
      '</div>';

    var sc = branchStatusCounts();
    var STATUS_SEGS = [
      { id:'all',     label:'全部',     cls:'',        n: sc.all },
      { id:'review',  label:'待评审',   cls:'',        n: sc.review },
      { id:'fixredo', label:'需修·重做',cls:'fixredo', n: sc.fix + sc.redo },
      { id:'pass',    label:'已通过',   cls:'pass',    n: sc.pass }
    ];
    var pillsHtml = STATUS_SEGS.map(function(s){
      var on = (filterStatus === s.id);
      return '<button data-status="'+esc(s.id)+'" class="'+(on?('on '+s.cls):'')+'">'+esc(s.label)+' ('+s.n+')</button>';
    }).join('');

    var depts = deptOptions();
    var deptHtml = '<select class="fselect" id="f-dept"><option value="all">全部部门</option>'+
      depts.map(function(d){ return '<option value="'+esc(d)+'"'+(filterDept===d?' selected':'')+'>'+esc(d)+'</option>'; }).join('')+
      '</select>';

    var shown = (isCurrentView() ? currentOrderedList() : roundOrderedList(activeView)).length;
    var anyFilter = (!isCurrentView() || !branchAll() || filterStatus!=='all' || filterDept!=='all' || filterSearch);

    bar.innerHTML =
      '<span class="filter-title">🔎 筛选</span>'+
      '<div class="fgroup"><span class="flabel">skill版本</span><div class="seg verseg">'+verSegs+'</div></div>'+
      '<div class="fgroup"><span class="flabel">轮次</span><div class="seg roundseg">'+roundSegs+'</div></div>'+
      '<div class="fgroup"><span class="flabel">线</span>'+linesHtml+'</div>'+
      '<div class="fgroup"><span class="flabel">状态</span><div class="pills">'+pillsHtml+'</div></div>'+
      '<div class="fgroup"><span class="flabel">部门</span>'+deptHtml+'</div>'+
      '<div class="fgroup"><span class="flabel">搜索</span>'+
        '<input class="fsearch" id="f-search" type="search" placeholder="搜索模块…" value="'+esc(filterSearch)+'"></div>'+
      '<span class="fspring"></span>'+
      '<span class="fcount">显示 <b>'+shown+'</b> 个模块</span>'+
      (anyFilter ? '<button class="fclear" id="f-clear">清空筛选</button>' : '');

    // wire skill 版本分段(切版本 → 复位线到该版本第一条;全部版本→全部线)
    bar.querySelectorAll('.verseg button').forEach(function(b){
      b.onclick = function(){
        filterSkillVersion = b.getAttribute('data-skillver');
        normalizeBranchForVersion();  // 丢掉不属于新版本的线;空=全部线
        renderAll();
      };
    });
    // wire 轮次 segment(设 activeView → 决定走 currentOrderedList 还是 roundOrderedList)
    bar.querySelectorAll('.roundseg button').forEach(function(b){
      b.onclick = function(){ activeView = b.getAttribute('data-round'); renderAll(); };
    });
    // wire 线 多选组件(勾选即时生效;跨 renderAll 保留展开/滚动;点空白处关闭)
    var msTrig = document.getElementById('ms-trig');

  /* ---------- MODAL ---------- */
  // openModal 接受模块索引 idx(进 MODULES)与轮次;modalIndex 内部转成导航列表位置
  // branchHint:从筛选卡片打开时传当前所选线 → modal 默认定位到该 branch(spec 7)。
  function openModal(idx, roundId, fromPassed, branchHint){
    modalIndex = idx;
    modalFromPassed = !!fromPassed; // 折叠态下决定 ←→ 在待办组还是已通过组内轮转
    // 默认定位到当前所选 branch(全部线/缺省 → main);守卫:该模块没有该 branch 则回 main
    var hint = branchHint || MAIN_BRANCH;
    var m0 = MODULES[idx];
    modalBranch = (m0 && branchObj(m0, hint)) ? hint : MAIN_BRANCH;
    modalRound = roundReady(roundById(roundId)) ? roundId : firstReadyRound();
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    renderModal();
  }
  function closeModal(){
    closeFullImg();
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
    modalIndex = -1;
  }
  // ←→ 严格按「网格当前显示顺序」轮转:走 currentNavList()(当前状态视图=currentOrderedList,
  // 轮次视图=roundOrderedList),即用户眼前那一列的同一排序(待办在前、已完成折叠区在后)。
  // 从问题追踪(待评审)按 › 落到的就是网格里视觉上相邻的下一张卡,不再跳到乱序的已通过卡。
  function navModal(delta){
    if (modalIndex < 0) return;
    var navList = currentNavList();
    if (!navList.length) return;
    // 找到当前模块在显示列表中的位置;找不到(理论上不该发生)兜底到 0
    var pos = -1;
    for (var i=0;i<navList.length;i++){ if (navList[i].idx === modalIndex){ pos = i; break; } }
    if (pos < 0) pos = 0;
    var np = (pos + delta + navList.length) % navList.length;
    modalIndex = navList[np].idx;
    modalRound = navList[np].rid;
    // 切模块:当前状态视图保持在所选线(目标模块若无该线则回主线);轮次视图回主线
    var tgt = MODULES[modalIndex];
    if (isCurrentView() && navList[np].branch && tgt && branchObj(tgt, navList[np].branch)){
      modalBranch = navList[np].branch;
    } else {
      modalBranch = MAIN_BRANCH;
    }
    // 跟随轮转去向更新 fromPassed(=已完成组),使后续连续 ←→ 保持在正确的组
    if (!passedOpen){
      modalFromPassed = (navList[np].group === 'done');
    }
    renderModal();
  }
