<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>企业应用示例库 — 复刻测试报告</title>
<style>
  :root{
    --primary:#1677ff; --primary-hover:#4096ff;
    --text:rgba(0,0,0,.88); --text2:rgba(0,0,0,.45); --text3:rgba(0,0,0,.30);
    --border:#d9d9d9; --split:rgba(5,5,5,.06);
    --bg:#f5f5f5; --container:#fff;
    --shadow:0 1px 2px rgba(0,0,0,.03),0 1px 6px -1px rgba(0,0,0,.02);
    --pass-bg:#f6ffed; --pass-fg:#389e0d; --pass-bd:#b7eb8f;
    --fix-bg:#fffbe6; --fix-fg:#d48806; --fix-bd:#ffe58f;
    --redo-bg:#fff1f0; --redo-fg:#cf1322; --redo-bd:#ffccc7;
    --todo-bg:#fafafa; --todo-fg:#bfbfbf; --todo-bd:#e8e8e8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,'Segoe UI',Roboto,'PingFang SC',system-ui,sans-serif;
    font-size:14px;line-height:1.5;}
  .wrap{max-width:1280px;margin:0 auto;padding:32px 24px 64px;width:100%;}

  /* ---- header ---- */
  .hero{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:18px;}
  .hero h1{font-size:26px;font-weight:600;margin:0 0 6px;letter-spacing:.4px;}
  .hero .sub{color:var(--text2);font-size:13px;line-height:1.6;}
  .hero .sub code{background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:12px;}
  .hero-actions{display:flex;gap:10px;flex-shrink:0;}
  .btn{cursor:pointer;border:1px solid var(--border);background:var(--container);color:var(--text);
    font-size:13px;padding:7px 14px;border-radius:6px;transition:all .15s;font-family:inherit;white-space:nowrap;}
  .btn:hover{border-color:var(--primary);color:var(--primary);}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
  .btn.primary:hover{background:var(--primary-hover);color:#fff;}

  /* ---- view switcher (轮次/视图 切换) ---- */
  /* 整排作为一个带标签的「分段标签页」控件:左侧灰色小标签「查看」,右侧 tab 选中态突出 */
  .viewswitch{display:flex;align-items:center;gap:10px;margin:18px 0 0;max-width:100%;min-width:0;}
  .viewswitch .vs-label{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--text3);
    letter-spacing:.5px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .viewswitch .vs-label::before{content:"";display:inline-block;width:3px;height:13px;
    border-radius:2px;background:var(--primary);opacity:.7;}

  /* ---- round/view tabs ---- */
  .tabs{display:flex;gap:4px;min-width:0;flex:1;border-bottom:1px solid var(--split);}
  .tab{cursor:pointer;padding:9px 18px;font-size:14px;font-weight:500;color:var(--text2);
    border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;
    transition:all .15s;font-family:inherit;position:relative;border-radius:6px 6px 0 0;}
  .tab:hover:not(.disabled){color:var(--primary);background:#f5faff;}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;background:#e6f4ff;}
  .tab.disabled{color:var(--text3);cursor:not-allowed;}
  .tab .tdate{font-size:11px;color:var(--text3);margin-left:7px;font-weight:400;}
  .tab .ghost{font-size:11px;color:var(--text3);margin-left:7px;font-weight:400;}

  /* ---- 两条控件之间的分隔(上=切轮次 / 下=本轮内筛选) ---- */
  .controls-split{height:0;border:none;border-top:1px solid var(--split);margin:14px 0 16px;max-width:100%;}
  .controls-split.hidden{display:none;}

  /* ---- summary bar ---- */
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
  .stat{background:var(--container);border:1px solid var(--split);border-radius:8px;padding:16px 18px;box-shadow:var(--shadow);}
  .stat .lbl{font-size:12px;color:var(--text2);margin-bottom:6px;}
  .stat .val{font-size:26px;font-weight:600;line-height:1;}
  .stat .val small{font-size:13px;font-weight:400;color:var(--text2);margin-left:2px;}
  .stat.pass .val{color:var(--pass-fg);}
  .stat.fix .val{color:var(--fix-fg);}
  .stat.redo .val{color:var(--redo-fg);}

  /* ---- filter bar(当前状态视图) ---- */
  /* 比上面的视图 tab「更轻」:浅灰底 + 虚一点的边、更小的 pill,视觉上是一条工具栏而非标签页 */
  .filterbar{display:none;}
  .filterbar.show{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px;margin-bottom:18px;
    background:#fbfbfc;border:1px solid var(--split);border-radius:10px;padding:11px 14px;box-shadow:none;
    max-width:100%;}
  /* 整条筛选栏的「筛选」总标签(漏斗 + 字),与上面「查看」标签呼应但风格区分 */
  .filterbar .filter-title{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--text2);
    display:inline-flex;align-items:center;gap:5px;white-space:nowrap;padding-right:4px;
    margin-right:2px;border-right:1px solid var(--split);}
  .fgroup{display:flex;align-items:center;gap:7px;min-width:0;}
  .fgroup > .flabel{font-size:11px;color:var(--text3);font-weight:600;flex-shrink:0;
    background:#f0f0f2;border-radius:5px;padding:2px 7px;letter-spacing:.3px;}
  /* segmented branch buttons */
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0;}
  .seg button{cursor:pointer;border:none;background:var(--container);color:var(--text2);font-family:inherit;
    font-size:12px;font-weight:500;padding:5px 11px;border-right:1px solid var(--split);transition:all .14s;white-space:nowrap;}
  .seg button:last-child{border-right:none;}
  .seg button:hover{color:var(--primary);background:#f5faff;}
  .seg button.on{background:var(--primary);color:#fff;font-weight:600;}
  .seg button.on.blind{background:#d46b08;}
  .seg button.on.design{background:#722ed1;}
  /* ---- 两级「线」筛选:一级=MODEL group header,二级=line chips ---- */
  .lines2{display:inline-flex;align-items:stretch;gap:10px;min-width:0;}
  .lgroup{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;
    border:1px solid var(--split);border-radius:8px;padding:4px 6px 4px 4px;background:var(--container);}
  .lgroup-h{flex:0 0 auto;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.3px;
    background:#eef1f5;border-radius:5px;padding:3px 7px;white-space:nowrap;text-transform:none;}
  .lgroup-lines{display:inline-flex;gap:5px;flex-shrink:0;}
  .lbtn{cursor:pointer;border:1px solid var(--border);background:var(--container);color:var(--text2);
    font-family:inherit;font-size:12px;font-weight:500;padding:5px 11px;border-radius:13px;transition:all .14s;white-space:nowrap;}
  .lbtn:hover{color:var(--primary);border-color:var(--primary);background:#f5faff;}
  .lbtn.on{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600;}
  .lbtn.on.blind{background:#d46b08;border-color:#d46b08;}
  .lbtn.on.design{background:#722ed1;border-color:#722ed1;}
  /* status pills */
  .pills{display:inline-flex;gap:6px;flex-wrap:wrap;}
  .pills button{cursor:pointer;border:1px solid var(--border);background:var(--container);color:var(--text2);
    font-family:inherit;font-size:12px;font-weight:500;padding:5px 12px;border-radius:14px;transition:all .14s;white-space:nowrap;}
  .pills button:hover{border-color:var(--primary);color:var(--primary);}
  .pills button.on{background:#e6f4ff;border-color:#91caff;color:var(--primary);font-weight:600;}
  .pills button.on.fixredo{background:var(--fix-bg);border-color:var(--fix-bd);color:var(--fix-fg);}
  .pills button.on.pass{background:var(--pass-bg);border-color:var(--pass-bd);color:var(--pass-fg);}
  /* dept select + search */
  .fselect{border:1px solid var(--border);border-radius:8px;background:var(--container);color:var(--text);
    font-family:inherit;font-size:13px;padding:7px 10px;outline:none;cursor:pointer;transition:border-color .15s;}
  .fselect:focus{border-color:var(--primary);}
  .fselect.fline{min-width:160px;max-width:240px;}
  /* 线 多选下拉组件 */
  .ms{position:relative;display:inline-block;}
  .ms-trig{cursor:pointer;border:1px solid var(--border);border-radius:8px;background:var(--container);color:var(--text2);
    font-family:inherit;font-size:13px;padding:7px 10px;display:inline-flex;align-items:center;gap:8px;min-width:120px;
    transition:border-color .15s;}
  .ms-trig:hover{border-color:var(--primary);color:var(--primary);}
  .ms-trig.on{border-color:var(--primary);color:var(--primary);font-weight:600;background:#f5faff;}
  .ms-caret{margin-left:auto;opacity:.6;font-size:10px;}
  .ms-pop{position:absolute;top:calc(100% + 5px);left:0;z-index:60;background:var(--container);border:1px solid var(--border);
    border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.14);padding:8px;min-width:248px;max-height:360px;overflow:auto;}
  .ms-pop[hidden]{display:none;}
  .ms-opt{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text);}
  .ms-opt:hover{background:#f5faff;}
  .ms-opt input{cursor:pointer;margin:0;}
  .ms-opt .ms-lab{white-space:nowrap;}
  .ms-opt .ms-n{margin-left:auto;color:var(--text3);font-size:11px;}
  .ms-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex:0 0 auto;}
  .ms-dot.blind{background:#d46b08;} .ms-dot.design{background:#722ed1;}
  .ms-all{font-weight:600;border-bottom:1px dashed var(--split);border-radius:0;margin-bottom:4px;padding-bottom:7px;}
  .ms-grp{margin-top:6px;}
  .ms-grp-h{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;font-weight:700;
    color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;}
  .ms-grpsel{cursor:pointer;border:1px solid var(--border);background:var(--container);color:var(--primary);
    font-size:10px;border-radius:5px;padding:1px 7px;font-family:inherit;}
  .ms-grpsel:hover{background:#f5faff;border-color:var(--primary);}
  .ms-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid var(--split);
    margin-top:8px;padding-top:8px;position:sticky;bottom:-8px;background:var(--container);}
  .ms-foot #ms-clear-lines{cursor:pointer;border:1px solid var(--border);background:var(--container);color:var(--text2);
    font-size:11px;border-radius:6px;padding:4px 10px;font-family:inherit;}
  .ms-foot #ms-clear-lines:hover{color:var(--primary);border-color:var(--primary);}
  .ms-foot .ms-cnt{font-size:11px;color:var(--text3);margin-left:auto;}
  .ms-foot #ms-done{cursor:pointer;border:1px solid var(--primary);background:var(--primary);color:#fff;font-weight:600;
    font-size:11px;border-radius:6px;padding:4px 14px;font-family:inherit;}
  .ms-foot #ms-done:hover{filter:brightness(1.06);}
  .fsearch{border:1px solid var(--border);border-radius:8px;background:var(--container);color:var(--text);
    font-family:inherit;font-size:13px;padding:7px 11px;outline:none;min-width:160px;transition:border-color .15s;}
  .fsearch:focus{border-color:var(--primary);}
  .fspring{flex:1;}
  .fclear{cursor:pointer;border:none;background:none;color:var(--text2);font-size:12px;text-decoration:underline;
    padding:0;font-family:inherit;white-space:nowrap;}
  .fclear:hover{color:var(--redo-fg);}
  .fcount{font-size:12px;color:var(--text2);white-space:nowrap;}
  .fcount b{color:var(--text);font-weight:600;}
  /* selected branch chip highlight in card footer */
  .branch-chips .bchip.sel{box-shadow:0 0 0 2px rgba(22,119,255,.18);font-weight:600;}
  .branch-chips .bchip.blind.sel{box-shadow:0 0 0 2px rgba(212,107,8,.22);}
  .branch-chips .bchip.design.sel{box-shadow:0 0 0 2px rgba(114,46,209,.22);}

  /* ---- card grid ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  .card{background:var(--container);border:1px solid var(--split);border-radius:8px;
    box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .18s ease;display:flex;flex-direction:column;}
  .card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(22,119,255,.12);transform:translateY(-2px);}
  .card .thumb{height:150px;background:#f0f2f5;overflow:hidden;position:relative;border-bottom:1px solid var(--split);}
  .card .thumb img{width:100%;display:block;object-fit:cover;object-position:top;}
  .card .thumb.placeholder{display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;
    background:repeating-linear-gradient(45deg,#fafafa,#fafafa 10px,#f3f3f3 10px,#f3f3f3 20px);}
  .card .body{padding:14px 16px 16px;display:flex;flex-direction:column;flex:1;}
  .card .ctop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;}
  .card .cnum{font-size:12px;color:var(--text2);font-weight:600;}
  .card h3{margin:0 0 2px;font-size:15px;font-weight:600;}
  .card .cen{font-size:12px;color:var(--text2);margin-bottom:12px;}
  .card .cfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto;}
  .scorepair{display:flex;gap:14px;font-size:12px;color:var(--text2);}
  .scorepair b{color:var(--text);font-weight:600;font-size:13px;}
  .scorepair .todo{color:var(--todo-fg);font-style:italic;}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;
    padding:2px 9px;border-radius:11px;white-space:nowrap;}
  .badge.pass{background:var(--pass-bg);color:var(--pass-fg);border:1px solid var(--pass-bd);}
  .badge.fix{background:var(--fix-bg);color:var(--fix-fg);border:1px solid var(--fix-bd);}
  .badge.redo{background:var(--redo-bg);color:var(--redo-fg);border:1px solid var(--redo-bd);}
  .badge.todo{background:var(--todo-bg);color:var(--todo-fg);border:1px dashed var(--todo-bd);}

  .todo-pill{display:inline-block;background:var(--todo-bg);color:var(--todo-fg);border:1px dashed var(--todo-bd);
    border-radius:4px;padding:1px 8px;font-size:12px;font-style:italic;}

  /* review status badge (待评审) */
  .badge.review{background:#e6f4ff;color:var(--primary);border:1px solid #91caff;}
  .badge.ai{opacity:.85;}
  /* superseded badge (早轮已整改 → 进入下一轮) */
  .badge.superseded{background:#f1f3f5;color:#5f6b7a;border:1px solid #d4dae0;}

  /* ---- branch chips (card footer) ---- */
  .branch-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--split);}
  .branch-chips .bchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;line-height:1;
    padding:3px 8px;border-radius:10px;background:#fafafa;color:var(--text2);border:1px solid var(--split);white-space:nowrap;}
  .branch-chips .bchip.main{background:#e6f4ff;color:var(--primary);border-color:#91caff;font-weight:600;}
  .branch-chips .bchip.design{background:#f9f0ff;color:#722ed1;border-color:#d3adf7;}
  .branch-chips .bchip.blind{background:#fff7e6;color:#d46b08;border-color:#ffd591;}
  .branch-chips .bchip .bdot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7;}
  /* small round-tag prefix inside card badge */
  .card .ctop .rtag{font-size:11px;color:var(--text2);font-weight:600;background:#f0f0f0;border-radius:4px;padding:1px 6px;}

  /* ---- round dropdown (>4 rounds) ---- */
  .tab.dropdown-tab{position:relative;}
  .rounds-menu{position:absolute;top:100%;left:0;background:var(--container);border:1px solid var(--split);
    border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,.12);padding:6px;z-index:30;min-width:200px;display:none;margin-top:4px;}
  .rounds-menu.open{display:block;}
  .rounds-menu .ritem{display:block;width:100%;text-align:left;cursor:pointer;border:none;background:none;
    padding:9px 12px;border-radius:6px;font-size:13px;color:var(--text);font-family:inherit;}
  .rounds-menu .ritem:hover{background:#f0f7ff;color:var(--primary);}
  .rounds-menu .ritem.active{background:#e6f4ff;color:var(--primary);font-weight:600;}
  .rounds-menu .ritem .rd{font-size:11px;color:var(--text3);margin-left:7px;}

  /* ---- passed (collapsed) section in current-state view ---- */
  .passed-section{margin-top:22px;}
  .passed-toggle{cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    color:var(--text2);background:var(--container);border:1px solid var(--split);border-radius:8px;
    padding:10px 16px;box-shadow:var(--shadow);font-family:inherit;transition:all .15s;}
  .passed-toggle:hover{border-color:var(--pass-bd);color:var(--pass-fg);}
  .passed-toggle .arrow{transition:transform .18s;display:inline-block;}
  .passed-toggle.open .arrow{transform:rotate(90deg);}
  .passed-grid{display:none;margin-top:14px;}
  .passed-grid.open{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  /* dimmed + slightly smaller passed cards */
  .passed-grid .card{opacity:.78;filter:saturate(.7);}
  .passed-grid .card:hover{opacity:1;filter:none;}
  .passed-grid .card .thumb{height:120px;}

  /* ---- round-snapshot placeholder card (passed earlier, untouched this round) ---- */
  .card.ph-passed{cursor:default;background:#fafafa;border-style:dashed;border-color:var(--todo-bd);
    box-shadow:none;justify-content:center;align-items:center;text-align:center;min-height:150px;padding:22px 16px;}
  .card.ph-passed:hover{transform:none;border-color:var(--todo-bd);box-shadow:none;}
  .card.ph-passed .ph-ic{font-size:26px;color:var(--pass-fg);opacity:.6;margin-bottom:8px;}
  .card.ph-passed .ph-num{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:4px;}
  .card.ph-passed .ph-name{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:6px;}
  .card.ph-passed .ph-msg{font-size:12px;color:var(--text3);line-height:1.5;}

  /* ---- verdict button group (modal) ---- */
  .verdict-group{display:flex;gap:8px;margin-top:4px;}
  .verdict-group .vbtn{flex:1;cursor:pointer;border:1px solid var(--border);background:var(--container);
    color:var(--text2);font-size:13px;font-weight:500;padding:9px 6px;border-radius:7px;font-family:inherit;
    display:flex;align-items:center;justify-content:center;gap:5px;transition:all .14s;min-height:40px;}
  .verdict-group .vbtn:hover{border-color:var(--primary);}
  .verdict-group .vbtn.on.pass{background:var(--pass-bg);border-color:var(--pass-bd);color:var(--pass-fg);font-weight:600;}
  .verdict-group .vbtn.on.fix{background:var(--fix-bg);border-color:var(--fix-bd);color:var(--fix-fg);font-weight:600;}
  .verdict-group .vbtn.on.redo{background:var(--redo-bg);border-color:var(--redo-bd);color:var(--redo-fg);font-weight:600;}
  .note-input{width:100%;margin-top:10px;border:1px solid var(--border);border-radius:7px;padding:9px 11px;
    font-family:inherit;font-size:13px;line-height:1.5;color:var(--text);resize:vertical;min-height:60px;outline:none;
    transition:border-color .15s;}
  .note-input:focus{border-color:var(--primary);}
  .verdict-src{font-size:11px;color:var(--text3);margin-top:8px;}
  .verdict-src .tag{padding:1px 7px;border-radius:4px;background:#f0f0f0;}
  .verdict-src .tag.server{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f;}
  .verdict-src .tag.ai{background:#e6f4ff;color:var(--primary);}

  /* ---- modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;
    align-items:stretch;justify-content:center;padding:0;}
  .overlay.open{display:flex;}
  .modal{background:var(--bg);width:100%;max-width:1180px;margin:24px;border-radius:12px;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.3);max-height:calc(100vh - 48px);}
  .mhead{display:flex;align-items:center;gap:14px;padding:14px 20px;background:var(--container);border-bottom:1px solid var(--split);flex-shrink:0;}
  .mhead .mnum{font-size:13px;color:var(--text2);font-weight:600;}
  .mhead h2{font-size:18px;font-weight:600;margin:0;}
  .mhead .men{font-size:12px;color:var(--text2);}
  .mhead .spacer{flex:1;}
  .navbtn{cursor:pointer;border:1px solid var(--border);background:var(--container);color:var(--text);
    width:34px;height:34px;border-radius:7px;font-size:16px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;}
  .navbtn:hover{border-color:var(--primary);color:var(--primary);}
  .closebtn{cursor:pointer;border:none;background:none;font-size:22px;color:var(--text2);line-height:1;padding:4px 8px;border-radius:6px;}
  .closebtn:hover{background:#f0f0f0;color:var(--text);}

  /* ---- modal branch tabs (above round tabs) ---- */
  .mbranch{display:flex;gap:8px;align-items:center;padding:12px 20px 0;background:var(--container);flex-wrap:wrap;}
  .mbranch .blabel{font-size:12px;color:var(--text3);margin-right:2px;}
  .mbranch .bt{cursor:pointer;font-size:13px;font-weight:500;padding:5px 13px;border-radius:14px;
    border:1px solid var(--border);background:var(--container);color:var(--text2);font-family:inherit;
    display:inline-flex;align-items:center;gap:5px;transition:all .14s;}
  .mbranch .bt:hover{border-color:var(--primary);color:var(--primary);}
  .mbranch .bt.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600;}
  .mbranch .bt.exp.active{background:#722ed1;border-color:#722ed1;}
  .mbranch .bt.blind.active{background:#d46b08;border-color:#d46b08;}
  .mbranch .bt .bro{font-size:11px;opacity:.8;font-weight:400;margin-left:5px;}
  .mbranch .exp-flag{font-size:11px;color:#d46b08;background:#fff7e6;border:1px solid #ffd591;
    border-radius:10px;padding:2px 9px;margin-left:auto;}

  /* experiment-branch read-only notice over score/verdict area */
  .exp-readonly{background:#fff7e6;border:1px solid #ffd591;border-radius:8px;padding:12px 14px;
    font-size:13px;color:#874d00;line-height:1.6;}
  .exp-readonly b{color:#d46b08;}

  .mround{display:flex;gap:6px;padding:10px 20px 0;background:var(--container);}
  .mround .rt{cursor:pointer;font-size:13px;padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid transparent;
    color:var(--text2);background:none;font-family:inherit;}
  .mround .rt.active{color:var(--primary);font-weight:600;background:var(--bg);border-color:var(--split);border-bottom-color:var(--bg);}
  .mround .rt.disabled{color:var(--text3);cursor:not-allowed;}

  .mbody{display:grid;grid-template-columns:1.55fr 1fr;gap:0;overflow:hidden;flex:1;min-height:0;}
  .mimg{background:#1f1f1f;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;}
  .mimg img{max-width:100%;border-radius:6px;cursor:zoom-in;transition:none;display:block;}
  .mimg img.zoomed{max-width:none;cursor:zoom-out;}
  .mimg .imgplaceholder{color:#888;font-size:14px;text-align:center;align-self:center;padding:40px;
    border:1px dashed #555;border-radius:8px;width:80%;}
  .minfo{background:var(--bg);overflow:auto;padding:18px 20px 24px;}

  .sec{margin-bottom:20px;}
  .sec .sectitle{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
  .sec .sectitle .ico{font-size:14px;}
  .quote{background:var(--container);border-left:3px solid var(--fix-fg);border-radius:0 6px 6px 0;
    padding:11px 14px;font-size:13px;line-height:1.65;color:var(--text);box-shadow:var(--shadow);}
  .quote.pass-q{border-left-color:var(--pass-fg);color:var(--text2);font-style:italic;}
  .prompt-d summary{cursor:pointer;color:var(--text2);font-size:13px;list-style:none;padding:3px 0;}
  .prompt-d summary::-webkit-details-marker{display:none;}
  .prompt-d summary:before{content:'▸ ';color:var(--text3);}
  .prompt-d[open] summary:before{content:'▾ ';}
  .prompt-pre{white-space:pre-wrap;word-break:break-word;background:var(--container);border:1px solid var(--border);
    border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.55;color:var(--text2);margin-top:6px;
    max-height:360px;overflow:auto;box-shadow:var(--shadow);}
  .reason{background:var(--container);border:1px solid var(--split);border-radius:6px;padding:12px 14px;box-shadow:var(--shadow);}
  .reason p{margin:0 0 8px;font-size:13px;line-height:1.6;color:var(--text);}
  .reason p:last-child{margin-bottom:0;}

  .scorebox{background:var(--container);border:1px solid var(--split);border-radius:6px;padding:14px;box-shadow:var(--shadow);}
  .scoreline{display:flex;align-items:center;gap:12px;}
  .scoreline .big{font-size:30px;font-weight:700;line-height:1;}
  .scoreline .big.ai{color:var(--primary);}
  .scoreline .big.usr{color:var(--fix-fg);}
  .scoreline .of{font-size:13px;color:var(--text2);}
  .scorebar-track{height:8px;background:#eee;border-radius:5px;overflow:hidden;flex:1;}
  .scorebar-fill{height:100%;border-radius:5px;transition:width .2s;}
  .scorebar-fill.ai{background:linear-gradient(90deg,#69b1ff,var(--primary));}
  .scorebar-fill.usr{background:linear-gradient(90deg,#ffd666,var(--fix-fg));}

  /* interactive user score 0-10 */
  .rate{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
  .rate .dot{cursor:pointer;width:30px;height:30px;border-radius:6px;border:1px solid var(--border);
    background:var(--container);font-size:13px;display:flex;align-items:center;justify-content:center;
    color:var(--text2);transition:all .12s;user-select:none;}
  .rate .dot:hover{border-color:var(--fix-fg);color:var(--fix-fg);}
  .rate .dot.on{background:var(--fix-fg);border-color:var(--fix-fg);color:#fff;font-weight:600;}
  .rate-meta{font-size:12px;color:var(--text2);margin-top:8px;display:flex;align-items:center;gap:10px;}
  .rate-meta .src{padding:1px 7px;border-radius:4px;background:#f0f0f0;font-size:11px;}
  .rate-meta .src.local{background:#e6f4ff;color:var(--primary);}
  .rate-meta .src.server{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f;}
  .sync-badge{padding:1px 7px;border-radius:4px;font-size:11px;}
  .sync-badge.synced{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f;}
  .sync-badge.localonly{background:#f0f0f0;color:var(--text2);border:1px solid var(--border);}
  .sync-badge.saving{background:#fffbe6;color:#d48806;border:1px solid #ffe58f;}
  .clearbtn{cursor:pointer;border:none;background:none;color:var(--text2);font-size:12px;text-decoration:underline;padding:0;}
  .clearbtn:hover{color:var(--redo-fg);}

  .empty-round{padding:60px 20px;text-align:center;color:var(--text3);}
  .empty-round .big{font-size:15px;margin-bottom:6px;color:var(--text2);}

  /* export dialog */
  .exp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;}
  .exp-overlay.open{display:flex;}
  .exp-box{background:var(--container);border-radius:10px;width:560px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.3);}
  .exp-head{padding:16px 20px;border-bottom:1px solid var(--split);display:flex;align-items:center;justify-content:between;gap:12px;}
  .exp-head h3{margin:0;font-size:16px;flex:1;}
  .exp-box textarea{flex:1;border:none;resize:none;padding:16px 20px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12px;line-height:1.5;color:var(--text);outline:none;min-height:280px;}
  .exp-foot{padding:12px 20px;border-top:1px solid var(--split);display:flex;gap:10px;justify-content:flex-end;align-items:center;}
  .exp-foot .hint{flex:1;font-size:12px;color:var(--text2);}

  /* ---- fullscreen image viewer (pinch-zoom) ---- */
  .fullimg-overlay{position:fixed;inset:0;background:#000;z-index:300;display:none;}
  .fullimg-overlay.open{display:block;}
  .fullimg-scroll{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;
    touch-action:pinch-zoom;display:flex;align-items:flex-start;justify-content:center;cursor:zoom-in;}
  .fullimg-scroll img{display:block;width:100%;height:auto;max-width:none;}
  /* 放大态:图放大到 ≥160% 视口宽并溢出容器 → 可滚动/拖动平移(保证总有平移空间) */
  .fullimg-scroll.zoomed{cursor:grab;align-items:flex-start;justify-content:flex-start;}
  .fullimg-scroll.zoomed.grabbing{cursor:grabbing;}
  .fullimg-scroll.zoomed img{width:auto;max-width:none;min-width:180%;height:auto;}
  .fullimg-close{position:fixed;top:max(10px,env(safe-area-inset-top));right:12px;z-index:310;
    width:46px;height:46px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;
    font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  /* ⛶ 全屏(Fullscreen API)按钮:close 左侧 */
  .fullimg-fs{position:fixed;top:max(10px,env(safe-area-inset-top));right:66px;z-index:310;
    width:46px;height:46px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;
    font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .fullimg-close:hover,.fullimg-fs:hover{background:rgba(0,0,0,.8);}
  .fullimg-hint{position:fixed;bottom:max(14px,env(safe-area-inset-bottom));left:0;right:0;z-index:310;
    text-align:center;color:rgba(255,255,255,.7);font-size:12px;pointer-events:none;}
  /* 桌面 modal 放大态:容器可拖拽平移光标 */
  .mimg.zoomed-pan{cursor:grab;}
  .mimg.zoomed-pan.grabbing{cursor:grabbing;}

  /* ---- mobile floating prev/next (modal) ---- */
  .mnav-fab{display:none;}

  /* ---- mobile in-place zoom button (⛶ → fullscreen overlay) ---- */
  .mimg-fszoom{display:none;}

  /* ---- tablet: 2-column grid ---- */
  @media (max-width:1024px) and (min-width:769px){
    .grid{grid-template-columns:repeat(2,1fr);}
    .mbody{grid-template-columns:1.4fr 1fr;}
  }

  @media (max-width:880px){
    .mbody{grid-template-columns:1fr;overflow:auto;}
    .mimg{max-height:50vh;}
  }

  /* ============ MOBILE (≤768px) ============ */
  @media (max-width:768px){
    .wrap{padding:18px 14px 56px;}
    .hero{gap:12px;margin-bottom:14px;}
    .hero h1{font-size:21px;}
    .hero .sub{font-size:12px;}
    .hero-actions{width:100%;gap:8px;}
    .hero-actions .btn{flex:1;padding:10px 12px;min-height:42px;font-size:13px;}

    /* view switcher: 「查看」标签置顶占一行,tab 排在下面横滚,整体不撑宽 */
    .viewswitch{flex-direction:column;align-items:stretch;gap:6px;margin:14px 0 0;max-width:100%;}
    .viewswitch .vs-label{align-self:flex-start;}

    /* round tabs: horizontal scroll, touch targets */
    .tabs{margin:0 -14px;padding:0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;
      flex-wrap:nowrap;scrollbar-width:none;max-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{padding:11px 16px;min-height:44px;white-space:nowrap;flex:0 0 auto;}

    /* 分隔线窄屏收紧 */
    .controls-split{margin:12px 0 12px;}

    /* filter bar: each row group on its own line; segmented + pills horizontally scrollable
       窄屏防整页横滑:filterbar 自身 max-width:100% + 各段 overflow-x 内部滚动(min-width:0 让 flex 子项可收缩,
       不把整页撑宽);DS-Pro/DS-Flash 多出两段「线」也只在该段内横滚,绝不溢出视口。 */
    .filterbar.show{flex-direction:column;align-items:stretch;gap:10px;padding:12px;margin-bottom:14px;
      max-width:100%;overflow:hidden;}
    /* 「筛选」总标签在窄屏占一整行,与下面各组分开 */
    .filterbar .filter-title{border-right:none;padding-bottom:8px;margin:0 0 2px;
      border-bottom:1px solid var(--split);width:100%;font-size:13px;}
    .fgroup{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
      max-width:100%;min-width:0;}
    .fgroup::-webkit-scrollbar{display:none;}
    .fgroup > .flabel{position:sticky;left:0;z-index:1;box-shadow:6px 0 6px -4px #fbfbfc;}
    .seg{flex-shrink:0;}
    .seg button{padding:9px 14px;min-height:40px;}
    .pills{flex-wrap:nowrap;}
    .pills button{flex:0 0 auto;min-height:36px;padding:7px 13px;}
    .fselect{min-height:40px;max-width:100%;}
    .fsearch{min-height:40px;width:100%;min-width:0;max-width:100%;}
    .fspring{display:none;}
    .fcount{align-self:flex-start;}

    /* summary: 2-up compact cards, horizontal-friendly */
    .summary{grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;max-width:100%;}
    .stat{padding:10px 10px;min-width:0;}
    .stat .lbl{font-size:11px;margin-bottom:3px;}
    .stat .val{font-size:20px;}

    /* card grid → single column */
    .grid{grid-template-columns:1fr;gap:12px;width:100%;max-width:100%;}
    .card{min-width:0;max-width:100%;}
    .card .thumb{height:160px;}
    .card .thumb img{object-fit:cover;}

    /* ---------- modal: full-screen sheet ---------- */
    .overlay{padding:0;}
    .modal{width:100%;max-width:none;margin:0;border-radius:0;max-height:100vh;height:100vh;
      height:100dvh;}
    .mhead{padding:10px 12px;gap:8px;}
    .mhead h2{font-size:16px;}
    .mhead .men{display:none;}
    .mhead .mnum{font-size:12px;}
    /* hide inline header nav arrows on mobile (use floating FABs) */
    .mhead .navbtn{display:none;}
    .closebtn{font-size:26px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;padding:0;}

    .mbranch{padding:10px 12px 0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;}
    .mbranch::-webkit-scrollbar{display:none;}
    .mbranch .blabel{display:none;}
    .mbranch .bt{flex:0 0 auto;white-space:nowrap;min-height:38px;}
    .mbranch .exp-flag{margin-left:8px;flex:0 0 auto;}

    .mround{padding:8px 12px 0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;}
    .mround::-webkit-scrollbar{display:none;}
    .mround .rt{flex:0 0 auto;white-space:nowrap;min-height:38px;padding:8px 12px;}

    /* body stacks: sticky image on top, scrollable info below */
    .mbody{display:flex;flex-direction:column;overflow:hidden;flex:1;min-height:0;position:relative;}
    /* image area = in-place zoom viewport (double-tap / pinch / pan inside this box only) */
    /* 初始高度收到 38vh,给下半信息/评分区让空间;放大看细节都在这个视口内进行 */
    .mimg{position:sticky;top:0;z-index:5;flex:0 0 auto;height:38vh;max-height:38vh;
      padding:0;align-items:stretch;justify-content:stretch;overflow:hidden;
      touch-action:none;-webkit-tap-highlight-color:transparent;}
    .mimg img{max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain;
      cursor:default;transform-origin:0 0;will-change:transform;display:block;
      -webkit-user-drag:none;user-select:none;touch-action:none;}
    .mimg img.zanim{transition:transform .22s ease;}
    .minfo{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px;}

    /* ⛶ optional entry to fullscreen overlay (image click no longer triggers it) */
    .mimg-fszoom{display:flex;position:absolute;top:8px;right:8px;z-index:9;
      width:32px;height:32px;border-radius:8px;border:none;
      background:rgba(0,0,0,.45);color:#fff;font-size:16px;line-height:1;
      align-items:center;justify-content:center;cursor:pointer;
      -webkit-tap-highlight-color:transparent;backdrop-filter:blur(2px);}
    .mimg-fszoom:active{background:rgba(0,0,0,.65);}

    /* score dots: bigger touch targets, two rows ok */
    .rate{gap:8px;}
    .rate .dot{width:38px;height:38px;font-size:14px;border-radius:8px;}
    .rate-meta{flex-wrap:wrap;row-gap:6px;}

    /* verdict buttons: ≥44px touch targets */
    .verdict-group{gap:8px;}
    .verdict-group .vbtn{min-height:46px;font-size:14px;padding:10px 6px;}
    .note-input{min-height:64px;font-size:14px;}

    /* current-state passed section: single column */
    .passed-grid.open{grid-template-columns:1fr;gap:12px;}
    .passed-toggle{width:100%;justify-content:flex-start;min-height:44px;}

    /* round dropdown menu: keep within viewport */
    .rounds-menu{left:auto;right:0;}

    /* floating prev/next FABs, thumb-reachable bottom corners */
    .mnav-fab{display:flex;position:absolute;bottom:18px;z-index:8;
      width:48px;height:48px;border-radius:50%;border:none;
      background:rgba(22,119,255,.92);color:#fff;font-size:26px;line-height:1;
      align-items:center;justify-content:center;cursor:pointer;
      box-shadow:0 4px 14px rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent;}
    .mnav-fab.prev{left:14px;}
    .mnav-fab.next{right:14px;}
  }

  /* very narrow phones: summary 2-up */
  @media (max-width:380px){
    .summary{grid-template-columns:repeat(2,1fr);}
  }
  /* 复制按钮 / 备份徽章 / 备份信息 */
  .copybtn{border:1px solid var(--border,#d8d8de);background:#fff;border-radius:6px;font-size:11px;line-height:1;
    padding:2px 5px;cursor:pointer;color:var(--text2,#555);vertical-align:middle;margin-left:4px;}
  .copybtn:hover{background:#f2f2f5;border-color:#b9b9c2;}
  .card h3 .copybtn{opacity:0;transition:opacity .12s;}
  .card:hover h3 .copybtn{opacity:1;}
  .bkbadge{font-size:12px;margin-left:4px;cursor:default;}
  .mcopy{font-size:12px;padding:4px 9px;font-weight:600;}
  .mbackup{padding:6px 16px;font-size:12px;border-bottom:1px solid var(--border,#ececf0);}
  .mbackup.has{color:var(--text2,#555);background:#f7faf7;}
  .mbackup.none{color:#b06a00;background:#fff8ec;}
  .mbackup code{background:#eceef2;padding:1px 5px;border-radius:4px;font-size:11px;}
  .mbackup .bkrestore,.mbackup .nobk{font-size:11px;}
  .mbackup .bkrestore{margin-left:6px;border:1px solid #cfd6cf;background:#fff;border-radius:5px;padding:2px 7px;cursor:pointer;color:#3a7a3a;}
  .mbackup .bkrestore:hover{background:#eef5ee;}
</style>

<body>

<!--
  ============================================================================
  数据块说明 / 三层结构:原型 → 分支(branch) → 轮次(round)
  ============================================================================
  本页所有内容 fetch 同目录 library.json(示例库画廊与本报告共用一份数据源),
  只取其中有 branches 的已测模块渲染。框架代码不需要改;改数据改 library.json。

  ┌─ 三层模型 ───────────────────────────────────────────────────────────┐
  │  模块(原型)                                                          │
  │    └─ branches{}     ← 不同复刻线路 / 测试目标(主应用 + 临时实验实例)│
  │         main         主应用线 = appslib 生产实例(当前状态/汇总主轴)   │
  │         design       设计稿线 = 先出设计稿再搭(对照实验)             │
  │         blind        盲测线   = 裸 agent+skill+原型URL 全流程(对照)  │
  │              └─ rounds{}  ← 每条分支自己的轮次(r1/r2…,可缺省某轮)    │
  │                   └─ {image,reasoning,aiScore,userNote,userScore,verdict}│
  └──────────────────────────────────────────────────────────────────────┘
  ★ 所有分支平等:每条线都可独立评分 / 评结论 / 写评语(主应用和临时测试实例都可能是测试目标)。

  顶层字段:
    project   : 报告标题信息
    reviewer  : 评审人(显示在副标题)
    rounds[]  : ★全局★轮次定义(id/label 跨所有分支共享),顺序即 tab 顺序
        - id    : 轮次唯一标识(如 "r1" / "r2"),用作 main 线图片目录名 acceptance-<id>
        - label : tab 显示名(如 "第一次生成")
        - date  : 日期字符串,空字符串 "" = 待补(tab 显示"待补")
    modules[] : 20 个模块,顺序即卡片顺序
        - id        : 模块编号字符串 "01".."20"
        - name / en : 中文名 / 英文名
        - branches  : 以分支 id 为 key 的对象。**main 必有**;design/blind 仅部分模块有,缺省即不显示该线。
            "main":   { "label":"主应用线", "baseUrl":"http://127.0.0.1:14220", "note":"主应用 appslib",
                        "rounds":{ "r1":{…}, "r2":{…} } }
            "design": { "label":"设计稿线", "baseUrl":"…", "note":"expagents 实验,实例已清",
                        "rounds":{ "r1":{…} } }
            "blind":  { "label":"盲测线",   "baseUrl":"…", "note":"…", "rounds":{ "r1":{…} } }
          分支可选元数据:baseUrl(实例地址)、note(实例说明);modal 分支区会显示。
          每个 round 数据结构(不分分支,完全一致):
            {
              image    : "./acceptance-r1/pair-01.jpg"  对比图相对路径(空/缺 = 待补占位)
              reasoning: ["第一段做法","第二段…"]        AI 推理过程,数组多段,空数组=待补
              aiScore  : 9                               AI 自评分 0-10,null=待补
              userNote : "用户评价原文"                   空字符串=无评价
              userScore: 8                               用户评分 0-10 默认值,null=未打分
              verdict  : "pass" | "fix" | "redo" | ""    JSON 记录结论(在 modal 里作 AI 建议显示),空=待补
            }

  ---- 渲染规则(分支语义)----
  • 当前状态视图 / 轮次快照视图 / 汇总条 / 排序:**以 main 分支为生命周期主轴**(主线是主应用)。
  • 卡片底部「分支 chips」:列出该模块拥有的所有分支(如「主应用线 R2 · 设计稿线 1轮 · 盲测线 1轮」);只有 main 一条时不显示。
  • modal 内分支 tab(轮次 tab 上方):默认 main;只有一条分支时隐藏。切分支 → 图/推理/评分区联动,**每条分支都可评分/评结论/写评语**。
  • 评分落盘:分支感知。user-scores.json = { branch: { round: { module: {score,verdict,note,ts} } } };
    POST body 带可选 branch(缺省 main,兼容旧调用);读到旧格式(顶层直接 round)自动当 main 迁移。

  ---- 追加一轮 R3(只改 JSON)----
  1) rounds[] 末尾追加: {"id":"r3","label":"…","date":"2026-06-xx"}
  2) 在需要的分支 rounds 下加 "r3":{…真实数据…}(某分支没这轮就不加)。
  3) 图片放到 ./acceptance-r3/pair-NN.jpg(非 main 分支用 ./acceptance-<branch>-r3/…)。
  4) 汇总条/tab/统计自动重算。

  ---- 加一条新分支(如 "mcp" 线)----
  1) 在某模块 branches 下加: "mcp":{ "label":"MCP 线", "baseUrl":"…", "note":"…", "rounds":{ "r1":{…} } }。
  2) 图片建目录 ./acceptance-mcp-r1/ 并在 image 里引相对路径。
  3) 分支 chips / modal 分支 tab 自动出现;新分支默认即可评分(无需改 JS)。
     branch id 约束:小写字母开头,字母数字-_,≤24 字符(API 校验同步)。

  ---- 回填用户评分 ----
  用户在 modal 任意分支打的分存在 localStorage / 落盘 user-scores.json(按分支独立)。
  点顶部「导出评分」→ 弹窗 JSON 片段(分支感知结构)抄回对应分支/轮次的 userScore 即可固化。
  ============================================================================
-->
