<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trade ERP — Inventory</title>
<style>
:root{
  --bg:#f5f6f8; --surface:#ffffff; --surface-2:#fafbfc;
  --txt:#1f2430; --txt-mut:#6b7280; --txt-soft:#9aa1ad;
  --border:#e7e9ee; --border-soft:#eef0f3;
  --accent:#4f46e5; --accent-soft:#eef0ff;
  --green:#10b981; --green-soft:#e7f8f1;
  --amber:#f59e0b; --amber-soft:#fef3e2;
  --blue:#0ea5e9; --blue-soft:#e2f4fd; --violet:#8b5cf6; --violet-soft:#f1ebff;
  --slate:#64748b; --slate-soft:#eef0f3; --red:#ef4444; --red-soft:#fdecec;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 14px rgba(16,24,40,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.55 -apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt)}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
.app{display:grid;grid-template-columns:212px 1fr;min-height:100vh}
/* ---- sidebar ---- */
.side{background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:9px;padding:6px 8px 14px;font-weight:700;font-size:15px}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;color:var(--txt-mut);font-weight:500;text-align:left;width:100%}
.nav button svg{width:18px;height:18px;flex:0 0 auto}
.nav button:hover{background:var(--surface-2);color:var(--txt)}
.nav button.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav .ct{margin-left:auto;font-size:11px;background:#eef0f3;color:var(--txt-mut);border-radius:20px;padding:0 7px;font-weight:600}
.nav button.on .ct{background:#fff;color:var(--accent)}
.nav .sec{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--txt-soft);padding:12px 10px 4px}
.side .me{margin-top:auto;display:flex;align-items:center;gap:9px;padding:8px;border-top:1px solid var(--border-soft)}
.av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;flex:0 0 auto}
/* ---- main ---- */
.main{min-width:0;display:flex;flex-direction:column}
.top{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:5}
.top h1{font-size:17px;font-weight:700}
.top .sub{color:var(--txt-soft);font-size:12.5px}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;width:260px;color:var(--txt-mut)}
.search svg{width:15px;height:15px;flex:0 0 auto}
.search input{border:0;background:none;outline:none;width:100%;font:inherit;color:var(--txt)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border-radius:9px;padding:8px 14px;font-weight:600;font-size:13px;box-shadow:var(--shadow)}
.btn:hover{filter:brightness(1.07)}
.btn svg{width:16px;height:16px}
.btn.ghost{background:var(--surface);color:var(--txt);border:1px solid var(--border);box-shadow:none}
.btn.ghost:hover{background:var(--surface-2)}
.btn.ai{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
.body{padding:22px;flex:1}
.view{display:none}.view.on{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* ---- KPI ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;box-shadow:var(--shadow)}
.kpi .kl{color:var(--txt-mut);font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;margin-bottom:9px}
.kpi .kl .dot{width:8px;height:8px;border-radius:50%}
.kpi .kv{font-size:25px;font-weight:750;letter-spacing:-.4px}
.kpi .kd{font-size:11.5px;color:var(--txt-soft);margin-top:3px}
.kpi .kd b{color:var(--green)}
.kpi .kd b.warn{color:var(--amber)}
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.grid2.even{grid-template-columns:1fr 1fr}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow)}
.card .hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border-soft)}
.card .hd h3{font-size:14px;font-weight:700}
.card .hd .lk{font-size:12.5px;color:var(--accent);font-weight:600;cursor:pointer}
.card .bd{padding:8px 16px 14px}
/* chart bars */
.fn{display:flex;flex-direction:column;gap:11px;padding:14px 16px}
.fn .row{display:grid;grid-template-columns:104px 1fr 84px;align-items:center;gap:10px;font-size:12.5px}
.fn .nm{color:var(--txt-mut);display:flex;align-items:center;gap:7px}.fn .nm .dot{width:8px;height:8px;border-radius:3px}
.fn .bar{height:22px;background:var(--surface-2);border-radius:6px;overflow:hidden;position:relative}
.fn .bar i{display:block;height:100%;border-radius:6px;transition:width .5s}
.fn .vl{text-align:right;font-weight:700}
.fn .vl small{color:var(--txt-soft);font-weight:600;font-size:11px}
/* feed / alert list */
.feed{display:flex;flex-direction:column}
.feed .it{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.feed .it:last-child{border-bottom:0}
.tic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;font-weight:800;font-size:11px}
.tic svg{width:15px;height:15px}
.feed .it .tx{min-width:0;flex:1}
.feed .it .tx .s{font-weight:600;font-size:13px}
.feed .it .tx .m{color:var(--txt-soft);font-size:11.5px;margin-top:1px}
.alert{display:flex;gap:11px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.alert:last-child{border-bottom:0}
.alert .sq{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;font-weight:800;font-size:11px;color:#fff}
.alert .ax{flex:1;min-width:0}
.alert .ax .s{font-weight:600;font-size:13px}
.alert .ax .m{color:var(--txt-soft);font-size:11.5px;margin-top:1px}
.alert .sug{text-align:right;flex:0 0 auto}
.alert .sug .q{font-weight:750;font-size:14px}
.alert .sug .l{font-size:10.5px;color:var(--txt-soft)}
.tag{display:inline-block;font-size:11px;font-weight:600;border-radius:20px;padding:2px 9px;white-space:nowrap}
.pill{font-size:10.5px;font-weight:600;border-radius:20px;padding:1px 8px}
/* ---- table ---- */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
.tbl th{text-align:left;color:var(--txt-mut);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border-soft);white-space:nowrap}
.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr.clk{cursor:pointer}
.tbl tbody tr.clk:hover{background:var(--surface-2)}
.tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl th.num{text-align:right}
.lead{display:flex;align-items:center;gap:10px}
.lead .sq{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:10px;flex:0 0 auto}
.lead .nm{font-weight:600}.lead .su{color:var(--txt-soft);font-size:11.5px}
.toolbar{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;flex-wrap:wrap}
.seg button{padding:7px 13px;font-size:12.5px;color:var(--txt-mut);font-weight:600;border-right:1px solid var(--border)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--accent);color:#fff}
.tcount{font-weight:600;color:var(--txt-mut);font-size:13px}
.stars{color:#f59e0b;letter-spacing:1px;font-size:12px}
.stars .off{color:#d7dbe2}
/* ---- drawer & modal ---- */
.scrim{position:fixed;inset:0;background:rgba(20,24,33,.42);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:460px;max-width:94vw;background:var(--surface);box-shadow:-8px 0 30px rgba(16,24,40,.14);transform:translateX(100%);transition:.26s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
.drawer.on{transform:none}
.drawer.wide{width:660px}
.dh{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border-soft)}
.dh .sq{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;flex:0 0 auto}
.dh .co{font-size:17px;font-weight:750}
.dh .nm{color:var(--txt-mut);font-size:12.5px;margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dh .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--txt-mut)}
.dh .x:hover{background:var(--surface-2)}
.dbd{padding:18px 20px;overflow:auto;flex:1}
.cstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.cstrip .cs{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.cstrip .cv{font-size:18px;font-weight:750;letter-spacing:-.3px}
.cstrip .cl{font-size:11px;color:var(--txt-mut);margin-top:2px}
.kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
.kv .k{color:var(--txt-mut)}.kv .v{font-weight:600;text-align:right}
.sec-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--txt-soft);margin:18px 0 10px;display:flex;align-items:center;justify-content:space-between}
.subtbl{width:100%;border-collapse:collapse;font-size:12.5px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.subtbl th{text-align:left;background:var(--surface-2);color:var(--txt-mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;border-bottom:1px solid var(--border)}
.subtbl td{padding:8px 10px;border-bottom:1px solid var(--border-soft)}
.subtbl tr:last-child td{border-bottom:0}
.subtbl td.num,.subtbl th.num{text-align:right;font-variant-numeric:tabular-nums}
.subtbl tfoot td{font-weight:750;background:var(--surface-2)}
.dactions{display:flex;gap:9px;padding:14px 20px;border-top:1px solid var(--border-soft);flex-wrap:wrap}
.banner{border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);opacity:0;pointer-events:none;transition:.2s;z-index:50;background:var(--surface);border-radius:15px;width:540px;max-width:94vw;box-shadow:0 24px 60px rgba(16,24,40,.24);display:flex;flex-direction:column;max-height:90vh}
.modal.on{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
.modal.big{width:640px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border-soft)}
.mh h3{font-size:16px;font-weight:750}
.mh .x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--txt-mut)}
.mh.ai{background:linear-gradient(135deg,#6d5cf0,#8b5cf6);color:#fff;border-bottom:0}
.mh.ai .sub{font-size:11.5px;opacity:.85;font-weight:500}
.mh.ai .x{color:#fff}
.mb{padding:18px 20px;overflow:auto}
.mf{display:flex;justify-content:flex-end;gap:9px;padding:14px 20px;border-top:1px solid var(--border-soft)}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11.5px;font-weight:600;color:var(--txt-mut);margin-bottom:6px}
.fld input,.fld select{width:100%;border:1px solid var(--border);border-radius:9px;padding:9px 11px;font:inherit;background:var(--surface);outline:none}
.fld input:focus,.fld select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.empty{text-align:center;color:var(--txt-soft);font-size:13px;padding:22px 0}
/* AI panel */
.ai-note{background:var(--violet-soft);border:1px solid #e2d8fb;border-radius:11px;padding:12px 14px;font-size:12.5px;color:#5b4a9e;margin-bottom:14px}
.ai-sec{font-size:12px;font-weight:700;color:var(--violet);text-transform:uppercase;letter-spacing:.4px;margin:16px 0 8px}
/* blueprint */
.bp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bp-full{grid-column:1/-1}
.bp{background:var(--surface);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);padding:16px 18px}
.bp h3{font-size:14px;font-weight:750;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bp .lead-txt{color:var(--txt-mut);font-size:12.5px;margin-bottom:12px}
.bp .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;flex:0 0 auto}
.bp table{width:100%;border-collapse:collapse;font-size:12px}
.bp th{text-align:left;color:var(--txt-mut);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;padding:7px 8px;border-bottom:1px solid var(--border)}
.bp td{padding:7px 8px;border-bottom:1px solid var(--border-soft);vertical-align:top}
.bp td code{background:var(--surface-2);border-radius:4px;padding:1px 5px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px}
.wf{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.wf:last-child{border-bottom:0}
.wf .n{width:24px;height:24px;border-radius:7px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:12px;flex:0 0 auto}
.wf .t{font-weight:700;font-size:13px}
.wf .d{color:var(--txt-mut);font-size:12px;margin-top:2px}
.wf .trg{display:inline-block;background:var(--amber-soft);color:#b45309;border-radius:5px;padding:1px 6px;font-size:11px;font-weight:600;margin-top:5px}
@media(max-width:1080px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2,.grid2.even,.bp-grid{grid-template-columns:1fr}}
@media(max-width:680px){.app{grid-template-columns:1fr}.side{display:none}.kpis{grid-template-columns:1fr 1fr}.search{display:none}}
/* ===== spec viewer (reusable) ===== */
.specbtn{position:fixed;right:18px;bottom:18px;z-index:60;background:#1f2430;color:#fff;border-radius:24px;padding:10px 16px;font-weight:600;font-size:13px;box-shadow:0 6px 20px rgba(16,24,40,.22);cursor:pointer;border:0}
.specbtn:hover{background:#4f46e5}
.spec-overlay{position:fixed;inset:0;background:rgba(20,24,33,.5);z-index:61;display:none;justify-content:flex-end}
.spec-overlay.on{display:flex}
.spec-panel{width:780px;max-width:96vw;background:#fff;height:100vh;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(16,24,40,.2)}
.spec-h{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid #eef0f3}
.spec-h b{font-size:15px}.spec-h .spec-sub{color:#9aa1ad;font-size:12px}
.spec-h .spec-x{margin-left:8px;width:30px;height:30px;border-radius:8px;border:0;background:none;cursor:pointer;color:#6b7280;font-size:16px}
.spec-lang{margin-left:auto;display:inline-flex;border:1px solid #e7e9ee;border-radius:7px;overflow:hidden}
.spec-lang button{border:0;background:#fff;padding:4px 11px;font-size:12px;cursor:pointer;color:#6b7280}
.spec-lang button.on{background:#1f2430;color:#fff}
.spec-h .spec-x:hover{background:#f0f1f4}
.spec-doc{padding:18px 24px 60px;overflow:auto;font-size:13.5px;line-height:1.62;color:#1f2430}
.spec-doc h1{font-size:20px;margin:18px 0 8px}
.spec-doc h2{font-size:17px;margin:20px 0 8px;padding-top:10px;border-top:1px solid #eef0f3}
.spec-doc h3{font-size:15px;margin:14px 0 6px}
.spec-doc h4{font-size:13.5px;margin:12px 0 4px;color:#4b5563}
.spec-doc p{margin:6px 0}.spec-doc ul{margin:6px 0 6px 20px}.spec-doc li{margin:2px 0}
.spec-doc code{background:#f0f1f4;border-radius:4px;padding:1px 5px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.spec-doc strong{font-weight:700}
.spec-doc hr{border:0;border-top:1px solid #e7e9ee;margin:16px 0}
.spec-doc blockquote{border-left:3px solid #c7cbd4;margin:8px 0;padding:4px 12px;color:#4b5563;background:#fafbfc}
.spec-doc table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12.5px}
.spec-doc th,.spec-doc td{border:1px solid #e7e9ee;padding:6px 9px;text-align:left;vertical-align:top}
.spec-doc th{background:#f6f7f9;font-weight:700}
.spec-doc a{color:#4f46e5}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="logo">T</span> Trade ERP</div>
    <nav class="nav" id="nav">
      <button data-v="dashboard" class="on">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Dashboard</button>
      <button data-v="products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3.5 7.5 12 3l8.5 4.5v9L12 21l-8.5-4.5z"/><path d="M3.5 7.5 12 12l8.5-4.5M12 12v9"/></svg>
        Products <span class="ct" id="ct-products">0</span></button>
      <button data-v="purchase">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 3H3"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
        Purchase Orders <span class="ct" id="ct-po">0</span></button>
      <button data-v="sales">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16v4H4zM5 9v10h14V9M9 13h6"/></svg>
        Sales Orders <span class="ct" id="ct-so">0</span></button>
      <button data-v="inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16v13H4zM4 7l2-3h12l2 3M9 12h6"/></svg>
        Inventory</button>
      <button data-v="suppliers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21V8l6-4 6 4v13M15 21V11l6 0v10M6 12h3M6 16h3"/></svg>
        Suppliers <span class="ct" id="ct-sup">0</span></button>
      <div class="sec">Reference</div>
      <button data-v="blueprint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="3.5" width="17" height="17" rx="2.5"/><path d="M3.5 9h17M9 9v11.5"/></svg>
        Blueprint</button>
    </nav>
    <div class="me"><span class="av" style="background:#4f46e5">DC</span><div><div style="font-weight:600;font-size:12.5px">Dana Cole</div><div style="color:var(--txt-soft);font-size:11px">Operations Manager</div></div></div>
  </aside>

  <div class="main">
    <header class="top">

/* ---- dashboard ---- */
function renderDashboard(){

  const openSO=sos.filter(s=>s.status==='draft'||s.status==='confirmed');
  const kpi=(label,dot,val,desc)=>`<div class="kpi"><div class="kl"><span class="dot" style="background:${dot}"></span>${label}</div><div class="kv">${val}</div><div class="kd">${desc}</div></div>`;
  // low-stock alerts
  const alertHtml=low.length?low.sort((a,b)=>(a.stock/a.reorder)-(b.stock/b.reorder)).map(p=>{const sup=supById(p.supId);
    return `<div class="alert">
      <span class="sq" style="background:${CAT_COLOR[p.cat]}">${p.sku.slice(0,2)}</span>
      <div class="ax"><div class="s">${esc(p.name)} ${pill(STK_ST,stockStatus(p))}</div>
        <div class="m">${num(p.stock)} on hand · reorder at ${num(p.reorder)} · ${esc(sup?sup.name:'—')} (${sup?sup.lead:'?'}d lead)</div></div>
      <div class="sug"><div class="q">+${num(suggestQty(p))}</div><div class="l">suggested</div></div>
    </div>`;}).join(''):'<div class="empty">All products above reorder point 🎉</div>';
  // PO / SO status charts
  const poChart=Object.keys(PO_ST).map(k=>{const arr=pos.filter(p=>p.status===k);const v=arr.reduce((a,p)=>a+poTotal(p.id),0);const mx=Math.max(...pos.map(p=>poTotal(p.id)),1)*pos.length/6+1;
    const mxc=Math.max(...Object.keys(PO_ST).map(kk=>pos.filter(p=>p.status===kk).length),1);
    return `<div class="row"><div class="nm"><span class="dot" style="background:${PO_ST[k][2]}"></span>${PO_ST[k][0]}</div>
      <div class="bar"><i style="width:${Math.max(arr.length/mxc*100,4)}%;background:${PO_ST[k][2]}"></i></div>
      <div class="vl">${arr.length} <small>${money(v)}</small></div></div>`;}).join('');
  const soChart=Object.keys(SO_ST).map(k=>{const arr=sos.filter(s=>s.status===k);const v=arr.reduce((a,s)=>a+soTotal(s.id),0);
    const mxc=Math.max(...Object.keys(SO_ST).map(kk=>sos.filter(s=>s.status===kk).length),1);
    return `<div class="row"><div class="nm"><span class="dot" style="background:${SO_ST[k][2]}"></span>${SO_ST[k][0]}</div>
      <div class="bar"><i style="width:${Math.max(arr.length/mxc*100,4)}%;background:${SO_ST[k][2]}"></i></div>
      <div class="vl">${arr.length} <small>${money(v)}</small></div></div>`;}).join('');
  // movements feed
  const feed=movements.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,7).map(m=>{const p=prodById(m.prodId);const s=MV_ST[m.type];
    const sign=m.type==='out'?'−':(m.type==='adjust'&&m.qty<0?'−':'+');
    return `<div class="it"><span class="tic" style="background:${s[1]};color:${s[2]}">${m.type==='in'?'▼':m.type==='out'?'▲':'±'}</span>
      <div class="tx"><div class="s">${esc(p?p.name:'—')} <span style="color:${s[2]};font-weight:700">${sign}${num(Math.abs(m.qty))}</span></div>
        <div class="m">${esc(m.refNo)} · ${esc(m.note)}</div></div>
      <span class="tag" style="background:${s[1]};color:${s[2]}">${m.date.slice(5)}</span></div>`;}).join('');

  $('#v-dashboard').innerHTML=`
    <div class="kpis">
      ${kpi('Inventory value','#4f46e5',money(invValue()),products.length+' SKUs at cost')}
      ${kpi('Low-stock items','#f59e0b',low.length,'<b class="warn">below reorder point</b>')}

    </div>
    <div class="grid2">
      <div class="card"><div class="hd"><h3>Low-stock alerts</h3><span class="lk" onclick="openAI()">✨ AI reorder plan</span></div><div class="bd">${alertHtml}</div></div>
      <div class="card"><div class="hd"><h3>Recent stock movements</h3><span class="lk" onclick="go('inventory')">Full log →</span></div><div class="bd"><div class="feed">${feed}</div></div></div>
    </div>

      <div class="card"><div class="hd"><h3>Purchase orders by status</h3><span class="lk" onclick="go('purchase')">Open →</span></div><div class="fn">${poChart}</div></div>

/* ============ actions (workflows) ============ */
function approvePO(id){const p=poById(id);p.status='approved';renderAll();refreshDrawer();}
function closePO(id){const p=poById(id);p.status='closed';renderAll();refreshDrawer();}
function receivePO(id){const p=poById(id);
  // workflow 1: PO received → increment stock + create stock_movement(in) per line
  poItemsOf(id).forEach(i=>{const pr=prodById(i.prodId);if(pr){pr.stock+=i.qty;
    movements.push({id:nmid(),prodId:i.prodId,type:'in',qty:i.qty,ref:'PO',refNo:p.no,note:'Goods receipt — '+(supById(p.supId)||{name:''}).name,date:TODAY});}});
  p.status='received';renderAll();refreshDrawer();
}
function confirmSO(id){const s=soById(id);s.status='confirmed';renderAll();refreshDrawer();}
function closeSO(id){const s=soById(id);s.status='closed';renderAll();refreshDrawer();}
function fulfilSO(id){const s=soById(id);const items=soItemsOf(id);
  // workflow 2: check sufficient stock, else block
  const short=items.find(i=>{const pr=prodById(i.prodId);return pr&&pr.stock<i.qty;});
  if(short){renderAll();refreshDrawer();return;}
  items.forEach(i=>{const pr=prodById(i.prodId);if(pr){pr.stock-=i.qty;
    movements.push({id:nmid(),prodId:i.prodId,type:'out',qty:i.qty,ref:'SO',refNo:s.no,note:'Shipment to '+(custById(s.custId)||{name:''}).name,date:TODAY});}});
  s.status='fulfilled';renderAll();refreshDrawer();
}

      <div class="ai-note">✨ <b>Ops Assistant</b> can pre-fill line items from this supplier's low-stock products with lead-time-aware quantities.
        <div style="margin-top:8px"><button class="btn ai sm" onclick="aiDraftPO()">✨ Draft line items with AI</button></div></div>

function renderPoDraft(){const el=$('#po-draft');if(!el)return;
  if(!_poDraft.length){el.innerHTML='<div class="empty">No line items yet — add with AI, or save an empty draft.</div>';return;}
  const t=_poDraft.reduce((a,i)=>a+i.qty*i.cost,0);
  el.innerHTML=`<table class="subtbl"><thead><tr><th>Product</th><th class="num">Qty</th><th class="num">Unit cost</th><th class="num">Subtotal</th></tr></thead>
    <tbody>${_poDraft.map(i=>{const pr=prodById(i.prodId);return `<tr><td>${esc(pr?pr.name:'—')}</td><td class="num">${num(i.qty)}</td><td class="num">${money2(i.cost)}</td><td class="num" style="font-weight:700">${money(i.qty*i.cost)}</td></tr>`;}).join('')}</tbody>
    <tfoot><tr><td colspan="3">Total</td><td class="num">${money(t)}</td></tr></tfoot></table>
    ${t>=APPROVE_LIMIT?`<div class="banner" style="background:#fef3e2;color:#b45309;margin-top:10px">⚠ ${money(t)} ≥ ${money(APPROVE_LIMIT)} — this PO will require manager approval.</div>`:''}`;
}
function aiDraftPO(){const supId=+$('#po-sup').value;const cand=lowStock().filter(p=>p.supId===supId);
  _poDraft=cand.map(p=>({prodId:p.id,qty:suggestQty(p),cost:p.cost}));
  if(!_poDraft.length){const p=products.filter(x=>x.supId===supId)[0];if(p)_poDraft=[{prodId:p.id,qty:p.reorder,cost:p.cost}];}
  renderPoDraft();
}
function savePO(){const supId=+$('#po-sup').value;const id=npid();
  pos.unshift({id,no:nextNo(pos,'PO-2026-'),supId,status:'draft',order:TODAY,expected:$('#po-exp').value||TODAY,owner:'Sam Ortiz'});

}

/* ============ AI assistant ============ */
function openAI(){const low=lowStock();
  const bySup={};low.forEach(p=>{(bySup[p.supId]=bySup[p.supId]||[]).push(p);});
  const rows=low.sort((a,b)=>(a.stock/a.reorder)-(b.stock/b.reorder)).map(p=>{const s=supById(p.supId);
    return `<tr><td>${esc(p.name)}<div style="color:var(--txt-soft);font-size:11px">${esc(p.sku)}</div></td><td class="num">${num(p.stock)}</td><td class="num" style="color:var(--txt-mut)">${num(p.reorder)}</td><td class="num" style="font-weight:750;color:var(--violet)">+${num(suggestQty(p))}</td><td>${esc(s?s.name:'—')}<div style="color:var(--txt-soft);font-size:11px">${s?s.lead:'?'}d lead</div></td></tr>`;}).join('');
  const best=suppliers.slice().sort((a,b)=>b.rating-a.rating)[0];
  const slow=suppliers.slice().sort((a,b)=>b.lead-a.lead)[0];
  const nPO=Object.keys(bySup).length;
  $('#modal').className='modal big';
  $('#modal').innerHTML=`
    <div class="mh ai"><div><h3>✨ Ops Assistant</h3><div class="sub">AI employee · OpenCode Zen gateway</div></div><button class="x" onclick="closeOverlay()">✕</button></div>
    <div class="mb">
      <div class="ai-note">I scanned <b>${products.length} products</b> against reorder points and supplier lead times. <b>${low.length}</b> items are below their reorder point across <b>${nPO}</b> supplier${nPO!==1?'s':''}. Suggested quantities target 2× the reorder point, rounded to the pack.</div>
      <div class="ai-sec">Reorder suggestion</div>
      <table class="subtbl"><thead><tr><th>Product</th><th class="num">On hand</th><th class="num">Reorder</th><th class="num">Suggested</th><th>Supplier</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty">Nothing to reorder</td></tr>'}</tbody></table>
      <div class="ai-sec">Supplier performance summary</div>
      <ul style="margin:0 0 4px 18px;color:var(--txt);font-size:13px;line-height:1.7">
        <li>Top-rated: <b>${esc(best.name)}</b> (${best.rating.toFixed(1)}★, ${best.lead}d lead).</li>
        <li>Longest lead time: <b>${esc(slow.name)}</b> at ${slow.lead} days — order early to avoid stockouts.</li>
        <li>Avg lead time across ${suppliers.length} suppliers: <b>${Math.round(suppliers.reduce((a,s)=>a+s.lead,0)/suppliers.length)} days</b>.</li>
      </ul>
      <div class="ai-sec">Order summary</div>
      <div style="font-size:12.5px;color:var(--txt-mut)">Open any PO or SO drawer and ask me to summarize its line items, totals and fulfilment risk.</div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeOverlay()">Dismiss</button><button class="btn ai" onclick="aiCreatePOs()" ${low.length?'':'disabled'}>Create ${nPO} draft PO${nPO!==1?'s':''}</button></div>`;
  openOverlay('modal');
}
function aiCreatePOs(){const low=lowStock();const bySup={};low.forEach(p=>{(bySup[p.supId]=bySup[p.supId]||[]).push(p);});
  Object.keys(bySup).forEach(supId=>{const id=npid();
    pos.unshift({id,no:nextNo(pos,'PO-2026-'),supId:+supId,status:'draft',order:TODAY,expected:'2026-07-24',owner:'Sam Ortiz'});
    bySup[supId].forEach(p=>poItems.push({id:nmid(),poId:id,prodId:p.id,qty:suggestQty(p),cost:p.cost}));});
  closeOverlay();F.po='draft';renderAll();go('purchase');
}

/* ============ blueprint ============ */
function renderBlueprint(){
  const dm=[
    ['products','name','sku, category (enum), unit, cost_price, sell_price, reorder_point, stock_on_hand','→ supplier (m2o)'],
    ['suppliers','name','contact, email, phone, lead_time_days, rating','← products, purchase_orders'],
    ['customers','name','contact, email, phone, tier (A/B/C)','← sales_orders'],
    ['purchase_orders','po_no','status (enum), order_date, expected_date, total','→ supplier, owner · ← items'],
    ['purchase_order_items','—','qty, unit_cost, subtotal','→ purchase_order, product'],
    ['sales_orders','so_no','status (enum), order_date, total','→ customer, owner · ← items'],
    ['sales_order_items','—','qty, unit_price, subtotal','→ sales_order, product'],
    ['stock_movements','ref_no','type (in/out/adjust), qty, ref_type, note','→ product'],
  ];
  const wfs=[
    ['PO received','purchase_order.status → received','For each line item: increment product.stock_on_hand by qty and create a stock_movement (type=in, ref=PO). Realtime upsert.'],
    ['SO fulfilled','sales_order.status → fulfilled','Per item: check sufficient stock. If OK, decrement product.stock_on_hand + create stock_movement (type=out). If short, block/flag.'],

    ['purchaser','Sam Ortiz','CRUD purchase_orders + suppliers; read products; submit for approval. Sees own POs by default view.'],
    ['sales','Jess Kim','CRUD sales_orders + customers; read products.'],
    ['manager','Dana Cole','All records + approve POs (sees all POs).'],
    ['admin','Admin User','Full access to every collection and setting.'],
  ];
  const dmRows=dm.map(r=>`<tr><td><code>${r[0]}</code></td><td>${r[1]==='—'?'—':'<code>'+r[1]+'</code>'}</td><td>${r[2]}</td><td style="color:var(--txt-mut)">${r[3]}</td></tr>`).join('');
  const wfRows=wfs.map((w,i)=>`<div class="wf"><div class="n">${i+1}</div><div><div class="t">${w[0]}</div><div class="d">${w[2]}</div><span class="trg">trigger: ${w[1]}</span></div></div>`).join('');
  const roleRows=roles.map(r=>`<tr><td><span class="pill" style="background:var(--accent-soft);color:var(--accent)">${r[0]}</span></td><td style="font-weight:600">${r[1]}</td><td style="color:var(--txt-mut)">${r[2]}</td></tr>`).join('');

    return `<tr><td style="font-weight:600">${esc(u)}</td><td><code>${un}</code></td><td>${rn}</td></tr>`;}).join('');
  $('#v-blueprint').innerHTML=`

      <div class="bp bp-full">
        <h3><span class="ic" style="background:#4f46e5">◱</span> Data model — 8 collections</h3>
        <div class="lead-txt">Relations named as nouns (never <code>*_id</code>). Items belongTo their order + product; orders belongTo supplier/customer + owner (users). <code>stock_on_hand</code> is maintained by workflows, not typed by hand.</div>
        <div class="tbl-wrap"><table><thead><tr><th>Collection</th><th>Title field</th><th>Key fields</th><th>Relations</th></tr></thead><tbody>${dmRows}</tbody></table></div>
      </div>
      <div class="bp">
        <h3><span class="ic" style="background:#f59e0b">⚡</span> Workflows — 4</h3>
        <div class="lead-txt">The automation that keeps stock correct and money-safe.</div>
        ${wfRows}
      </div>
      <div class="bp">
        <h3><span class="ic" style="background:#10b981">🛡</span> Roles — 5</h3>
        <div class="lead-txt">Data-scope note: purchaser sees own POs by default view; manager sees all.</div>
        <div class="tbl-wrap"><table><thead><tr><th>Role</th><th>Seed user</th><th>Can do</th></tr></thead><tbody>${roleRows}</tbody></table></div>
      </div>
      <div class="bp">
        <h3><span class="ic" style="background:#64748b">◎</span> Seed users — 5</h3>
        <div class="lead-txt">Used as owners across the seeded POs and SOs.</div>

      </div>
      <div class="bp">
        <h3><span class="ic" style="background:linear-gradient(135deg,#8b5cf6,#6366f1)">✨</span> AI employee — Ops Assistant</h3>

        <table><tbody>
          <tr><td style="font-weight:600;width:44%">Reorder suggestion</td><td>Reads low-stock products + supplier lead times, suggests qty and form-fills a DRAFT purchase_order.</td></tr>
          <tr><td style="font-weight:600">Supplier performance summary</td><td>Ranks suppliers by rating and lead time.</td></tr>
          <tr><td style="font-weight:600">Order summary</td><td>Summarizes a PO/SO — line items, totals, fulfilment risk.</td></tr>
        </tbody></table>
      </div>
    </div>`;
}

function openOverlay(which){$('#scrim').classList.add('on');$('#'+which).classList.add('on');}
function closeOverlay(){_ctx=null;$('#scrim').classList.remove('on');$('#drawer').classList.remove('on');$('#drawer').classList.remove('wide');$('#modal').classList.remove('on');}
$('#scrim').onclick=closeOverlay;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay();});

const TITLES={
  dashboard:['Dashboard','Purchasing, sales and stock at a glance',null],
  products:['Products','Catalog, stock levels and reorder points','Add product'],
  purchase:['Purchase Orders','Buying stock in — draft to received','New PO'],
  sales:['Sales Orders','Selling stock out — draft to fulfilled','New SO'],
  inventory:['Inventory','Stock levels and the movements log',null],
  suppliers:['Suppliers','Vendors, lead times and ratings','Add supplier'],
  blueprint:['Blueprint','The full intended system for reviewers',null],
};
const NEWFN={products:openNewProduct,purchase:openNewPO,sales:openNewSO,suppliers:openNewSupplier};
let curView='dashboard';
function go(v){curView=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));$('#v-'+v).classList.add('on');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#title').textContent=TITLES[v][0];$('#subtitle').textContent=TITLES[v][1];
  const nb=$('#newBtn');if(TITLES[v][2]){nb.style.display='';$('#newLbl').textContent=TITLES[v][2];}else nb.style.display='none';
  $('#q').value='';applySearch();window.scrollTo(0,0);
}
$('#nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b&&b.dataset.v)go(b.dataset.v);});
$('#newBtn').onclick=()=>{const fn=NEWFN[curView];if(fn)fn();};

function applySearch(){const q=($('#q').value||'').toLowerCase().trim();const view=$('#v-'+curView);if(!view)return;
  view.querySelectorAll('tbody tr').forEach(tr=>{if(!tr.querySelector('td'))return;const hit=!q||tr.textContent.toLowerCase().includes(q);tr.style.display=hit?'':'none';});
}
$('#q').addEventListener('input',applySearch);

renderAll();
</script>

<script type="text/markdown" id="nb-decomp">
# SPEC — Lightweight Trading ERP → NocoBase

> Phase-1 decomposition. Data modeling + native CRUD are standard → sketched. The focus is **which native block per region** and **the four workflows that keep stock correct**.

## 1. Data model
Eight collections. Relations are **nouns, never `*_id`**.
- `products` (titleField `name`) — `sku`, `category` `Electronics|Tools|Packaging|Office|Raw`, `unit`, `cost_price`, `sell_price`, `reorder_point`, `stock_on_hand` *(workflow-maintained)*; m2o `supplier`.
- `suppliers` (titleField `name`) — `contact`, `email`, `phone`, `lead_time_days`, `rating`.
- `customers` (titleField `name`) — `contact`, `email`, `phone`, `tier` `A|B|C`.
- `purchase_orders` (titleField `po_no`) — `status` `draft|approved|received|closed`, `order_date`, `expected_date`, `total`; m2o `supplier`, m2o `owner`.
- `purchase_order_items` — `qty`, `unit_cost`, `subtotal`; m2o `purchase_order`, m2o `product`.
- `sales_orders` (titleField `so_no`) — `status` `draft|confirmed|fulfilled|closed`, `order_date`, `total`; m2o `customer`, m2o `owner`.
- `sales_order_items` — `qty`, `unit_price`, `subtotal`; m2o `sales_order`, m2o `product`.
- `stock_movements` (titleField `ref_no`) — `type` `in|out|adjust`, `qty`, `ref_type`, `note`; m2o `product`.

## 2. Pages (native CRUD, direction only)
`products` / `purchase_orders` / `sales_orders` / `suppliers` each get **Filter + Add + native Table + View drawer**. `inventory` is two Tables (levels + movements log). `blueprint` is a documentation tab (not a NocoBase page) so the reviewer can see the non-visual dimensions.

## 3. Region → native block
| Region | Native container | native vs JS | JS kernel? |
|---|---|---|---|
| Dashboard KPI strip | freestanding JS block | aggregates | **K-KPI** (4 numbers) |
| Low-stock alerts | List (dataScope stock<reorder) | JS card | **K-alert** (on-hand vs reorder + suggested qty) |
| Recent movements | List (sort date desc) | JS item | **K-move** (type icon + signed qty) |
| PO by status | native Chart | builder: dim=status, measure=count/total | no |
| SO by status | native Chart | builder: dim=status, measure=count/total | no |
| Products | native Table | one whole-record JS lead column | **K-lead** |
| Low-stock pill | toolbar JSItemActionModel | addFilterGroup + refresh | **K-pill** |
| PO/SO/Product/Supplier drawers | native ViewAction + association sub-table | qty/cost native | — |
| Inventory | native Table ×2 | native fields | no |
| Suppliers | native Table | rating stars = JS field | **K-stars** |

## 4. Interaction checklist
- Row click → `ctx.openView(<Table ViewActionModel uid>, {filterByTk})` (the only reliable JS→native popup).
- Drawer sub-tables (movements / line items) = **association block**, `associationName` + `sourceId={{ctx.view.inputArgs.filterByTk}}` — one hop (items belongTo the order; movements belongTo the product).
- **Receive** (PO drawer) = `JSRecordActionModel`: status→received, fires *workflow 1* → stock += qty + `in` movements.
- **Fulfil** (SO drawer) = `JSRecordActionModel`: stock-check gate; if OK status→fulfilled, fires *workflow 2* → stock -= qty + `out` movements; if short, blocked.
- **Approve** (PO drawer) gated when `total ≥ 20000` (*workflow 4*, manager role).
- **✨ Ops Assistant** = `AIEmployeeButtonModel` on Products + the PO form → reorder suggestion formFills a draft PO (mirrors *workflow 3*).

## 5. Workflows
1. **PO received** — status→received ⇒ per item: `stock_on_hand += qty` (realtime upsert) + create `in` stock_movement.
2. **SO fulfilled** — status→fulfilled ⇒ per item: check stock; OK ⇒ decrement + `out` movement; short ⇒ block/flag.
3. **Low-stock alert** — `stock_on_hand < reorder_point` ⇒ notify purchaser + draft PO suggestion.
4. **PO approval** — `total ≥ 20000` ⇒ manager approval before `approved`.

## 6. Open questions
1. Suggested reorder qty formula: 2× reorder point (current) vs lead-time·avg-daily-demand?
2. `total` stored vs computed from items (prototype computes; NB likely stores + workflow-sums).
3. `owner` = `users` (assumed) vs a lightweight `staff` ref.
4. Movements `ref_type`/`ref_no` as strings vs a polymorphic relation to PO/SO.
</script>

<script type="text/markdown" id="nb-decomp-zh">
# 拆解设计稿 — 轻量贸易 ERP → NocoBase

> Phase-1 精简版。数据建模 + 原生 CRUD 都标准 → 只点方向。重点是**每个区块用哪个原生块**和**保证库存正确的四条 workflow**。技术标识保留英文。

## 1. 数据模型
八个 collection,关系一律用**名词,禁止 `*_id`**。
- `products`(titleField `name`)— `sku`、`category` `Electronics|Tools|Packaging|Office|Raw`、`unit`、`cost_price`、`sell_price`、`reorder_point`、`stock_on_hand`(**由 workflow 维护**);m2o `supplier`。
- `suppliers`(titleField `name`)— `contact`、`email`、`phone`、`lead_time_days`、`rating`。
- `customers`(titleField `name`)— `contact`、`email`、`phone`、`tier` `A|B|C`。
- `purchase_orders`(titleField `po_no`)— `status` `draft|approved|received|closed`、`order_date`、`expected_date`、`total`;m2o `supplier`、m2o `owner`。
- `purchase_order_items` — `qty`、`unit_cost`、`subtotal`;m2o `purchase_order`、m2o `product`。
- `sales_orders`(titleField `so_no`)— `status` `draft|confirmed|fulfilled|closed`、`order_date`、`total`;m2o `customer`、m2o `owner`。
- `sales_order_items` — `qty`、`unit_price`、`subtotal`;m2o `sales_order`、m2o `product`。
- `stock_movements`(titleField `ref_no`)— `type` `in|out|adjust`、`qty`、`ref_type`、`note`;m2o `product`。

## 2. 页面(原生 CRUD,只给方向)
`products` / `purchase_orders` / `sales_orders` / `suppliers` 各自 **Filter + Add + 原生 Table + View 抽屉**。`inventory` = 两张 Table(库存 + 流水)。`blueprint` 是文档 tab(非 NocoBase 页面),给评审看非视觉维度。

## 3. 区块 → 原生块
| 区域 | 原生容器 | 原生 vs JS | JS kernel? |
|---|---|---|---|
| 仪表盘 KPI 条 | 独立 JS block | 聚合 | **K-KPI**(4 数字) |
| 低库存告警 | List(dataScope stock<reorder) | JS 卡片 | **K-alert**(现存 vs 补货点 + 建议量) |
| 最近流水 | List(按日期倒序) | JS item | **K-move**(类型图标 + 带符号数量) |
| PO 按状态 | 原生 Chart | builder:维度=status,度量=count/total | 无 |
| SO 按状态 | 原生 Chart | 同上 | 无 |
| Products | 原生 Table | 一个整记录 JS 主列 | **K-lead** |
| 低库存 pill | 工具栏 JSItemActionModel | addFilterGroup + refresh | **K-pill** |
| PO/SO/Product/Supplier 抽屉 | 原生 ViewAction + association 子表 | qty/cost 原生 | — |
| Inventory | 原生 Table ×2 | 原生字段 | 无 |
| Suppliers | 原生 Table | 评分星星 = JS field | **K-stars** |

## 4. 交互清单
- 点行 → `ctx.openView(<Table ViewActionModel uid>, {filterByTk})`(JS→原生弹窗唯一可靠方式)。
- 抽屉子表(流水 / 明细)= **association 块**,`associationName` + `sourceId={{ctx.view.inputArgs.filterByTk}}` — 一跳(明细 belongTo 订单;流水 belongTo 产品)。
- **Receive**(PO 抽屉)= `JSRecordActionModel`:status→received,触发 *workflow 1* → stock += qty + 建 `in` 流水。
- **Fulfil**(SO 抽屉)= `JSRecordActionModel`:库存校验;够 → status→fulfilled,触发 *workflow 2* → stock -= qty + `out` 流水;不够则拦截。
- **Approve**(PO 抽屉)当 `total ≥ 20000` 时受 manager 门控(*workflow 4*)。
- **✨ Ops Assistant** = `AIEmployeeButtonModel`,在 Products + PO 表单 → 补货建议 formFill 一张草稿 PO(对应 *workflow 3*)。

## 5. Workflows
1. **PO received** — status→received ⇒ 每明细:`stock_on_hand += qty`(realtime upsert)+ 建 `in` 流水。
2. **SO fulfilled** — status→fulfilled ⇒ 每明细:查库存;够 ⇒ 扣减 + `out` 流水;不够 ⇒ 拦截/标记。
3. **Low-stock alert** — `stock_on_hand < reorder_point` ⇒ 通知采购 + 草稿 PO 建议。
4. **PO approval** — `total ≥ 20000` ⇒ 转 `approved` 前需 manager 审批。

## 6. 待定问题
1. 建议补货量公式:2× 补货点(当前)还是 交期·日均需求?
2. `total` 落库 vs 由明细算(原型是算的;NB 多半落库 + workflow 汇总)。
3. `owner` = `users`(默认假设)还是轻量 `staff` 引用表。
4. 流水 `ref_type`/`ref_no` 用字符串 vs 指向 PO/SO 的多态关系。
</script>

<script>
(function(){
  function mdToHtml(md){
    var esc=function(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
    var inline=function(s){return esc(s)
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');};
    var lines=md.replace(/\r/g,'').split('\n'),out=[],i=0;
    while(i<lines.length){
      var l=lines[i];
      if(/^\s*\|.*\|\s*$/.test(l)){
        var tb=[];while(i<lines.length&&/^\s*\|.*\|\s*$/.test(lines[i])){tb.push(lines[i]);i++;}
        var rows=tb.filter(function(r){return !/^\s*\|[\s:|-]+\|\s*$/.test(r);});
        out.push('<table>'+rows.map(function(r,ri){
          var cells=r.trim().replace(/^\||\|$/g,'').split('|');
          return '<tr>'+cells.map(function(c){var t=ri===0?'th':'td';return '<'+t+'>'+inline(c.trim())+'</'+t+'>';}).join('')+'</tr>';
        }).join('')+'</table>');continue;
      }
      if(/^#{1,4}\s/.test(l)){var n=l.match(/^#+/)[0].length;out.push('<h'+n+'>'+inline(l.replace(/^#+\s/,''))+'</h'+n+'>');i++;continue;}
      if(/^\s*---+\s*$/.test(l)){out.push('<hr>');i++;continue;}
      if(/^\s*>\s?/.test(l)){var bq=[];while(i<lines.length&&/^\s*>\s?/.test(lines[i])){bq.push(lines[i].replace(/^\s*>\s?/,''));i++;}out.push('<blockquote>'+inline(bq.join(' '))+'</blockquote>');continue;}
      if(/^\s*[-*]\s/.test(l)){var li=[];while(i<lines.length&&/^\s*[-*]\s/.test(lines[i])){li.push(lines[i].replace(/^\s*[-*]\s/,''));i++;}out.push('<ul>'+li.map(function(x){return '<li>'+inline(x)+'</li>';}).join('')+'</ul>');continue;}
      if(/^\s*$/.test(l)){i++;continue;}
      out.push('<p>'+inline(l)+'</p>');i++;
    }
    return out.join('\n');
  }
  var SPECS={zh:'nb-decomp-zh',en:'nb-decomp'},cache={};
  var avail=['zh','en'].filter(function(k){var e=document.getElementById(SPECS[k]);return e&&e.textContent.replace(/[\s_]/g,'').length>20;});
  var lang=avail.indexOf('zh')>=0?'zh':(avail[0]||'en');
  function render(){var id=SPECS[lang];if(!document.getElementById(id))id=SPECS[avail[0]];if(cache[id]===undefined)cache[id]=mdToHtml(document.getElementById(id).textContent);document.getElementById('specDoc').innerHTML=cache[id];}
  (function buildLang(){var box=document.getElementById('specLang');if(!box)return;if(avail.length<2){box.style.display='none';return;}var L={zh:'中文',en:'EN'};
    box.innerHTML=avail.map(function(k){return '<button data-l="'+k+'"'+(k===lang?' class="on"':'')+'>'+L[k]+'</button>';}).join('');
    [].forEach.call(box.children,function(btn){btn.onclick=function(){lang=btn.getAttribute('data-l');[].forEach.call(box.children,function(x){x.className='';});btn.className='on';render();};});})();
  function show(){render();document.getElementById('specOv').classList.add('on');}
  function hide(){document.getElementById('specOv').classList.remove('on');}
  document.getElementById('specBtn').onclick=show;
  document.getElementById('specX').onclick=hide;
  document.getElementById('specOv').addEventListener('click',function(e){if(e.target.id==='specOv')hide();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')hide();});
  if(location.hash==='#spec')show();
})();
</script>
