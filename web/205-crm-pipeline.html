<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lightweight Sales CRM — Pipeline</title>
<style>
:root{
  --bg:#f5f6f8; --surface:#ffffff; --surface-2:#fafbfc;
  --txt:#1f2430; --txt-mut:#6b7280; --txt-soft:#9aa1ad;
  --border:#e7e9ee; --border-soft:#eef0f3;
  --accent:#4f46e5; --accent-soft:#eef0ff;
  --green:#10b981; --green-soft:#e7f8f1;
  --amber:#f59e0b; --amber-soft:#fef3e2;
  --blue:#0ea5e9; --blue-soft:#e6f5fd;
  --violet:#8b5cf6; --violet-soft:#f1ecfe;
  --slate:#64748b; --slate-soft:#eef1f5;
  --red:#ef4444; --red-soft:#fdecec;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 14px rgba(16,24,40,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.55 -apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt)}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
.app{display:grid;grid-template-columns:214px 1fr;min-height:100vh}
/* ---- sidebar ---- */
.side{background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:9px;padding:6px 8px 14px;font-weight:700;font-size:15px}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;color:var(--txt-mut);font-weight:500;text-align:left;width:100%}
.nav button svg{width:18px;height:18px;flex:0 0 auto}
.nav button:hover{background:var(--surface-2);color:var(--txt)}
.nav button.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav .ct{margin-left:auto;font-size:11px;background:#eef0f3;color:var(--txt-mut);border-radius:20px;padding:0 7px;font-weight:600}
.nav button.on .ct{background:#fff;color:var(--accent)}
.side .me{margin-top:auto;display:flex;align-items:center;gap:9px;padding:8px;border-top:1px solid var(--border-soft)}
.av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;flex:0 0 auto}
/* ---- main ---- */
.main{min-width:0;display:flex;flex-direction:column}
.top{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:5}
.top h1{font-size:17px;font-weight:700}
.top .sub{color:var(--txt-soft);font-size:12.5px}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;width:260px;color:var(--txt-mut)}
.search svg{width:15px;height:15px;flex:0 0 auto}
.search input{border:0;background:none;outline:none;width:100%;font:inherit;color:var(--txt)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border-radius:9px;padding:8px 14px;font-weight:600;font-size:13px;box-shadow:var(--shadow)}
.btn:hover{filter:brightness(1.07)}
.btn svg{width:16px;height:16px}
.btn.ghost{background:var(--surface);color:var(--txt);border:1px solid var(--border);box-shadow:none}
.btn.ghost:hover{background:var(--surface-2)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.ai{background:linear-gradient(135deg,#8b5cf6,#6d3fe0);box-shadow:0 2px 10px rgba(124,58,237,.28)}
.body{padding:22px;flex:1}
.view{display:none}.view.on{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* ---- KPI ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--k,#4f46e5)}
.kpi .kl{color:var(--txt-mut);font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;margin-bottom:9px}
.kpi .kl .dot{width:8px;height:8px;border-radius:50%}
.kpi .kv{font-size:25px;font-weight:750;letter-spacing:-.4px}
.kpi .kd{font-size:11.5px;color:var(--txt-soft);margin-top:3px}
.kpi .kd b{color:var(--green)}
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow)}
.card .hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border-soft)}
.card .hd h3{font-size:14px;font-weight:700}
.card .hd .lk{font-size:12.5px;color:var(--accent);font-weight:600;cursor:pointer}
.card .bd{padding:8px 16px 14px}
/* funnel / bars */
.fn{display:flex;flex-direction:column;gap:11px;padding:14px 16px}
.fn .row{display:grid;grid-template-columns:118px 1fr 96px;align-items:center;gap:10px;font-size:12.5px}
.fn .nm{color:var(--txt-mut);display:flex;align-items:center;gap:7px}.fn .nm .dot{width:8px;height:8px;border-radius:3px}
.fn .bar{height:22px;background:var(--surface-2);border-radius:6px;overflow:hidden;position:relative}
.fn .bar i{display:block;height:100%;border-radius:6px;transition:width .5s}
.fn .vl{text-align:right;font-weight:700}
.fn .vl small{display:block;color:var(--txt-soft);font-weight:500;font-size:10.5px}
/* feed */
.feed{display:flex;flex-direction:column}
.feed .it{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.feed .it:last-child{border-bottom:0}
.tic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto}
.tic svg{width:15px;height:15px}
.feed .it .tx{min-width:0;flex:1}
.feed .it .tx .s{font-weight:600;font-size:13px}
.feed .it .tx .m{color:var(--txt-soft);font-size:11.5px;margin-top:1px}
.tag{display:inline-block;font-size:11px;font-weight:600;border-radius:20px;padding:2px 9px;white-space:nowrap}
/* ---- pipeline kanban ---- */
.board{display:flex;gap:13px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.col{background:var(--surface-2);border:1px solid var(--border);border-radius:13px;min-height:120px;display:flex;flex-direction:column;flex:0 0 236px;width:236px}
.col.drag{outline:2px dashed var(--accent);outline-offset:-3px;background:var(--accent-soft)}
.col .ch{display:flex;align-items:center;gap:8px;padding:11px 13px 9px;font-weight:700;font-size:12.5px;flex-wrap:wrap}
.col .ch .dot{width:9px;height:9px;border-radius:50%}
.col .ch .n{margin-left:auto;color:var(--txt-mut);font-weight:600}
.col .ch .v{width:100%;flex-basis:100%;color:var(--txt-soft);font-size:11px;font-weight:500;margin-top:-2px}
.col .cards{display:flex;flex-direction:column;gap:9px;padding:4px 10px 12px}
.deal{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 12px;box-shadow:0 1px 2px rgba(16,24,40,.05);cursor:grab}
.deal:hover{border-color:#d6d9e2;box-shadow:var(--shadow)}
.deal.drag{opacity:.4}
.deal .co{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;line-height:1.25}
.deal .nm{color:var(--txt-mut);font-size:12px;margin:4px 0 9px}
.deal .ft{display:flex;align-items:center;justify-content:space-between}
.deal .val{font-weight:750;font-size:13.5px}
.deal .meta{display:flex;align-items:center;gap:6px;color:var(--txt-soft);font-size:11px}
.cohex{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:11px;flex:0 0 auto}
.spark{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:12px;background:var(--violet-soft);color:var(--violet);flex:0 0 auto}
.spark:hover{background:#e6dcfd}
.pill{font-size:10.5px;font-weight:600;border-radius:20px;padding:1px 7px}
/* ---- table ---- */
.twrap{overflow-x:auto;border-radius:0 0 13px 13px}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
.tbl th{text-align:left;color:var(--txt-mut);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border-soft)}
.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr{cursor:pointer}
.tbl tbody tr:hover{background:var(--surface-2)}
.who{display:flex;align-items:center;gap:9px}
.who .nm{font-weight:600}.who .su{color:var(--txt-soft);font-size:11.5px}
.toolbar{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.filterbar{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 12px;box-shadow:var(--shadow)}
.filterbar .fsel{display:flex;align-items:center;gap:6px}
.filterbar label{font-size:11px;color:var(--txt-soft);font-weight:600}
.filterbar select,.filterbar .fin{border:1px solid var(--border);border-radius:8px;padding:6px 9px;font:inherit;font-size:12.5px;background:var(--surface-2);outline:none;color:var(--txt)}
.filterbar select:focus,.filterbar .fin:focus{border-color:var(--accent)}
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;flex-wrap:wrap}
.seg button{padding:7px 13px;font-size:12.5px;color:var(--txt-mut);font-weight:600}
.seg button.on{background:var(--accent);color:#fff}
.tierbadge{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:6px;font-weight:800;font-size:11px}
/* ---- activities cards ---- */
.acts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);border-left:4px solid var(--al,#4f46e5);display:flex;flex-direction:column;gap:8px}
.acard.done{opacity:.72}
.acard .ah{display:flex;align-items:center;gap:10px}
.acard .ah .s{font-weight:700;font-size:13.5px;flex:1;min-width:0}
.acard .am{color:var(--txt-mut);font-size:12px;display:flex;flex-wrap:wrap;gap:4px 10px}
.acard .af{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.due{font-size:11.5px;font-weight:600}
/* ---- drawer & modal ---- */
.scrim{position:fixed;inset:0;background:rgba(20,24,33,.42);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:96vw;background:var(--surface);box-shadow:-8px 0 30px rgba(16,24,40,.14);transform:translateX(100%);transition:.26s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
.drawer.on{transform:none}
.cstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.cstrip .cs{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.cstrip .cv{font-size:18px;font-weight:750;letter-spacing:-.3px}
.cstrip .cl{font-size:11px;color:var(--txt-mut);margin-top:2px}
.dh{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border-soft)}
.dh .co{font-size:17px;font-weight:750}
.dh .nm{color:var(--txt-mut);font-size:12.5px;margin-top:2px}
.dh .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--txt-mut)}
.dh .x:hover{background:var(--surface-2)}
.dbd{padding:18px 20px;overflow:auto;flex:1}
.stepper{display:flex;gap:5px;margin:4px 0 18px}
.stepper .st{flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--txt-soft)}
.stepper .st .b{height:6px;border-radius:20px;background:var(--border);margin-bottom:6px}
.stepper .st.done .b{background:var(--accent)}.stepper .st.done{color:var(--accent)}
.stepper .st.lost .b{background:var(--red)}.stepper .st.lost{color:var(--red)}
.kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
.kv .k{color:var(--txt-mut)}.kv .v{font-weight:600;text-align:right}
.sec-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--txt-soft);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-t .cta{margin-left:auto;font-size:11px;color:var(--accent);font-weight:600;cursor:pointer;text-transform:none;letter-spacing:0}
.subtabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:12px}
.subtabs button{flex:1;padding:7px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--txt-mut)}
.subtabs button.on{background:var(--surface);color:var(--txt);box-shadow:0 1px 2px rgba(16,24,40,.08)}
.subtabs button .c{color:var(--txt-soft);font-weight:600}
.minitbl{width:100%;border-collapse:collapse;font-size:12.5px}
.minitbl th{text-align:left;color:var(--txt-soft);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;border-bottom:1px solid var(--border)}
.minitbl td{padding:9px 10px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
.minitbl tr:last-child td{border-bottom:0}
.dactions{display:flex;gap:9px;padding:14px 20px;border-top:1px solid var(--border-soft)}
.empty{text-align:center;color:var(--txt-soft);font-size:13px;padding:22px 0}
/* AI panel */
.aip{border:1px solid #e2d8fb;border-radius:12px;background:linear-gradient(180deg,#faf8ff,#f4effe);padding:13px 14px;margin:6px 0 4px}
.aip .aih{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:#6d3fe0}
.aip .aih .sub{margin-left:auto;font-size:10.5px;color:var(--txt-soft);font-weight:500}
.aip .skills{display:flex;gap:7px;flex-wrap:wrap;margin:11px 0 2px}
.aip .skl{border:1px solid #e2d8fb;background:#fff;border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:#6d3fe0;display:inline-flex;gap:6px;align-items:center}
.aip .skl:hover{background:#f4effe}
.aip .out{margin-top:11px;background:#fff;border:1px solid #ece5fb;border-radius:9px;padding:11px 12px;font-size:12.5px;line-height:1.6;color:var(--txt)}
.aip .out .lbl{font-size:10.5px;font-weight:700;color:#8b5cf6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.aip .out .em{background:var(--surface-2);border:1px dashed #e2d8fb;border-radius:8px;padding:9px 10px;margin-top:8px;white-space:pre-line;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px}
.shim{display:inline-block;color:var(--txt-soft)}
.approval{border:1px solid var(--amber);background:var(--amber-soft);border-radius:9px;padding:9px 11px;font-size:12px;color:#8a5a08;display:flex;gap:8px;align-items:flex-start;margin-top:4px}
/* modal */
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);opacity:0;pointer-events:none;transition:.2s;z-index:50;background:var(--surface);border-radius:15px;width:540px;max-width:94vw;box-shadow:0 24px 60px rgba(16,24,40,.24)}
.modal.on{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border-soft)}
.mh h3{font-size:16px;font-weight:750}
.mb{padding:18px 20px;max-height:64vh;overflow:auto}
.mf{display:flex;justify-content:flex-end;gap:9px;padding:14px 20px;border-top:1px solid var(--border-soft)}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11.5px;font-weight:600;color:var(--txt-mut);margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:9px 11px;font:inherit;background:var(--surface);outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* blueprint */
.bp{display:flex;flex-direction:column;gap:16px}
.bp .lead{background:var(--surface);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);padding:16px 18px}
.bp .lead h2{font-size:16px;font-weight:750;margin-bottom:4px}
.bp .lead p{color:var(--txt-mut);font-size:13px}
.bpgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bp .rel{color:var(--violet);font-weight:600}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:5px;padding:1px 6px}
.wf{display:flex;gap:11px;padding:12px 0;border-bottom:1px solid var(--border-soft)}
.wf:last-child{border-bottom:0}
.wf .num{width:26px;height:26px;border-radius:8px;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:12px;display:grid;place-items:center;flex:0 0 auto}
.wf .wt{font-weight:700;font-size:13px}
.wf .wd{color:var(--txt-mut);font-size:12.5px;margin-top:2px}
.wf .chain{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.step{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600}
.arr{color:var(--txt-soft);font-size:11px}
.role{display:flex;gap:11px;padding:12px 0;border-bottom:1px solid var(--border-soft)}
.role:last-child{border-bottom:0}
.role .rn{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.role .rd{color:var(--txt-mut);font-size:12.5px;margin-top:3px}
.dotlist{margin:4px 0 0 2px;display:flex;flex-direction:column;gap:3px}
.dotlist span{font-size:12px;color:var(--txt);display:flex;gap:7px}
.dotlist span:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:6px;flex:0 0 auto}
.dotlist span.no:before{background:var(--red)}
@media(max-width:1080px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.bpgrid{grid-template-columns:1fr}}
@media(max-width:680px){.app{grid-template-columns:1fr}.side{display:none}.kpis{grid-template-columns:1fr 1fr}.search{display:none}}
/* ===== spec viewer (reusable) ===== */
.specbtn{position:fixed;right:18px;bottom:18px;z-index:60;background:#1f2430;color:#fff;border-radius:24px;padding:10px 16px;font-weight:600;font-size:13px;box-shadow:0 6px 20px rgba(16,24,40,.22);cursor:pointer;border:0}
.specbtn:hover{background:#4f46e5}
.spec-overlay{position:fixed;inset:0;background:rgba(20,24,33,.5);z-index:61;display:none;justify-content:flex-end}
.spec-overlay.on{display:flex}
.spec-panel{width:780px;max-width:96vw;background:#fff;height:100vh;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(16,24,40,.2)}
.spec-h{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid #eef0f3}
.spec-h b{font-size:15px}.spec-h .spec-sub{color:#9aa1ad;font-size:12px}
.spec-h .spec-x{margin-left:8px;width:30px;height:30px;border-radius:8px;border:0;background:none;cursor:pointer;color:#6b7280;font-size:16px}
.spec-lang{margin-left:auto;display:inline-flex;border:1px solid #e7e9ee;border-radius:7px;overflow:hidden}
.spec-lang button{border:0;background:#fff;padding:4px 11px;font-size:12px;cursor:pointer;color:#6b7280}
.spec-lang button.on{background:#1f2430;color:#fff}
.spec-h .spec-x:hover{background:#f0f1f4}
.spec-doc{padding:18px 24px 60px;overflow:auto;font-size:13.5px;line-height:1.62;color:#1f2430}
.spec-doc h1{font-size:20px;margin:18px 0 8px}
.spec-doc h2{font-size:17px;margin:20px 0 8px;padding-top:10px;border-top:1px solid #eef0f3}
.spec-doc h3{font-size:15px;margin:14px 0 6px}
.spec-doc h4{font-size:13.5px;margin:12px 0 4px;color:#4b5563}
.spec-doc p{margin:6px 0}.spec-doc ul{margin:6px 0 6px 20px}.spec-doc li{margin:2px 0}

/* ============ DASHBOARD ============ */
function renderDashboard(){
  const open=deals.filter(d=>!['won','lost'].includes(d.stage));
  const openVal=open.reduce((a,d)=>a+d.amount,0);
  const won=deals.filter(d=>d.stage==='won');
  const lost=deals.filter(d=>d.stage==='lost');
  const winRate=won.length+lost.length?Math.round(won.length/(won.length+lost.length)*100):0;
  const dueToday=acts.filter(a=>a.status==='open'&&a.due===TODAY).length;
  const kpi=(label,dot,val,desc)=>`<div class="kpi" style="--k:${dot}"><div class="kl"><span class="dot" style="background:${dot}"></span>${label}</div><div class="kv">${val}</div><div class="kd">${desc}</div></div>`;
  // funnel — value + count per stage
  const maxV=Math.max(...STAGES.map(s=>deals.filter(d=>d.stage===s.k).reduce((a,d)=>a+d.amount,0)),1);
  const fn=STAGES.map(s=>{const ds=deals.filter(d=>d.stage===s.k);const v=ds.reduce((a,d)=>a+d.amount,0);
    return `<div class="row"><div class="nm"><span class="dot" style="background:${s.c}"></span>${s.n}</div>
      <div class="bar"><i style="width:${Math.max(v/maxV*100,4)}%;background:${s.c}"></i></div>
      <div class="vl">${kmoney(v)}<small>${ds.length} deal${ds.length===1?'':'s'}</small></div></div>`;}).join('');
  // deals by owner — open pipeline value
  const maxO=Math.max(...REPS.map(o=>open.filter(d=>d.owner===o).reduce((a,d)=>a+d.amount,0)),1);
  const byOwner=REPS.map(o=>{const ds=open.filter(d=>d.owner===o);const v=ds.reduce((a,d)=>a+d.amount,0);
    return `<div class="row"><div class="nm">${avatar(o,20)}${o.split(' ')[0]}</div>
      <div class="bar"><i style="width:${Math.max(v/maxO*100,4)}%;background:${avColor(o)}"></i></div>
      <div class="vl">${kmoney(v)}<small>${ds.length} open</small></div></div>`;}).join('');
  // recent activity feed
  const rec=acts.slice().sort((a,b)=>new Date(b.due)-new Date(a.due)).slice(0,6).map(a=>{const d=dealById(a.dealId);const c=custById(a.custId);
    return `<div class="it"><span class="tic" style="background:${ACT_IC[a.type]}22;color:${ACT_IC[a.type]}">${svgIcon(ACT_PATH[a.type],a.type!=='task')}</span>
    <div class="tx"><div class="s">${esc(a.subject)}</div><div class="m">${c?esc(c.name)+' · ':''}${esc(a.owner)} · ${esc(a.due)}</div></div>
    <span class="tag" style="background:${a.status==='done'?'var(--green-soft)':'#eef0f3'};color:${a.status==='done'?'var(--green)':'var(--txt-mut)'}">${a.status}</span></div>`;}).join('');

  $('#v-dashboard').innerHTML=`
    <div class="kpis">
      ${kpi('Pipeline value','#4f46e5',kmoney(openVal),open.length+' open deals in play')}
      ${kpi('Win rate','#10b981',winRate+'%','<b>'+won.length+'</b> won · '+lost.length+' lost')}
      ${kpi('Open deals','#0ea5e9',open.length,'across '+REPS.length+' reps')}
      ${kpi('Activities due today','#f59e0b',dueToday,dueToday?'need attention':'all clear')}
    </div>
    <div class="grid2">
      <div class="card"><div class="hd"><h3>Pipeline funnel — deals by stage</h3><span class="lk" onclick="go('pipeline')">Open pipeline →</span></div><div class="fn">${fn}</div></div>
      <div class="card"><div class="hd"><h3>Open pipeline by owner</h3></div><div class="fn">${byOwner}</div></div>
    </div>
    <div class="card" style="margin-top:16px"><div class="hd"><h3>Recent activity</h3><span class="lk" onclick="go('activities')">All activities →</span></div><div class="bd"><div class="feed">${rec}</div></div></div>`;
}

  const cols=STAGES.map(s=>{const ds=deals.filter(d=>d.stage===s.k);const v=ds.reduce((a,d)=>a+d.amount,0);
    return `<div class="col" data-stage="${s.k}">
      <div class="ch"><span class="dot" style="background:${s.c}"></span>${s.n}<span class="n">${ds.length}</span><span class="v">${money(v)}</span></div>
      <div class="cards">${ds.map(dealCard).join('')||'<div class="empty" style="padding:14px 0;font-size:12px">Drop here</div>'}</div>
    </div>`;}).join('');
  const openN=deals.filter(d=>!['won','lost'].includes(d.stage)).length;
  const openV=deals.filter(d=>!['won','lost'].includes(d.stage)).reduce((a,d)=>a+d.amount,0);
  $('#v-pipeline').innerHTML=`
    <div class="toolbar"><div style="font-weight:600;color:var(--txt-mut);font-size:13px">${openN} open · ${money(openV)} weighted pipeline</div>
      <button class="btn ghost sm" style="margin-left:auto" onclick="openNew()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg> Add deal</button></div>
    <div class="board" id="board">${cols}</div>
    <div style="margin-top:10px;color:var(--txt-soft);font-size:12px">Tip: drag a card between columns to move it through the pipeline · ✨ opens the AI Assistant on a deal.</div>`;
  wireDnD();
}
function wireDnD(){
  let dragId=null;
  document.querySelectorAll('#board .deal').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=+el.dataset.id;el.classList.add('drag');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{dragId=null;el.classList.remove('drag');document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag'));});
  });
  document.querySelectorAll('#board .col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag'));
    col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag');
      if(dragId==null)return;const d=dealById(dragId);const st=col.dataset.stage;
      if(d&&d.stage!==st){d.stage=st;d.prob=STAGE_PROB[st];renderAll();}});
  });
}

/* ---- AI Assistant panels ---- */
function aiPanelCustomer(c){
  const ds=dealsOfCust(c.id), ac=actsOfCust(c.id);
  const out=_drawer.aiOut;
  const body=out?aiOutputHTML(out):`<div style="color:var(--txt-soft);font-size:12px;margin-top:9px">Pick a skill — the assistant reads this customer, its deals & activities via the configured LLM.</div>`;
  return `<div class="aip">
    <div class="aih">✨ Sales Assistant <span class="sub">OpenCode Zen · gpt-class</span></div>
    <div class="skills">
      <button class="skl" onclick="runAI('summary')">📋 Summarize customer</button>
      <button class="skl" onclick="runAI('email')">✉️ Draft follow-up email</button>
      <button class="skl" onclick="runAI('score')">🎯 Score lead</button>
    </div>
    ${body}
  </div>`;
}
function aiOutputHTML(out){
  return `<div class="out"><div class="lbl">${out.lbl}</div>${out.html}</div>`;
}
function runAI(kind){
  const c=custById(_drawer.id);const ds=dealsOfCust(c.id);const ac=actsOfCust(c.id);
  const primary=contactsOfCust(c.id).find(x=>x.is_primary)||contactsOfCust(c.id)[0];
  const openDeals=ds.filter(d=>!['won','lost'].includes(d.stage));
  const top=openDeals.slice().sort((a,b)=>b.amount-a.amount)[0];
  const dueT=ac.filter(a=>a.status==='open'&&a.due===TODAY).length;
  if(kind==='summary'){
    const openVal=openDeals.reduce((a,d)=>a+d.amount,0);
    _drawer.aiOut={lbl:'Customer briefing',html:
      `<b>${esc(c.name)}</b> is a Tier ${c.tier} ${esc(c.industry)} account (<b>${c.status}</b>), owned by ${esc(c.owner)}. `+
      `It has <b>${openDeals.length}</b> open deal${openDeals.length===1?'':'s'} worth <b>${money(openVal)}</b>`+
      (top?`, led by “${esc(top.title)}” (${stageObj(top.stage).n}, ${money(top.amount)}, closing ${top.close}). `:'. ')+
      `${ac.length} activities logged${dueT?`, <b>${dueT} due today</b>`:''}. `+
      `<br><br><b>Next best action:</b> ${top?(top.stage==='negotiation'?'confirm procurement sign-off and lock the close date this week.':'send the proposal and schedule a decision-maker review.'):'qualify budget and identify a champion.'}`};
  } else if(kind==='email'){
    const dl=top||ds[0];
    const email=`Subject: ${dl?dl.title.split('—')[1]?.trim()||dl.title:'Next steps'} — next steps\n\nHi ${primary?primary.name.split(' ')[0]:'there'},\n\nThanks for your time on ${esc(c.name)}. Following up on the ${dl?stageObj(dl.stage).n.toLowerCase():'current'} stage of “${dl?dl.title:'our deal'}” (${dl?money(dl.amount):''}). I've attached a short summary and can hold ${dl?dl.close:'a date next week'} for a decision review.\n\nWould Thursday work for a 20-min call?\n\nBest,\n${esc(c.owner)}`;
    _drawer.aiOut={lbl:'Draft follow-up email',html:`Drafted and saved to a new activity note (type = email).<div class="em">${esc(email)}</div>`};
  } else {
    const s=top||ds[0];
    const base=s?STAGE_PROB[s.stage]:10;
    const tierAdj=c.tier==='A'?12:c.tier==='B'?4:-4;
    const actAdj=Math.min(ac.filter(a=>a.status==='done').length*3,12);
    const score=Math.max(5,Math.min(95,base+tierAdj+actAdj));
    if(s){s.prob=score;}
    _drawer.aiOut={lbl:'Lead score',html:
      `Scored “${s?esc(s.title):'—'}” at <b style="color:var(--violet)">${score}%</b> and wrote it to <span class="mono">deal.probability</span>.`+
      `<br><br><b>Rationale:</b> ${stageObj(s?s.stage:'lead').n} stage baseline (${base}%), Tier ${c.tier} account (${tierAdj>=0?'+':''}${tierAdj}), ${actAdj} pts of engagement from ${ac.filter(a=>a.status==='done').length} completed touches.`};
    renderAll();
  }
  openCustomer(_drawer.id,_drawer);
}
function aiPanelDeal(d){
  const c=custById(d.custId);const out=_drawer.aiOut;
  const body=out?aiOutputHTML(out):`<div style="color:var(--txt-soft);font-size:12px;margin-top:9px">The assistant scores this lead and drafts a follow-up into an activity note.</div>`;
  return `<div class="aip">
    <div class="aih">✨ Sales Assistant <span class="sub">OpenCode Zen · gpt-class</span></div>
    <div class="skills">
      <button class="skl" onclick="runDealAI('score')">🎯 Score lead</button>
      <button class="skl" onclick="runDealAI('email')">✉️ Draft follow-up email</button>
    </div>
    ${body}
  </div>`;
}
function runDealAI(kind){
  const d=dealById(_drawer.id);const c=custById(d.custId);
  if(kind==='score'){
    const base=STAGE_PROB[d.stage];const tierAdj=c.tier==='A'?12:c.tier==='B'?4:-4;
    const score=Math.max(5,Math.min(95,base+tierAdj+(d.amount>=50000?6:0)));
    d.prob=score;
    _drawer.aiOut={lbl:'Lead score',html:`Set <span class="mono">probability</span> = <b style="color:var(--violet)">${score}%</b>.<br><br><b>Rationale:</b> ${stageObj(d.stage).n} baseline ${base}%, Tier ${c.tier} account (${tierAdj>=0?'+':''}${tierAdj})${d.amount>=50000?', high-value +6':''}.`};
    renderAll();
  } else {
    const email=`Subject: ${esc(d.title)} — next steps\n\nHi ${c?c.name.split(' ')[0]:'there'},\n\nFollowing up on “${esc(d.title)}” (${money(d.amount)}, ${stageObj(d.stage).n}). I'd love to align on next steps before ${d.close}.\n\nBest,\n${esc(d.owner)}`;
    _drawer.aiOut={lbl:'Draft follow-up email',html:`Drafted and saved to an activity note.<div class="em">${esc(email)}</div>`};
  }
  openDeal(_drawer.id,_drawer.ai,_drawer.aiOut);
}

      <div class="kv"><span class="k">Amount</span><span class="v">${money(d.amount)}</span></div>
      <div class="kv"><span class="k">Probability</span><span class="v" style="color:var(--violet)">${d.prob}%</span></div>
      <div class="kv"><span class="k">Owner</span><span class="v">${esc(d.owner)}</span></div>

      <div class="sec-t">Activities <span class="cta" onclick="quickLog(${id})">+ Log</span></div>
      <div class="feed">${actsHtml}</div>
    </div>
    <div class="dactions">${terminal
      ?`<button class="btn ghost" style="flex:1" onclick="setStage(${id},'negotiation')">Reopen</button>`
      :`<button class="btn" style="flex:1" onclick="setStage(${id},'${STAGES[si+1]?STAGES[si+1].k:'won'}')">${nextName?'Move to '+nextName+' →':'Mark Won'}</button>
        <button class="btn ghost" onclick="setStage(${id},'won')">Won</button>
        <button class="btn ghost" onclick="setStage(${id},'lost')">Lost</button>`}</div>`;
  openOverlay('drawer');

function toggleAIDeal(){_drawer.ai=!_drawer.ai;openDeal(_drawer.id,_drawer.ai,_drawer.ai?_drawer.aiOut:null);}
function setStage(id,st){const d=dealById(id);d.stage=st;d.prob=STAGE_PROB[st];renderAll();openDeal(id,_drawer.ai,_drawer.aiOut);}
function toggleAct(id){const a=acts.find(x=>x.id===id);a.status=a.status==='done'?'open':'done';renderAll();
  if(_drawer){if(_drawer.type==='deal')openDeal(_drawer.id,_drawer.ai,_drawer.aiOut);else openCustomer(_drawer.id,_drawer);}}
function quickLog(id){const s=prompt('Log an activity (subject):');if(!s)return;const d=dealById(id);
  acts.push({id:nid(),subject:s,type:'task',dealId:id,custId:d.custId,owner:d.owner,due:TODAY,status:'open',notes:''});
  renderAll();openDeal(id,_drawer.ai,_drawer.aiOut);}

/* ============ ACTIVITIES (card list) ============ */
let aFilter={status:'',type:''};
function renderActivities(){
  const list=acts.filter(a=>(!aFilter.status||a.status===aFilter.status)&&(!aFilter.type||a.type===aFilter.type))

      <div class="am"><span>${a.type}</span><span>${c?esc(c.name):'—'}</span>${d?`<span style="cursor:pointer;color:var(--accent)" onclick="openDeal(${d.id})">${esc(d.title)} ↗</span>`:''}</div>
      <div class="af"><span class="who">${avatar(a.owner,22)}<span style="font-size:12px;color:var(--txt-mut)">${esc(a.owner)}</span></span>

}
function saveDeal(){
  const t=$('#f-title').value.trim(),cid=+$('#f-cust').value,a=+$('#f-amount').value;
  if(!t||!cid||!a){$('#f-err').style.display='block';return;}

  deals.unshift({id:nid(),title:t,custId:cid,owner:$('#f-owner').value,stage:st,amount:a,close:$('#f-close').value,prob:STAGE_PROB[st],source:$('#f-source').value});

  const indOpts=INDUSTRIES.map(i=>`<option>${i}</option>`).join('');

function openOverlay(which){$('#scrim').classList.add('on');$('#'+which).classList.add('on');}

  dashboard:['Dashboard','Your sales pipeline at a glance'],
  pipeline:['Pipeline','Drag deals across stages — lead to won'],

};
function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));$('#v-'+v).classList.add('on');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#title').textContent=TITLES[v][0];$('#subtitle').textContent=TITLES[v][1];
  $('#newBtn').style.display=v==='blueprint'?'none':'';
}
$('#nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)go(b.dataset.v);});

/* search — jump to pipeline & dim non-matching cards */
$('#q').addEventListener('input',e=>{const q=e.target.value.toLowerCase();
  if(q&&!$('#v-pipeline').classList.contains('on'))go('pipeline');
  document.querySelectorAll('#board .deal').forEach(el=>{const d=dealById(+el.dataset.id);const c=custById(d.custId);
    const hit=!q||(d.title+' '+(c?c.name:'')+' '+d.owner).toLowerCase().includes(q);
    el.style.display=hit?'':'none';});
});

renderAll();

<!-- Human-readable Phase-1 decomposition (rendered by the viewer below) -->
<script type="text/markdown" id="nb-decomp">
# SPEC — Lightweight Sales CRM → NocoBase

> Phase-1 decomposition. Data model + native CRUD are conventional → sketched. Focus: the block-per-region map, the drawer association sub-tables, and the AI-employee surfacing.

## 1. Data model
Four collections, noun-named belongsTo relations (never `*_id` on the model surface):
- `customers` (titleField `name`) — `industry`, `tier` A/B/C, `status` prospect|active|churned, `website`, `phone`, `address`; m2o `owner`→users; o2m `contacts` / `deals` / `activities`.
- `contacts` (titleField `name`) — `title`, `email`, `phone`, `is_primary`; m2o `customer`.
- `deals` (titleField `title`) — `stage` lead|qualified|proposal|negotiation|won|lost, `amount`, `close_date`, `probability` 0–100, `source` inbound|outbound|referral|event; m2o `customer`, m2o `owner`; o2m `activities`.
- `activities` (titleField `subject`) — `type` call|email|meeting|task, `due_date`, `status` open|done, `notes`; m2o `deal`, m2o `customer`, m2o `owner`.

## 2. Pages & region → native block
| Page | Region | Native block | JS slot |
|---|---|---|---|
| Dashboard | KPI strip | JSBlock (aggregate) | 4 numbers |
| Dashboard | funnel / by-owner | native **Chart** (bar) | — |
| Dashboard | recent activity | native **List** | JS item card |
| Pipeline | board | native **Kanban** `groupField=stage` | ONE JS card field (limit 2) |
| Customers | filter | native **FilterForm** | — |
| Customers | table | native **Table** | JS lead cell (name) |
| Customers | drawer | native **ViewAction** | 3 association sub-tables |
| Activities | list | native **List** | JS item card + toolbar pills |
| Blueprint | doc | Markdown / static | — |

<script>
(function(){
  function mdToHtml(md){
    var esc=function(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
    var inline=function(s){return esc(s)
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');};
    var lines=md.replace(/\r/g,'').split('\n'),out=[],i=0;
    while(i<lines.length){
      var l=lines[i];
      if(/^\s*\|.*\|\s*$/.test(l)){
        var tb=[];while(i<lines.length&&/^\s*\|.*\|\s*$/.test(lines[i])){tb.push(lines[i]);i++;}
        var rows=tb.filter(function(r){return !/^\s*\|[\s:|-]+\|\s*$/.test(r);});
        out.push('<table>'+rows.map(function(r,ri){
          var cells=r.trim().replace(/^\||\|$/g,'').split('|');
          return '<tr>'+cells.map(function(c){var t=ri===0?'th':'td';return '<'+t+'>'+inline(c.trim())+'</'+t+'>';}).join('')+'</tr>';
        }).join('')+'</table>');continue;
      }
      if(/^#{1,4}\s/.test(l)){var n=l.match(/^#+/)[0].length;out.push('<h'+n+'>'+inline(l.replace(/^#+\s/,''))+'</h'+n+'>');i++;continue;}
      if(/^\s*---+\s*$/.test(l)){out.push('<hr>');i++;continue;}
      if(/^\s*>\s?/.test(l)){var bq=[];while(i<lines.length&&/^\s*>\s?/.test(lines[i])){bq.push(lines[i].replace(/^\s*>\s?/,''));i++;}out.push('<blockquote>'+inline(bq.join(' '))+'</blockquote>');continue;}
      if(/^\s*[-*]\s/.test(l)){var li=[];while(i<lines.length&&/^\s*[-*]\s/.test(lines[i])){li.push(lines[i].replace(/^\s*[-*]\s/,''));i++;}out.push('<ul>'+li.map(function(x){return '<li>'+inline(x)+'</li>';}).join('')+'</ul>');continue;}
      if(/^\s*$/.test(l)){i++;continue;}
      out.push('<p>'+inline(l)+'</p>');i++;
    }
    return out.join('\n');
  }
  var SPECS={zh:'nb-decomp-zh',en:'nb-decomp'},cache={};
  var avail=['zh','en'].filter(function(k){var e=document.getElementById(SPECS[k]);return e&&e.textContent.replace(/[\s_]/g,'').length>20;});
  var lang=avail.indexOf('zh')>=0?'zh':(avail[0]||'en');
  function render(){var id=SPECS[lang];if(!document.getElementById(id))id=SPECS[avail[0]];if(cache[id]===undefined)cache[id]=mdToHtml(document.getElementById(id).textContent);document.getElementById('specDoc').innerHTML=cache[id];}
  (function buildLang(){var box=document.getElementById('specLang');if(!box)return;if(avail.length<2){box.style.display='none';return;}var L={zh:'中文',en:'EN'};
    box.innerHTML=avail.map(function(k){return '<button data-l="'+k+'"'+(k===lang?' class="on"':'')+'>'+L[k]+'</button>';}).join('');
    [].forEach.call(box.children,function(btn){btn.onclick=function(){lang=btn.getAttribute('data-l');[].forEach.call(box.children,function(x){x.className='';});btn.className='on';render();};});})();
  function show(){render();document.getElementById('specOv').classList.add('on');}
  function hide(){document.getElementById('specOv').classList.remove('on');}
  document.getElementById('specBtn').onclick=show;
  document.getElementById('specX').onclick=hide;
  document.getElementById('specOv').addEventListener('click',function(e){if(e.target.id==='specOv')hide();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')hide();});
  if(location.hash==='#spec')show();
})();
</script>
