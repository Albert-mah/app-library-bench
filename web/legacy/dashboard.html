<!DOCTYPE html>
<html lang="zh-CN">
<head>
<base href="/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>企业应用示例库 — 搭建总览仪表盘</title>
<style>
  :root{
    --primary:#1677ff; --text:rgba(0,0,0,.88); --text2:rgba(0,0,0,.45); --text3:rgba(0,0,0,.30);
    --split:rgba(5,5,5,.06); --bg:#f5f5f5; --card:#fff;
    --shadow:0 1px 2px rgba(0,0,0,.03),0 1px 6px -1px rgba(0,0,0,.04);
    /* 结论色:饱和、互相高对比(绿/橙/红/蓝灰) */
    --pass:#16a34a; --pass-bg:#f6ffed; --fix:#f59e0b; --fix-bg:#fffbe6; --redo:#dc2626; --redo-bg:#fff1f0;
    --review:#64748b; --review-bg:#f1f5f9;
    /* 进度:已搭=绿,仅原型=蓝,未开始=浅灰 */
    --built:#16a34a; --protoc:#2563eb; --notstart:#cbd5e1;
    --blind:#fa8c16; --dspro:#722ed1; --dsflash:#13c2c2; --mainc:#1677ff; --design:#eb2f96;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-text-size-adjust:100%;}
  .wrap{max-width:1120px;margin:0 auto;padding:20px 16px 60px;}
  .hero{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
  .hero h1{font-size:22px;margin:0 0 4px;}
  .hero .sub{color:var(--text2);font-size:13px;}
  .nav{display:flex;gap:8px;flex-wrap:wrap;}
  .nav a{font-size:13px;text-decoration:none;color:var(--text2);border:1px solid var(--split);background:var(--card);border-radius:8px;padding:7px 14px;}
  .nav a.cur{color:var(--primary);border-color:var(--primary);font-weight:600;}
  .nav a:hover{color:var(--primary);}
  section{margin-top:22px;}
  .sec-h{display:flex;align-items:baseline;gap:10px;margin:0 0 12px;}
  .sec-h h2{font-size:17px;margin:0;}
  .sec-h .sh-sub{font-size:12px;color:var(--text3);}
  .cards{display:grid;gap:12px;}
  .c4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
  .c3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));}
  .card{background:var(--card);border:1px solid var(--split);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
  .kpi .big{font-size:30px;font-weight:700;line-height:1;}
  .kpi .big small{font-size:14px;font-weight:400;color:var(--text2);}
  .kpi .lbl{font-size:12px;color:var(--text2);margin-top:7px;}
  .kpi .hint{font-size:11px;color:var(--text3);margin-top:3px;}
  .barrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px;}
  .barrow .nm{flex:0 0 120px;color:var(--text2);}
  .barrow .track{flex:1;height:14px;background:#f0f2f5;border-radius:7px;overflow:hidden;}
  .barrow .fill{height:100%;border-radius:7px;}
  .barrow .v{flex:0 0 auto;font-size:12px;color:var(--text3);min-width:78px;text-align:right;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--split);}
  th{font-size:12px;color:var(--text2);font-weight:600;}
  td.r,th.r{text-align:right;}
  .tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:20px;}
  .tag.pass{background:var(--pass-bg);color:var(--pass);} .tag.fix{background:var(--fix-bg);color:var(--fix);}
  .tag.redo{background:var(--redo-bg);color:var(--redo);} .tag.review{background:var(--review-bg);color:var(--review);}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  /* 进度条:加高 + 段间分隔线 + 段内文字描边,小段也可见 */
  .prog{display:flex;height:30px;border-radius:8px;overflow:hidden;border:1px solid rgba(0,0,0,.08);font-size:12px;background:#eef1f4;}
  .prog>span{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;min-width:3px;white-space:nowrap;overflow:hidden;text-shadow:0 1px 1px rgba(0,0,0,.22);box-shadow:inset -1px 0 0 rgba(255,255,255,.25);transition:filter .15s;}
  .prog>span:hover{filter:brightness(1.08);}
  .prog>span:last-child{box-shadow:none;}
  /* 进度条图例:色块 + 名称 + 计数 + 百分比 */
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px;font-size:12px;}
  .legend .li{display:inline-flex;align-items:center;gap:6px;color:var(--text2);}
  .legend .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto;}
  .legend .li b{color:var(--text);font-weight:600;} .legend .li .pc{color:var(--text3);}
  /* 筛选条 */
  .filterbar{display:flex;flex-wrap:wrap;gap:14px 22px;align-items:center;background:var(--card);border:1px solid var(--split);border-radius:12px;padding:12px 16px;box-shadow:var(--shadow);margin-top:14px;}
  .fgroup{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .fgroup>.fl{font-size:12px;color:var(--text2);margin-right:2px;}
  .chip{font-size:12px;border:1px solid var(--split);background:#fafbfc;color:var(--text2);border-radius:16px;padding:4px 11px;cursor:pointer;user-select:none;line-height:1.3;}
  .chip:hover{border-color:#b9c4d4;color:var(--text);}
  .chip.on{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600;}
  .chip .cnt{opacity:.6;font-weight:400;margin-left:3px;}
  .freset{font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;margin-left:auto;}
  .scope-empty{color:var(--text3);font-size:13px;padding:10px 2px;}
  /* SVG 图表通用 */
  .chartwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  svg.chart{display:block;max-width:100%;height:auto;font:11px/1.2 inherit;}
  svg.chart text{fill:var(--text2);}
  svg.chart .axis{stroke:var(--split);}
  svg.chart .gl{stroke:#eef1f4;}
  svg.chart .vlbl{fill:var(--text);font-weight:600;}
  .chart-cap{font-size:12px;color:var(--text2);margin:2px 0 8px;}
  .twocol{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
  /* 明细表:可排序表头 + 可展开 */
  details.drill{margin-top:12px;border:1px solid var(--split);border-radius:12px;background:var(--card);box-shadow:var(--shadow);overflow:hidden;}
  details.drill>summary{cursor:pointer;padding:13px 16px;font-size:14px;font-weight:600;list-style:none;display:flex;align-items:center;gap:8px;}
  details.drill>summary::-webkit-details-marker{display:none;}
  details.drill>summary::before{content:'▸';color:var(--text3);transition:transform .15s;}
  details.drill[open]>summary::before{transform:rotate(90deg);}
  details.drill>summary .ds{font-weight:400;color:var(--text3);font-size:12px;}
  .drillbody{padding:0 4px 6px;}
  th.sortable{cursor:pointer;white-space:nowrap;user-select:none;}
  th.sortable:hover{color:var(--primary);}
  th.sortable .ar{opacity:.4;font-size:10px;} th.sortable.act .ar{opacity:1;color:var(--primary);}
  .mono{font-variant-numeric:tabular-nums;}
  .pick{font-size:12px;border:1px solid var(--split);border-radius:7px;padding:4px 8px;background:#fff;color:var(--text);}
  .arrowline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:14px;}
  .rnd{background:#f0f2f5;border-radius:8px;padding:8px 14px;text-align:center;}
  .rnd b{font-size:20px;display:block;} .rnd small{color:var(--text3);font-size:11px;}
  .arrow{color:var(--pass);font-weight:700;font-size:18px;}
  .note{font-size:12px;color:var(--text2);background:#f6f8ff;border:1px solid #e0e7ff;border-radius:8px;padding:10px 14px;line-height:1.7;margin-top:10px;}
  .note b{color:var(--text);}
  details.cost{margin-top:10px;}
  details.cost>summary{cursor:pointer;font-size:13px;color:var(--text2);}
  .muted{color:var(--text3);font-size:12px;}
  .est{color:var(--text3);font-weight:400;}
  /* 表格在窄屏可横向滚动,避免撑破页面 */
  #opt-table, #line-result, .drillbody{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  #opt-table table, #line-result table{min-width:440px;}
  .drillbody table{min-width:760px;}
  @media(max-width:600px){
    .barrow .nm{flex-basis:84px;} .wrap{padding:16px 12px 50px;} .hero h1{font-size:19px;}
    table{font-size:12px;} th,td{padding:7px 6px;}
    .arrowline{gap:6px;} .rnd{padding:6px 10px;} .rnd b{font-size:17px;}
    .kpi .big{font-size:24px;}
    .filterbar{gap:10px 14px;padding:10px 12px;} .freset{margin-left:0;}
    .prog{height:26px;font-size:11px;}
  }
</style>
<link rel="stylesheet" href="shared.css">
</head>

<nav class="app-nav">
  <span class="brand"><span class="dot"></span>企业应用示例库</span>
  <a href="index.html">画廊</a><a href="test-report.html">测试中心</a>

<div class="wrap">
  <div class="hero">
    <div>
      <h1>🏗️ 企业应用示例库 — 搭建总览</h1>
      <div class="sub" id="sub">搭建情况 · 优化效果 · 成果 <span id="gen" class="muted"></span></div>
    </div>
  </div>

  <!-- 类型筛选:复刻线 / 轮次 / 模块类型(tag);改选即重渲整页 -->
  <div class="filterbar" id="filterbar" style="display:none"></div>

  <section id="s-build">
    <div class="sec-h"><h2>① 搭建情况</h2><span class="sh-sub">原型 / 主应用 / 各复刻线覆盖</span></div>
    <div class="cards c4" id="build-kpi"></div>
    <div class="card" style="margin-top:12px"><div id="build-prog"></div><div id="line-bars" style="margin-top:16px"></div></div>
  </section>

  <section id="s-opt">
    <div class="sec-h"><h2>② 优化效果</h2><span class="sh-sub">主应用线逐轮整改 · 分数与结论变化</span></div>
    <div class="card"><div id="opt-rounds"></div><div id="opt-trend" class="chartwrap" style="margin-top:6px"></div><div id="opt-note"></div></div>
    <div class="card" style="margin-top:12px"><div id="opt-table"></div></div>
  </section>

  <section id="s-result">
    <div class="sec-h"><h2>③ 成果</h2><span class="sh-sub">通过率 / 保真度 / 实建产出</span></div>
    <div class="cards c4" id="result-kpi"></div>
    <div class="card" style="margin-top:12px"><div class="sec-h" style="margin-bottom:8px"><h2 style="font-size:14px">主应用线 当前结论分布</h2></div><div class="twocol"><div id="verdict-prog"></div><div id="verdict-donut" class="chartwrap"></div></div></div>
    <div class="card" style="margin-top:12px"><div class="sec-h" style="margin-bottom:8px"><h2 style="font-size:14px">复刻线成果对比</h2><span class="sh-sub">不同引擎裸 skill 一句话复刻</span></div><div id="line-result"></div></div>
    <details class="drill" id="drill-modules"><summary>📋 模块明细 <span class="ds">逐模块分数 / 结论 / 产出 / 用时(可排序)</span></summary><div class="drillbody" id="drill-body"></div></details>
  </section>

  <section id="s-cost">
    <div class="sec-h"><h2>④ 费用</h2><span class="sh-sub">次要参考 · 口径见下</span></div>
    <div class="card"><div id="cost-bars"></div><div class="note" id="cost-note"></div></div>
    <div class="card" style="margin-top:12px">
      <div class="sec-h" style="margin-bottom:6px"><h2 style="font-size:14px">多维度对比</h2><span class="sh-sub">便宜 ≠ 差:把费用 / 保真 / 用时 / 错误率 / 产出放一起看</span></div>
      <div class="filterbar" id="cmp-pick" style="margin-top:0;box-shadow:none;border-color:var(--split)"></div>
      <div id="cmp-scatter" class="chartwrap"></div>
      <div class="muted" id="cmp-note" style="margin-top:6px"></div>
    </div>
  </section>

  <div id="err" style="display:none;color:#c0392b;padding:20px;"></div>
</div>

<script>
(function(){
  "use strict";
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function num(n,d){ n=Number(n); if(!isFinite(n)) return '—'; return d!=null?n.toFixed(d):String(n); }
  function money(n){ n=Number(n); if(!isFinite(n)) return '—'; return n>=1?n.toFixed(2):n.toFixed(3); }
  // 把 CSS 变量解析成真实色值(SVG fill 不吃 var() 的某些场景 + 配色统一)
  var CSS=getComputedStyle(document.documentElement);
  function cvar(name){ return (CSS.getPropertyValue(name)||'').trim()||'#999'; }
  var COL={
    built:cvar('--built'), proto:cvar('--protoc'), notstart:cvar('--notstart'),
    pass:cvar('--pass'), fix:cvar('--fix'), redo:cvar('--redo'), review:cvar('--review'),
    mainc:cvar('--mainc'), blind:cvar('--blind'), dspro:cvar('--dspro'), dsflash:cvar('--dsflash'), design:cvar('--design'), primary:cvar('--primary')
  };
  var LINEMETA={
    main:{label:'主应用',color:COL.mainc},
    blind:{label:'Sonnet 盲测',color:COL.blind},
    'blind-dspro':{label:'DS-Pro 盲测',color:COL.dspro},
    'blind-dsflash':{label:'DS-Flash 盲测',color:COL.dsflash},
    'flash-retest':{label:'Flash重测(优化skill)',color:'#0ea5e9'},
    design:{label:'设计线',color:COL.design},
    experiment:{label:'实验线',color:'#94a3b8'}
  };
  var VMETA={pass:{label:'通过',color:COL.pass},fix:{label:'需修',color:COL.fix},redo:{label:'重做',color:COL.redo},review:{label:'待评',color:COL.review}};
  function lineLabel(k){ return (LINEMETA[k]||{}).label || k; }
  function lineColor(k){ return (LINEMETA[k]||{}).color || cvar('--text2'); }

  // 用户评分实时:优先 API(权威·落盘),不可达回退静态 user-scores.json;再不行空对象。
  // 结构 { branch: { round: { module: {score,verdict,note} } } }。评完刷新即更新,无需 agent。
  function fetchUserScores(){
    return fetch('/api/app-library-scores',{headers:{'Accept':'application/json'}})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .catch(function(){ return fetch('user-scores.json').then(function(r){return r.ok?r.json():{};}).catch(function(){return {};}); });
  }
  // 全局状态:数据 + 当前筛选 + 比较图维度选择
  var DATA={LIB:null,AUD:null,USR:{}};
  var FILTER={line:'all', round:'all', tag:'all'};
  var CMP={x:'cost', y:'fid'};   // 多维对比散点的两轴

  Promise.all([
    fetch('library.json').then(function(r){return r.json();}),
    fetch('build-audit.json').then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetchUserScores()
  ]).then(function(res){ DATA.LIB=res[0]; DATA.AUD=res[1]; DATA.USR=res[2]||{};
    if(DATA.LIB&&DATA.LIB.modules) DATA.LIB.modules=DATA.LIB.modules.filter(function(m){return m.status!=='deprecated';}); // 废弃模块不计入总览
    boot(); }).catch(function(e){
    var el=document.getElementById('err'); el.style.display=''; el.textContent='数据加载失败: '+e;
  });

  function boot(){
    var LIB=DATA.LIB, AUD=DATA.AUD;
    var rids=(LIB.rounds||[]).map(function(r){return r.id;});
    document.getElementById('gen').textContent='· 生成 '+(AUD&&AUD.generated||LIB.updated||'');
    buildFilterBar();
    buildCmpPicker();
    render();
  }

  /* ---------- 筛选条 ---------- */
  function buildFilterBar(){
    var LIB=DATA.LIB, mods=LIB.modules||[];
    var lineOrder=['main','blind','blind-dspro','blind-dsflash','flash-retest','design'];
    var lineCnt={}; mods.forEach(function(m){ Object.keys(m.branches||{}).forEach(function(k){ lineCnt[k]=(lineCnt[k]||0)+1; }); });
    var rids=(LIB.rounds||[]).map(function(r){return r.id;});
    // tag 维度:数据里是 module.tag(字符串)。无 tag 则跳过该组。
    var tagCnt={}; mods.forEach(function(m){ if(m.tag) tagCnt[m.tag]=(tagCnt[m.tag]||0)+1; });
    var tagKeys=Object.keys(tagCnt).sort(function(a,b){return tagCnt[b]-tagCnt[a];});

    function chips(group, items, allLabel){
      var html='<span class="fl">'+esc(allLabel)+'</span>';
      html+='<span class="chip'+(FILTER[group]==='all'?' on':'')+'" data-g="'+group+'" data-v="all">全部</span>';
      items.forEach(function(it){
        html+='<span class="chip'+(FILTER[group]===it.v?' on':'')+'" data-g="'+group+'" data-v="'+esc(it.v)+'">'+esc(it.label)+'<span class="cnt">'+it.cnt+'</span></span>';
      });
      return '<div class="fgroup">'+html+'</div>';
    }
    var html='';
    html+=chips('line', lineOrder.filter(function(k){return lineCnt[k];}).map(function(k){return {v:k,label:lineLabel(k),cnt:lineCnt[k]};}), '复刻线');
    html+=chips('round', rids.map(function(r){
        var lbl=(LIB.rounds.find(function(x){return x.id===r;})||{}).label||r;
        // 标签太长只取轮次号
        return {v:r, label:r.toUpperCase(), cnt:countRound(r)};
      }), '轮次');
    if(tagKeys.length){
      html+=chips('tag', tagKeys.map(function(t){return {v:t,label:t,cnt:tagCnt[t]};}), '模块类型');
    }
    html+='<span class="freset" id="freset">清除筛选</span>';
    var bar=document.getElementById('filterbar'); bar.innerHTML=html; bar.style.display='';
    bar.querySelectorAll('.chip').forEach(function(c){
      c.addEventListener('click', function(){
        FILTER[c.getAttribute('data-g')]=c.getAttribute('data-v');
        buildFilterBar(); render();
      });
    });
    document.getElementById('freset').addEventListener('click', function(){
      FILTER={line:'all',round:'all',tag:'all'}; buildFilterBar(); render();
    });
  }
  function countRound(rid){
    var n=0; (DATA.LIB.modules||[]).forEach(function(m){
      var hit=false; Object.keys(m.branches||{}).forEach(function(bk){ if(((m.branches[bk].rounds)||{})[rid]) hit=true; });
      if(hit) n++;
    }); return n;
  }
  // 当前筛选下要展示的模块(tag 过滤);line/round 过滤在各计算处按需应用
  function scopedMods(){
    var mods=DATA.LIB.modules||[];
    return mods.filter(function(m){ return FILTER.tag==='all' || m.tag===FILTER.tag; });
  }
  // 当前生效的复刻线集合(用于"各线"类计算)
  function scopedLines(allLines){
    if(FILTER.line==='all') return allLines.slice();
    return allLines.filter(function(k){return k===FILTER.line;});
  }
  // 当前生效轮次集合
  function scopedRids(allRids){
    if(FILTER.round==='all') return allRids.slice();
    return allRids.filter(function(r){return r===FILTER.round;});
  }

  function render(){
    var LIB=DATA.LIB, AUD=DATA.AUD, USR=DATA.USR;
    var mods=scopedMods();
    var allMods=LIB.modules||[];
    var rids=(LIB.rounds||[]).map(function(r){return r.id;});

    // 生效分数/结论:**人工(用户)优先于 AI 默认**。USR 来自实时落盘。
    function eff(branchId, rid, m){
      var b=(m.branches||{})[branchId]; var r=b&&b.rounds&&b.rounds[rid]; if(!r) return null;
      var u=(((USR||{})[branchId]||{})[rid]||{})[m.id];
      var us=(u&&u.score!=null)?Number(u.score):null;
      var uv=(u&&u.verdict)?u.verdict:null;
      var vraw=uv||r.verdict||'review';
      var VV={pass:1,fix:1,redo:1,review:1};        // verdict 白名单(防脏值进 class)
      return { score: us!=null?us:(r.aiScore!=null?Number(r.aiScore):null),
               verdict: VV[vraw]?vraw:'review',
               byUser: (us!=null||!!uv), hasRound:true };
    }
    // 统计有多少模块已被用户人工评审(任意分支任意轮)
    var userReviewed=0;
    mods.forEach(function(m){
      var hit=false;
      Object.keys(m.branches||{}).forEach(function(bk){
        rids.forEach(function(rid){ var e=eff(bk,rid,m); if(e&&e.byUser) hit=true; });
      });
      if(hit) userReviewed++;
    });

    /* ===== ① 搭建情况 ===== */
    var total=mods.length;
    var proto=mods.filter(function(m){return m.proto;}).length;
    // 各线模块数(受 line 筛选影响)
    var lineCount={};
    mods.forEach(function(m){ Object.keys(m.branches||{}).forEach(function(k){
      if(FILTER.line!=='all' && k!==FILTER.line) return; lineCount[k]=(lineCount[k]||0)+1; }); });
    var built=lineCount.main||0;
    var aiOrder=['blind','blind-dspro','blind-dsflash','flash-retest','experiment'];

    document.getElementById('build-kpi').innerHTML=[

    ].join('');
    // 进度条:已搭主应用 / 仅原型 / 未开始(饱和色 + 图例计数+百分比)

      '<div class="muted" style="margin-bottom:7px">模块推进(共 '+total+')</div>'+

    // 各线覆盖条(SVG 横向条形图,饱和线色)
    var covLines=['main','blind','blind-dspro','blind-dsflash','flash-retest','design'].filter(function(k){return lineCount[k] && (FILTER.line==='all'||k===FILTER.line);});

      }));

    /* ===== ② 优化效果(主线逐轮)===== */
    var optRids=scopedRids(rids);
    // 每轮:有该轮的 main 模块的生效分数平均 + 通过数(人工优先,经 eff)
    var roundStat=optRids.map(function(rid){
      var ai=[], pass=0, n=0;
      mods.forEach(function(m){
        var e=eff('main',rid,m); if(!e) return;
        n++; if(e.score!=null) ai.push(e.score); if(e.verdict==='pass') pass++;
      });
      return {rid:rid, n:n, avg:ai.length?ai.reduce(function(a,b){return a+b;},0)/ai.length:null, pass:pass};
    }).filter(function(s){return s.n>0;});
    document.getElementById('opt-rounds').innerHTML=
      '<div class="arrowline">'+ roundStat.map(function(s,i){
        var label=(LIB.rounds.find(function(r){return r.id===s.rid;})||{}).label||s.rid;

          '<div class="rnd"><small>'+esc(label)+'</small><b>'+(s.avg!=null?num(s.avg,1):'—')+'</b>'+

    // 折线图:r1→r2→r3 评分均值与通过数
    document.getElementById('opt-trend').innerHTML = roundStat.length>=2
      ? lineChart(roundStat.map(function(s){return {label:s.rid.toUpperCase(), avg:s.avg, pass:s.pass, n:s.n};}))
      : '<div class="muted" style="padding:4px 2px">当前筛选下不足 2 轮,无趋势线。</div>';
    // 改善计数:r1 非 pass 且**任一**后续轮达 pass
    var improved=0;
    mods.forEach(function(m){
      var b=(m.branches||{}).main; if(!b||!b.rounds.r1) return;
      var e1=eff('main','r1',m); if(!e1) return;
      var someLaterPass=false;
      for(var i=1;i<rids.length;i++){ if(b.rounds[rids[i]]){ var e=eff('main',rids[i],m); if(e&&e.verdict==='pass') someLaterPass=true; } }
      if(e1.verdict!=='pass' && someLaterPass) improved++;
    });
    var firstAvg=roundStat[0]?roundStat[0].avg:null, lastAvg=roundStat[roundStat.length-1]?roundStat[roundStat.length-1].avg:null;
    document.getElementById('opt-note').innerHTML='<div class="note">'+
      '<b>'+improved+'</b> 个模块经整改由「需修」转「通过」'+
      (firstAvg!=null&&lastAvg!=null&&roundStat.length>=2?(';主线评分均值 <b>'+num(firstAvg,1)+' → '+num(lastAvg,1)+'</b>('+(lastAvg>=firstAvg?'+':'')+num(lastAvg-firstAvg,1)+')'):'')+
      '。评分=<b>人工分优先</b>,无人工分时取该轮 AI 评审建议(标 * 为含人工分);你在测试报告打分后刷新本页即实时更新。'+
      '<br><span class="muted">已人工评审 <b>'+userReviewed+'</b> / '+mods.filter(function(m){return (m.branches||{}).main;}).length+' 个主线模块'+(FILTER.tag!=='all'||FILTER.line!=='all'||FILTER.round!=='all'?'(当前筛选范围内)':'')+'。</span></div>';
    // 优化明细表(只列经历≥2轮的)
    var optRows=mods.filter(function(m){
      var b=(m.branches||{}).main; if(!b) return false;
      var c=rids.filter(function(rid){return b.rounds[rid];}).length; return c>=2;
    }).map(function(m){
      var cells=rids.map(function(rid){
        var e=eff('main',rid,m); if(!e) return '<td class="r muted">—</td>';
        var sc=e.score!=null?num(e.score,1):'·';
        var u=e.byUser?'<span title="含人工评分" style="opacity:.6">*</span>':'';
        return '<td class="r"><span class="tag '+e.verdict+'">'+sc+u+'</span></td>';
      }).join('');
      return '<tr><td>'+esc(m.id)+' '+esc(m.name)+'</td>'+cells+'</tr>';
    });
    document.getElementById('opt-table').innerHTML=
      '<table><thead><tr><th>模块</th>'+rids.map(function(rid){

      }).join('')+'</tr></thead><tbody>'+(optRows.length?optRows.join(''):'<tr><td colspan="'+(rids.length+1)+'" class="muted">当前筛选下无经历 ≥2 轮的主线模块。</td></tr>')+'</tbody></table>'+
      '<div class="muted" style="margin-top:8px">色块=该轮结论(绿通过/黄需修/红重做),数字=人工优先评分。仅列经历 ≥2 轮的模块。</div>';

    /* ===== ③ 成果 ===== */
    var lastEffRid=scopedRids(rids);   // 受轮次筛选:在所选轮里取最新
    var vd={pass:0,fix:0,redo:0,review:0};
    var scores=[];
    var everPass=0;
    mods.forEach(function(m){
      var b=(m.branches||{}).main; if(!b) return;
      var lastRid=null, ever=false;
      lastEffRid.forEach(function(rid){ if(b.rounds[rid]){ lastRid=rid; var ee=eff('main',rid,m); if(ee&&ee.verdict==='pass') ever=true; } });
      if(!lastRid) return;
      if(ever) everPass++;
      var e=eff('main',lastRid,m); if(!e) return;
      if(vd[e.verdict]==null)vd[e.verdict]=0; vd[e.verdict]++;
      if(e.score!=null) scores.push(e.score);
    });
    var vdTotal=vd.pass+vd.fix+vd.redo+vd.review;
    var passRate=vdTotal?Math.round(vd.pass/vdTotal*100):0;
    var everRate=built?Math.round(everPass/built*100):0;
    var avgFid=scores.length?scores.reduce(function(a,b){return a+b;},0)/scores.length:null;
    // 实建产出(DeepSeek 线可查,受 line 筛选;tag 筛选按模块号交集)
    var totColl=0,totFld=0,szN=0; var tagMnums=null;
    if(FILTER.tag!=='all'){ tagMnums={}; mods.forEach(function(m){ tagMnums[m.num]=1; }); }
    if(AUD&&AUD.modules){ AUD.modules.forEach(function(am){
      if(!am.out_collections) return;
      if(FILTER.line!=='all' && am.line!==FILTER.line) return;
      if(tagMnums && !tagMnums[am.mnum]) return;
      totColl+=am.out_collections; totFld+=am.out_fields; szN++;
    }); }
    document.getElementById('result-kpi').innerHTML=[
      kpi(everRate+'<small>%</small>','曾达通过率',everPass+'/'+built+' 个模块至少一轮通过'),
      kpi(passRate+'<small>%</small>','当前通过率',vd.pass+'/'+vdTotal+' 最新轮通过(r3 仍整改中会回落)'),
      kpi(avgFid!=null?num(avgFid,1):'—','主线平均保真','评分均值(最新轮·人工优先)'),
      kpi(totColl,'张数据表','复刻线实建('+szN+'模块)+ '+totFld+' 字段')
    ].join('');
    // 结论分布:进度条 + 图例 + 环形图
    var vdSegs=[{v:vd.pass,c:COL.pass,l:'通过'},{v:vd.fix,c:COL.fix,l:'需修'},{v:vd.redo,c:COL.redo,l:'重做'},{v:vd.review,c:COL.review,l:'待评',dark:true}];
    document.getElementById('verdict-prog').innerHTML=
      '<div class="muted" style="margin-bottom:7px">最新轮结论(共 '+vdTotal+' 个主线模块)</div>'+
      progBar(vdSegs,vdTotal)+legend(vdSegs,vdTotal);
    document.getElementById('verdict-donut').innerHTML= vdTotal? donut(vdSegs.filter(function(s){return s.v>0;}), vd.pass, vdTotal, '通过') : '<div class="muted">无数据</div>';
    // 复刻线成果对比表(受 line 筛选)
    if(AUD&&AUD.lines){
      var lo=['blind','blind-dspro','blind-dsflash','flash-retest'].filter(function(k){return AUD.lines[k] && (FILTER.line==='all'||k===FILTER.line);});
      document.getElementById('line-result').innerHTML=
        '<table><thead><tr><th>复刻线</th><th>模型</th><th class="r">模块</th><th class="r">自评*</th><th class="r">均时长</th><th class="r">错误率</th><th class="r">日期</th></tr></thead><tbody>'+
        (lo.length?lo.map(function(k){
          var v=AUD.lines[k];
          return '<tr><td><span class="dot" style="background:'+lineColor(k)+'"></span>'+esc(lineLabel(k))+'</td>'+
            '<td class="muted">'+esc(v.model||'')+'</td>'+
            '<td class="r mono">'+v.n+'</td>'+
            '<td class="r mono">'+(v.avg_self_score!=null?num(v.avg_self_score,1)+'<span class="muted"> ('+v.self_score_n+'/'+v.n+')</span>':'—')+'</td>'+
            '<td class="r mono">'+num(v.avg_minutes,0)+'min</td>'+
            '<td class="r mono">'+Math.round((v.avg_err_rate||0)*100)+'%</td>'+
            '<td class="r muted">'+esc(v.date_range||'')+'</td></tr>';
        }).join(''):'<tr><td colspan="7" class="muted">当前筛选无对应复刻线 audit 数据。</td></tr>')+'</tbody></table>'+
        '<div class="note">⚠️ 三线为<b>不同模块</b>(Sonnet/Pro 做 01-05·12-16,Flash 做 06-10),非同题对比;自评*为<b>模型自报</b>(只在显式声明时计,见 n);Sonnet 仅 1/5 有声明。结论看视觉对比图与人工评分,自评仅辅助。</div>';
    }
    // 模块明细(可排序)
    renderDrill(eff, rids);

    /* ===== ④ 费用 ===== */
    if(AUD&&AUD.lines){
      var co=['blind','blind-dspro','blind-dsflash','flash-retest','experiment'].filter(function(k){return AUD.lines[k] && (FILTER.line==='all'||k===FILTER.line);});
      document.getElementById('cost-bars').innerHTML=
        '<div class="muted" style="margin-bottom:7px">各线 均价/模块(USD,对数刻度·跨度大)</div>'+
        hbar(co.map(function(k){
          var v=AUD.lines[k]; var est=(v.engine==='claude');
          return {label:lineLabel(k)||k, val:v.avg_cost, color:lineColor(k)||'#999', log:true,
                  suffix:'$'+money(v.avg_cost)+(est?' <span class="est">~估</span>':'')};
        }), true);
      var s=AUD.lines.blind, p=AUD.lines['blind-dspro'], f=AUD.lines['blind-dsflash'];
      var ratio='';
      if(s&&p&&p.avg_cost>0){ ratio='同类复刻:Sonnet ≈$'+money(s.avg_cost)+'/模块(估),DeepSeek-Pro ≈$'+money(p.avg_cost)+'(便宜 ~'+Math.round(s.avg_cost/p.avg_cost)+'×)'+(f?',Flash ≈$'+money(f.avg_cost)+'(~'+Math.round(s.avg_cost/f.avg_cost)+'×)':'')+'。'; }
      var bg=AUD.claude_project_background;
      document.getElementById('cost-note').innerHTML=ratio+
        '<br><span class="muted">口径:DeepSeek=opencode 厂商实报;Claude=token×价目表<b>估算</b>(~估)。计法不同,倍数为方向性参考。</span>'+
        (bg?'<br><span class="muted">背景:Claude 在本目录 '+bg.active_days+' 天全任务去重 '+bg.unique_turns.toLocaleString()+' 轮,约 $'+bg.cost_sonnet.toLocaleString()+'~$'+bg.cost_opus.toLocaleString()+'(含全部任务)。</span>':'');
      renderCmp();
    } else {
      document.getElementById('s-cost').style.display='none';
    }
  }

  /* ---------- 模块明细(可排序表) ---------- */
  var DRILL={key:'mnum', dir:1};
  function renderDrill(eff, rids){
    var LIB=DATA.LIB, AUD=DATA.AUD;
    var mods=scopedMods();
    // 每个 main 模块一行;关联到 audit(按 mnum + 默认取 blind-dspro / 任一含产出的行)
    var auditByMnum={}; if(AUD&&AUD.modules){ AUD.modules.forEach(function(am){
      var key=am.mnum; if(!auditByMnum[key]) auditByMnum[key]=[]; auditByMnum[key].push(am); }); }
    function pickAudit(mnum){
      var arr=auditByMnum[mnum]||[]; if(!arr.length) return null;
      // 优先有产出统计的行
      var withOut=arr.filter(function(a){return a.out_collections;});
      return (withOut[0]||arr[0]);
    }
    var rows=mods.filter(function(m){return (m.branches||{}).main;}).map(function(m){
      var cur=null, lastRid=null;
      scopedRids(rids).forEach(function(rid){ var e=eff('main',rid,m); if(e){ cur=e; lastRid=rid; } });
      var r1=eff('main','r1',m), r2=eff('main','r2',m), r3=eff('main','r3',m);
      var a=pickAudit(m.num);
      return {
        num:m.num, name:m.name, tag:m.tag||'', mnum:m.num,
        r1:r1?r1.score:null, r2:r2?r2.score:null, r3:r3?r3.score:null,
        verdict: cur?cur.verdict:'review', curScore: cur?cur.score:null,
        cost: a?a.cost_usd:null, minutes: a?a.minutes:null,
        coll: a?a.out_collections:null, fld: a?a.out_fields:null,
        self: a?a.self_score:null, date: a?a.date:'', aline: a?a.line:''
      };
    });
    function cmp(a,b){
      var k=DRILL.key, va=a[k], vb=b[k];
      if(va==null&&vb==null) return 0; if(va==null) return 1; if(vb==null) return -1; // null 沉底
      if(typeof va==='string') return DRILL.dir*va.localeCompare(vb);
      return DRILL.dir*(va-vb);
    }
    rows.sort(cmp);
    function th(key,label,cls){ var act=DRILL.key===key; return '<th class="sortable'+(act?' act':'')+(cls?' '+cls:'')+'" data-k="'+key+'">'+esc(label)+'<span class="ar">'+(act?(DRILL.dir>0?' ▲':' ▼'):' ⇅')+'</span></th>'; }
    function sc(v){ return v==null?'<span class="muted">·</span>':num(v,1); }
    var head='<tr>'+th('mnum','模块')+'<th>类型</th>'+th('r1','R1','r')+th('r2','R2','r')+th('r3','R3','r')+
      '<th>结论</th>'+th('cost','费用$','r')+th('minutes','用时m','r')+th('coll','表','r')+th('fld','字段','r')+th('self','自评','r')+th('date','日期','r')+'</tr>';
    var body=rows.map(function(r){
      return '<tr><td>'+esc(r.num)+' '+esc(r.name)+'</td>'+
        '<td class="muted">'+esc(r.tag)+'</td>'+
        '<td class="r mono">'+sc(r.r1)+'</td><td class="r mono">'+sc(r.r2)+'</td><td class="r mono">'+sc(r.r3)+'</td>'+
        '<td><span class="tag '+r.verdict+'">'+esc((VMETA[r.verdict]||{}).label||r.verdict)+'</span></td>'+
        '<td class="r mono">'+(r.cost!=null?'$'+money(r.cost):'<span class="muted">·</span>')+'</td>'+
        '<td class="r mono">'+(r.minutes!=null?num(r.minutes,0):'<span class="muted">·</span>')+'</td>'+
        '<td class="r mono">'+(r.coll!=null?r.coll:'<span class="muted">·</span>')+'</td>'+
        '<td class="r mono">'+(r.fld!=null?r.fld:'<span class="muted">·</span>')+'</td>'+
        '<td class="r mono">'+(r.self!=null?num(r.self,1):'<span class="muted">·</span>')+'</td>'+
        '<td class="r muted">'+esc(r.date||'')+'</td></tr>';
    }).join('');
    document.getElementById('drill-body').innerHTML=
      '<table><thead>'+head+'</thead><tbody>'+(rows.length?body:'<tr><td colspan="12" class="muted">当前筛选无主线模块。</td></tr>')+'</tbody></table>'+
      '<div class="muted" style="padding:8px 8px 4px">R1/R2/R3=各轮人工优先评分;费用/用时/表/字段/自评取该模块匹配到的复刻线 audit(主应用线本身无单独 token 计量,故用 · 表示)。点表头排序。</div>';
    document.querySelectorAll('#drill-body th.sortable').forEach(function(h){
      h.addEventListener('click', function(){
        var k=h.getAttribute('data-k');
        if(DRILL.key===k) DRILL.dir=-DRILL.dir; else { DRILL.key=k; DRILL.dir=(k==='mnum'||k==='date')?1:-1; }
        renderDrill(eff, rids);
      });
    });
  }

  /* ---------- 多维度对比散点 ---------- */
  var DIMS={
    cost:{label:'费用 $/模块', get:function(v){return v.avg_cost;}, fmt:function(x){return '$'+money(x);}, log:true},
    fid:{label:'保真(自评均)', get:function(v){return v.avg_self_score;}, fmt:function(x){return num(x,1);}},
    time:{label:'用时 min', get:function(v){return v.avg_minutes;}, fmt:function(x){return num(x,0)+'m';}},
    err:{label:'错误率 %', get:function(v){return (v.avg_err_rate||0)*100;}, fmt:function(x){return num(x,0)+'%';}},
    out:{label:'产出(表)', get:function(v){return v._outColl;}, fmt:function(x){return num(x,0)+'表';}}
  };
  function buildCmpPicker(){
    var el=document.getElementById('cmp-pick'); if(!el) return;
    function sel(axis){
      var opts=Object.keys(DIMS).map(function(k){return '<option value="'+k+'"'+(CMP[axis]===k?' selected':'')+'>'+esc(DIMS[k].label)+'</option>';}).join('');
      return '<select class="pick" data-axis="'+axis+'">'+opts+'</select>';
    }
    el.innerHTML='<div class="fgroup"><span class="fl">X 轴</span>'+sel('x')+'</div>'+
                 '<div class="fgroup"><span class="fl">Y 轴</span>'+sel('y')+'</div>'+
                 '<span class="muted" style="margin-left:auto">气泡大小 = 产出(表数),颜色 = 复刻线</span>';
    el.querySelectorAll('select.pick').forEach(function(s){
      s.addEventListener('change', function(){ CMP[s.getAttribute('data-axis')]=s.value; renderCmp(); });
    });
  }
  function renderCmp(){
    var AUD=DATA.AUD; var host=document.getElementById('cmp-scatter'); if(!host) return;
    if(!AUD||!AUD.lines){ host.innerHTML=''; return; }
    var order=['blind','blind-dspro','blind-dsflash','flash-retest','experiment'];
    // 给每条线补 _outColl(audit modules 求和)
    var outByLine={}; if(AUD.modules){ AUD.modules.forEach(function(m){ if(m.out_collections){ outByLine[m.line]=(outByLine[m.line]||0)+m.out_collections; } }); }
    var pts=order.filter(function(k){return AUD.lines[k] && (FILTER.line==='all'||k===FILTER.line);}).map(function(k){
      var v=Object.assign({}, AUD.lines[k]); v._outColl=outByLine[k]||0;
      return {key:k, label:lineLabel(k), color:lineColor(k), v:v};
    });
    var dx=DIMS[CMP.x], dy=DIMS[CMP.y];
    host.innerHTML=scatter(pts, dx, dy);
    var note=document.getElementById('cmp-note');
    if(note){
      note.innerHTML='X=<b>'+esc(dx.label)+'</b>,Y=<b>'+esc(dy.label)+'</b>。气泡=产出表数。'+
        '<br>缺该维度数据的线不画点(如 Claude 线无产出统计、experiment 无自评)。轴含费用时用对数刻度(跨度 ~200×)。';
    }
  }

  /* ---------- 通用渲染件 ---------- */
  function kpi(big,lbl,hint){ return '<div class="card kpi"><div class="big">'+big+'</div><div class="lbl">'+esc(lbl)+'</div>'+(hint?'<div class="hint">'+esc(hint)+'</div>':'')+'</div>'; }
  // 进度条:每段最小可见宽度,段内标签仅在够宽时显示
  function progBar(segs, total){
    if(!total){ return '<div class="prog"></div>'; }
    var html='<div class="prog">';
    segs.forEach(function(s){
      if(!s.v||s.v<=0) return;
      var pct=s.v/total*100;
      var txt=(pct>=12)?(esc(s.l)+' '+s.v):'';
      var fg=s.dark?'rgba(0,0,0,.55)':'#fff';
      html+='<span style="flex:'+s.v+' 1 0;min-width:'+(s.v>0?22:0)+'px;background:'+s.c+';color:'+fg+(s.dark?';text-shadow:none':'')+'" title="'+esc(s.l)+' '+s.v+' ('+num(pct,0)+'%)">'+txt+'</span>';
    });
    return html+'</div>';
  }
  function legend(segs, total){
    var html='<div class="legend">';
    segs.forEach(function(s){
      var pct=total?Math.round(s.v/total*100):0;
      html+='<span class="li"><span class="sw" style="background:'+s.c+'"></span>'+esc(s.l)+' <b>'+s.v+'</b><span class="pc"> · '+pct+'%</span></span>';
    });
    return html+'</div>';
  }
  // 横向条形图(SVG);log=单条按对数缩放(费用跨度大)
  function hbar(items, isLog){
    if(!items.length) return '<div class="muted" style="padding:6px 2px">无数据。</div>';
    var W=560, rowH=30, padL=92, padR=10, padT=4;
    var H=padT*2+items.length*rowH;
    var vals=items.map(function(it){return Math.max(0,it.val||0);});
    var maxV=Math.max.apply(null,vals)||1;
    function scale(v){ if(isLog){ var lo=Math.log10(Math.max(maxV/200, 0.001)); var hi=Math.log10(maxV); var lv=Math.log10(Math.max(v,maxV/200)); return (lv-lo)/(hi-lo||1); } return v/maxV; }
    var bars=items.map(function(it,i){
      var y=padT+i*rowH+4; var bw=Math.max(2,(W-padL-padR-70)*scale(it.val));
      return '<text x="'+(padL-6)+'" y="'+(y+13)+'" text-anchor="end">'+esc(it.label)+'</text>'+
        '<rect x="'+padL+'" y="'+y+'" width="'+bw.toFixed(1)+'" height="18" rx="4" fill="'+it.color+'"></rect>'+
        '<text class="vlbl" x="'+(padL+bw+6)+'" y="'+(y+13)+'">'+(it.suffix||num(it.val,0))+'</text>';
    }).join('');
    return svgEl(W,H,bars);
  }
  // 折线图:r1→r2→r3 评分 + 通过数标注
  function lineChart(pts){
    var W=560,H=170, padL=34,padR=14,padT=14,padB=26;
    var iw=W-padL-padR, ih=H-padT-padB;
    var ymin=0, ymax=10;
    function X(i){ return padL + (pts.length>1? i/(pts.length-1)*iw : iw/2); }
    function Y(v){ return padT + (1-(v-ymin)/(ymax-ymin))*ih; }
    var grid=''; for(var g=0;g<=10;g+=2){ var yy=Y(g); grid+='<line class="gl" x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'"></line><text x="'+(padL-6)+'" y="'+(yy+3)+'" text-anchor="end">'+g+'</text>'; }
    var dpts=pts.filter(function(p){return p.avg!=null;});
    var path=dpts.map(function(p,i){ var idx=pts.indexOf(p); return (i?'L':'M')+X(idx)+' '+Y(p.avg); }).join(' ');
    var dots=pts.map(function(p,i){ if(p.avg==null) return '';
      return '<circle cx="'+X(i)+'" cy="'+Y(p.avg)+'" r="4.5" fill="'+COL.mainc+'"></circle>'+
        '<text class="vlbl" x="'+X(i)+'" y="'+(Y(p.avg)-9)+'" text-anchor="middle">'+num(p.avg,1)+'</text>'+
        '<text x="'+X(i)+'" y="'+(H-8)+'" text-anchor="middle">'+esc(p.label)+' · 通过'+p.pass+'</text>'; }).join('');
    var line=dpts.length>=2?'<path d="'+path+'" fill="none" stroke="'+COL.mainc+'" stroke-width="2.5" stroke-linejoin="round"></path>':'';
    return '<div class="chart-cap">主线评分趋势(0–10,人工优先)</div>'+svgEl(W,H,grid+line+dots);
  }
  // 环形图(donut)
  function donut(segs, centerVal, total, centerLbl){
    var size=160, r=62, sw=24, cx=size/2, cy=size/2, C=2*Math.PI*r;
    var off=0; var arcs=segs.map(function(s){
      var frac=s.v/total; var len=frac*C;
      var el='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.c+'" stroke-width="'+sw+'" stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')"><title>'+esc(s.l)+' '+s.v+'</title></circle>';
      off+=len; return el;
    }).join('');
    var pct=total?Math.round(centerVal/total*100):0;
    var inner='<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" style="font-size:26px;font-weight:700" fill="'+cvar('--text')+'">'+pct+'%</text>'+
              '<text x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle">'+esc(centerLbl)+'</text>';
    return '<div class="chart-cap">结论占比</div>'+svgEl(size,size,'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#eef1f4" stroke-width="'+sw+'"></circle>'+arcs+inner);
  }
  // 散点 / 气泡图
  function scatter(pts, dx, dy){
    var W=560,H=300, padL=52,padR=58,padT=22,padB=42;
    var iw=W-padL-padR, ih=H-padT-padB;
    var good=pts.filter(function(p){ return dx.get(p.v)!=null && dy.get(p.v)!=null && isFinite(dx.get(p.v)) && isFinite(dy.get(p.v)); });
    if(!good.length) return '<div class="muted" style="padding:10px 2px">所选两个维度在当前筛选下无可画的点(对应数据缺失)。换个维度或清除筛选。</div>';
    function ext(getter,log){
      var vs=good.map(function(p){return getter(p.v);});
      var mn=Math.min.apply(null,vs), mx=Math.max.apply(null,vs);
      if(log){ mn=Math.max(mn,1e-3); }
      if(mn===mx){ mn=log?mn/2:mn-1; mx=log?mx*2:mx+1; }
      else { var pad=(mx-mn)*0.12; if(!log){ mn-=pad; mx+=pad; } }
      if(!log && mn>0 && getter===DIMS.fid.get) mn=Math.max(0,mn);
      return {mn:mn,mx:mx};
    }
    var ex=ext(dx.get,dx.log), ey=ext(dy.get,dy.log);
    function sx(v){ if(dx.log){ return padL+ (Math.log10(Math.max(v,1e-3))-Math.log10(ex.mn))/(Math.log10(ex.mx)-Math.log10(ex.mn)||1)*iw; } return padL+(v-ex.mn)/(ex.mx-ex.mn||1)*iw; }
    function sy(v){ if(dy.log){ return padT+ (1-(Math.log10(Math.max(v,1e-3))-Math.log10(ey.mn))/(Math.log10(ey.mx)-Math.log10(ey.mn)||1))*ih; } return padT+(1-(v-ey.mn)/(ey.mx-ey.mn||1))*ih; }
    // 气泡大小=产出表数
    var outs=good.map(function(p){return p.v._outColl||0;}); var maxOut=Math.max.apply(null,outs)||1;
    function rad(o){ return 6+ Math.sqrt(o/maxOut)*16; }
    // 轴 + 网格(4 段)
    var axis='<line class="axis" x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(padT+ih)+'"></line>'+
             '<line class="axis" x1="'+padL+'" y1="'+(padT+ih)+'" x2="'+(padL+iw)+'" y2="'+(padT+ih)+'"></line>';
    var ticks=''; for(var i=0;i<=4;i++){
      var fx=ex.mn + (dx.log? 0 : (ex.mx-ex.mn)*i/4);
      var vx=dx.log? Math.pow(10, Math.log10(ex.mn)+(Math.log10(ex.mx)-Math.log10(ex.mn))*i/4) : fx;
      var px=padL+iw*i/4;
      ticks+='<line class="gl" x1="'+px+'" y1="'+padT+'" x2="'+px+'" y2="'+(padT+ih)+'"></line>'+
             '<text x="'+px+'" y="'+(padT+ih+14)+'" text-anchor="middle">'+esc(dx.fmt(vx))+'</text>';
      var vy=dy.log? Math.pow(10, Math.log10(ey.mn)+(Math.log10(ey.mx)-Math.log10(ey.mn))*i/4) : ey.mn+(ey.mx-ey.mn)*i/4;
      var py=padT+ih*(1-i/4);
      ticks+='<line class="gl" x1="'+padL+'" y1="'+py+'" x2="'+(padL+iw)+'" y2="'+py+'"></line>'+
             '<text x="'+(padL-6)+'" y="'+(py+3)+'" text-anchor="end">'+esc(dy.fmt(vy))+'</text>';
    }
    var bubbles=good.map(function(p){
      var x=sx(dx.get(p.v)), y=sy(dy.get(p.v)), rr=rad(p.v._outColl||0);
      var lx=Math.min(W-4, Math.max(4, x)), anc=(x>W-70)?'end':(x<70?'start':'middle');
      if(anc==='end') lx=x+rr; else if(anc==='start') lx=x-rr;
      return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+rr.toFixed(1)+'" fill="'+p.color+'" fill-opacity="0.5" stroke="'+p.color+'" stroke-width="1.5"><title>'+esc(p.label)+'\n'+esc(dx.label)+': '+esc(dx.fmt(dx.get(p.v)))+'\n'+esc(dy.label)+': '+esc(dy.fmt(dy.get(p.v)))+'\n产出: '+(p.v._outColl||0)+' 表</title></circle>'+
        '<text class="vlbl" x="'+lx.toFixed(1)+'" y="'+(y-rr-4).toFixed(1)+'" text-anchor="'+anc+'">'+esc(p.label)+'</text>';
    }).join('');
    var xlab='<text x="'+(padL+iw/2)+'" y="'+(H-6)+'" text-anchor="middle" style="font-weight:600">'+esc(dx.label)+(dx.log?' (log)':'')+'</text>';
    var ylab='<text transform="rotate(-90 14 '+(padT+ih/2)+')" x="14" y="'+(padT+ih/2)+'" text-anchor="middle" style="font-weight:600">'+esc(dy.label)+(dy.log?' (log)':'')+'</text>';
    return svgEl(W,H, ticks+axis+xlab+ylab+bubbles);
  }
  function svgEl(w,h,inner){
    return '<svg class="chart" viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" preserveAspectRatio="xMidYMid meet" role="img">'+inner+'</svg>';
  }
})();
</script>
</body>
