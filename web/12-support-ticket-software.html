<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HelpDesk — Support Inbox</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: #1d1d1f;
    background: #f0f2f5;
  }

  /* ── Antd Color Tokens ── */
  :root {
    --primary:       #0066ff;   /* slightly richer blue for support/trust */
    --primary-soft:  #e8f0fe;
    --primary-hover: #0052cc;
    --green:         #52c41a;
    --green-soft:    #f6ffed;
    --orange:        #fa8c16;
    --orange-soft:   #fff7e6;
    --red:           #f5222d;
    --red-soft:      #fff1f0;
    --yellow:        #fadb14;
    --purple:        #722ed1;
    --purple-soft:   #f9f0ff;
    --cyan:          #13c2c2;
    --cyan-soft:     #e6fffb;

    --text-primary:   #1d1d1f;
    --text-secondary: #595959;
    --text-tertiary:  #8c8c8c;
    --text-disabled:  #bfbfbf;
    --border:         #e8e8e8;
    --border-hover:   #d9d9d9;
    --bg-container:   #ffffff;
    --bg-layout:      #f0f2f5;
    --bg-hover:       #f5f5f5;
    --bg-selected:    #e8f0fe;

    --radius-sm:  4px;
    --radius:     8px;
    --radius-lg:  12px;
    --shadow-sm:  0 1px 4px rgba(0,0,0,.06);
    --shadow:     0 2px 12px rgba(0,0,0,.08);
    --shadow-lg:  0 4px 24px rgba(0,0,0,.12);
  }

  /* ── App Shell ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg-layout);
  }

  /* ── Top Nav ── */
  .topnav {
    height: 52px;
    background: var(--bg-container);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  .topnav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    color: var(--primary);
    text-decoration: none;
    white-space: nowrap;
  }
  .topnav-logo svg { width: 22px; height: 22px; }

  .topnav-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: 8px;
  }
  .topnav-tab {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .topnav-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
  .topnav-tab.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }

  .topnav-search {
    flex: 1;
    max-width: 400px;
    margin-left: 8px;
    position: relative;
  }
  .topnav-search input {
    width: 100%;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0 12px 0 34px;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--bg-layout);
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .topnav-search input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(0,102,255,.12);
    background: #fff;
  }
  .topnav-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
  }
  .topnav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-secondary);
    transition: background .15s, color .15s;
    position: relative;
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .notif-dot {
    position: absolute; top: 4px; right: 4px;
    width: 7px; height: 7px;
    background: var(--red); border-radius: 50%;
    border: 2px solid #fff;
  }
  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .avatar.sm { width: 24px; height: 24px; font-size: 10px; }
  .avatar.lg { width: 36px; height: 36px; font-size: 14px; }
  .avatar.xl { width: 44px; height: 44px; font-size: 17px; }

  /* ── Context Bar (below topnav, inside inbox) ── */
  .context-bar {
    height: 44px;
    background: var(--bg-container);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
  }
  .context-label {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
  }
  .context-count {
    background: var(--bg-layout);
    color: var(--text-secondary);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 600;
  }
  .context-spacer { flex: 1; }
  .btn {
    height: 28px;
    padding: 0 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-container);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: border .15s, color .15s, background .15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn.primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .btn.sm { height: 24px; padding: 0 9px; font-size: 11px; }

  /* ── Three-column Layout ── */
  .inbox-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Left Column: Ticket List ── */
  .col-left {
    width: 300px;
    flex-shrink: 0;
    background: var(--bg-container);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-left-filters {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-chip {
    height: 24px;
    padding: 0 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    background: var(--bg-container);
    transition: all .15s;
    white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
  .filter-chip.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
  .filter-chip.urgent.active { background: var(--red-soft); border-color: var(--red); color: var(--red); }
  .filter-chip.warn.active { background: var(--orange-soft); border-color: var(--orange); color: var(--orange); }

  .ticket-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .ticket-list::-webkit-scrollbar { width: 5px; }
  .ticket-list::-webkit-scrollbar-track { background: transparent; }
  .ticket-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

  .ticket-item {
    padding: 10px 12px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .12s;
    position: relative;
  }
  .ticket-item:hover { background: var(--bg-hover); }
  .ticket-item.selected {
    background: var(--bg-selected);
    border-left-color: var(--primary);
  }
  .ticket-item + .ticket-item { border-top: 1px solid #f5f5f5; }

  .ticket-item-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .ticket-chan-icon {
    width: 16px; height: 16px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ticket-chan-icon svg { width: 11px; height: 11px; }
  .chan-email { background: #fff3e0; color: #e65100; }
  .chan-chat  { background: #e8f5e9; color: #2e7d32; }
  .chan-web   { background: #e3f2fd; color: #1565c0; }
  .chan-phone { background: #fce4ec; color: #880e4f; }

  .ticket-subject {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-primary);
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .unread-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--primary);
    flex-shrink: 0;
  }
  .ticket-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }
  .ticket-customer {
    font-size: 11.5px;
    color: var(--text-secondary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex: 1;
  }
  .ticket-time {
    font-size: 11px;
    color: var(--text-tertiary);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ticket-preview {
    font-size: 11.5px;
    color: var(--text-tertiary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }
  .ticket-tags {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tag {
    height: 16px;
    padding: 0 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    display: inline-flex; align-items: center;
    white-space: nowrap;
  }
  .tag-status-open     { background: var(--primary-soft); color: var(--primary); }
  .tag-status-pending  { background: var(--orange-soft);  color: var(--orange); }
  .tag-status-resolved { background: var(--green-soft);   color: var(--green); }
  .tag-status-closed   { background: #f5f5f5;             color: var(--text-tertiary); }
  .tag-pri-urgent  { background: var(--red-soft);    color: var(--red); }
  .tag-pri-high    { background: var(--orange-soft); color: var(--orange); }
  .tag-pri-normal  { background: #f5f5f5;             color: var(--text-secondary); }
  .tag-pri-low     { background: #f5f5f5;             color: var(--text-disabled); }
  .sla-badge {
    margin-left: auto;
    height: 16px;
    padding: 0 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    display: inline-flex; align-items: center;
  }
  .sla-ok      { background: var(--green-soft);  color: var(--green); }
  .sla-warn    { background: var(--orange-soft); color: var(--orange); }
  .sla-breach  { background: var(--red-soft);    color: var(--red); }
  .sla-na      { background: #f5f5f5;            color: var(--text-disabled); }

  /* ── Middle Column: Conversation Thread ── */
  .col-mid {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f8f9fb;
    min-width: 0;
  }

  .thread-header {
    background: var(--bg-container);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .thread-header-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .thread-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .thread-id {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 1px;
  }
  .thread-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .thread-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-pill {
    height: 22px;
    padding: 0 9px;
    border-radius: 11px;
    font-size: 11px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg-layout);
    color: var(--text-secondary);
    cursor: pointer;
    border: 1px solid var(--border);
    transition: border .15s, color .15s;
  }
  .meta-pill:hover { border-color: var(--primary); color: var(--primary); }
  .meta-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Conversation Messages ── */
  .thread-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .thread-messages::-webkit-scrollbar { width: 5px; }
  .thread-messages::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

  .msg-group {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: flex-start;
  }
  .msg-group.from-customer { flex-direction: row; }
  .msg-group.from-agent    { flex-direction: row-reverse; }

  .msg-avatar-wrap { flex-shrink: 0; }

  .msg-body-wrap {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    gap: 3px;
  }
  .msg-group.from-agent .msg-body-wrap { align-items: flex-end; }

  .msg-sender-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .msg-group.from-agent .msg-sender-line { flex-direction: row-reverse; }
  .msg-sender-name { font-weight: 600; color: var(--text-secondary); }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
    box-shadow: var(--shadow-sm);
  }
  .msg-group.from-customer .msg-bubble {
    background: var(--bg-container);
    color: var(--text-primary);
    border-bottom-left-radius: 3px;
  }
  .msg-group.from-agent .msg-bubble {
    background: var(--primary);
    color: #fff;
    border-bottom-right-radius: 3px;
  }

  .msg-note-group {
    margin-bottom: 14px;
  }
  .msg-note-label {
    font-size: 11px;
    color: var(--orange);
    font-weight: 600;
    text-align: center;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .msg-note-label::before,
  .msg-note-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ffe7ba;
  }
  .msg-note-bubble {
    background: #fffbe6;
    border: 1px solid #ffe58f;
    border-radius: var(--radius);
    padding: 9px 14px;
    font-size: 12.5px;
    line-height: 1.5;
    color: #7c5700;
    margin: 0 32px;
  }
  .msg-note-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    text-align: right;
    margin: 3px 32px 0;
  }

  .thread-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 16px;
    font-size: 11px;
    color: var(--text-disabled);
  }
  .thread-divider::before, .thread-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Reply Box ── */
  .reply-box {
    background: var(--bg-container);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .reply-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 10px;
  }
  .reply-tab {
    height: 26px;
    padding: 0 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-tertiary);
    transition: background .12s, color .12s;
  }
  .reply-tab:hover { background: var(--bg-hover); color: var(--text-secondary); }
  .reply-tab.active { background: var(--primary-soft); color: var(--primary); }
  .reply-tab.note.active { background: #fffbe6; color: var(--orange); }

  .reply-textarea {
    width: 100%;
    min-height: 80px;
    max-height: 180px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text-primary);
    resize: vertical;
    outline: none;
    font-family: inherit;
    line-height: 1.5;
    transition: border .15s, box-shadow .15s;
  }
  .reply-textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(0,102,255,.1);
  }
  .reply-textarea::placeholder { color: var(--text-disabled); }

  .reply-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .quick-replies {
    display: flex;
    gap: 5px;
    flex: 1;
    overflow: hidden;
  }
  .quick-reply-chip {
    height: 24px;
    padding: 0 10px;
    border-radius: 12px;
    background: var(--bg-layout);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    display: inline-flex; align-items: center;
  }
  .quick-reply-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }

  .reply-send-row { display: flex; align-items: center; gap: 6px; }

  /* ── Right Column: Customer Sidebar ── */
  .col-right {
    width: 256px;
    flex-shrink: 0;
    background: var(--bg-container);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .col-right::-webkit-scrollbar { width: 5px; }
  .col-right::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

  .sidebar-section {
    padding: 14px 14px 10px;
    border-bottom: 1px solid #f0f0f0;
  }
  .sidebar-section:last-child { border-bottom: none; }

  .sidebar-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section-title a {
    font-size: 10px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
    color: var(--primary);
    cursor: pointer;
  }

  .contact-card {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .contact-info { flex: 1; min-width: 0; }
  .contact-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .contact-company {
    font-size: 11.5px;
    color: var(--text-secondary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .contact-detail-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .contact-detail-row svg { color: var(--text-tertiary); flex-shrink: 0; }
  .contact-detail-val { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  .kv-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .kv-key   { color: var(--text-tertiary); }
  .kv-val   { color: var(--text-primary); font-weight: 500; text-align: right; max-width: 140px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  .ticket-history-item {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 6px 0;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background .12s;
  }
  .ticket-history-item:hover { background: var(--bg-hover); margin: 0 -4px; padding: 6px 4px; }
  .ticket-history-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .history-subject {
    font-size: 12px;
    color: var(--text-primary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    line-height: 1.3;
    flex: 1;
  }
  .history-date { font-size: 11px; color: var(--text-disabled); white-space: nowrap; }

  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 6px;
  }
  .tag-label {
    height: 20px;
    padding: 0 8px;
    border-radius: 3px;
    font-size: 11px;
    background: #f5f5f5;
    color: var(--text-secondary);
    display: inline-flex; align-items: center;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all .15s;
  }

let selectedTicketId = TICKETS[0].id;

function getTicket(id) { return TICKETS.find(t => t.id === id); }
function getAgent(id)  { return AGENTS.find(a => a.id === id); }

/* ══════════════════════════════════════════
   Ticket List Render
══════════════════════════════════════════ */
function renderTicketList() {
  const container = document.getElementById('ticketList');
  container.innerHTML = TICKETS.map(t => {
    const selected = t.id === selectedTicketId ? ' selected' : '';
    const chanClass = 'chan-' + t.channel;
    const statusClass = 'tag-status-' + t.status;
    const priClass = 'tag-pri-' + t.priority;
    const slaClass = 'sla-' + t.sla.state;
    const unread = t.unread ? '<span class="unread-dot"></span>' : '';

    // assignee initials mini
    const assigneeHtml = t.assignee
      ? `<div class="avatar sm" style="background:${t.assignee.color}" title="${t.assignee.name}">${t.assignee.initials}</div>`
      : `<div class="avatar sm" style="background:#d9d9d9;color:#8c8c8c" title="Unassigned">–</div>`;

    return `<div class="ticket-item${selected}" onclick="selectTicket('${t.id}')">
  <div class="ticket-item-top">
    <span class="ticket-chan-icon ${chanClass}">${ICONS[t.channel]}</span>
    <span class="ticket-subject">${t.subject}</span>
    ${unread}
  </div>
  <div class="ticket-meta">
    <span class="ticket-customer">${t.customer.name}${t.customer.company ? ' · ' + t.customer.company : ''}</span>
    <span class="ticket-time">${t.sla.state !== 'na' ? '⏱ ' + t.sla.label : t.sla.label}</span>
  </div>
  <div class="ticket-preview">${t.preview}</div>
  <div class="ticket-tags">
    <span class="tag ${statusClass}">${capitalize(t.status)}</span>
    <span class="tag ${priClass}">${capitalize(t.priority)}</span>
    ${assigneeHtml}
    ${t.sla.state !== 'na' ? `<span class="sla-badge ${slaClass}">${t.sla.state === 'ok' ? '✓ SLA' : t.sla.state === 'breach' ? '🔴 BREACH' : '⚠ SLA'}</span>` : ''}
  </div>
</div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   Thread Header Render
══════════════════════════════════════════ */
function renderThreadHeader(ticket) {
  const chanClass = 'chan-' + ticket.channel;
  const statusClass = 'tag-status-' + ticket.status;
  const priClass = 'tag-pri-' + ticket.priority;
  const slaClass = 'sla-' + ticket.sla.state;

  const assigneeHtml = ticket.assignee

       </div>`

        <div class="avatar sm" style="background:#d9d9d9;color:#8c8c8c">–</div>
        <span class="assignee-name" style="color:var(--text-tertiary)">Unassigned</span>

  document.getElementById('threadHeader').innerHTML = `
<div class="thread-header-top">
  <div>
    <div class="thread-title">${ticket.subject}</div>
    <div class="thread-id">${ticket.id} · via ${capitalize(ticket.channel)} · Opened ${ticket.thread[0].time}</div>
  </div>
  <div class="thread-actions">
    <button class="btn sm">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      Merge
    </button>
    <button class="btn sm">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Assign
    </button>
    <button class="btn sm" style="background:var(--green-soft);color:var(--green);border-color:var(--green)" onclick="resolveTicket('${ticket.id}')">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Resolve
    </button>
    <div class="icon-btn" title="More options" style="width:28px;height:28px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
    </div>
  </div>
</div>
<div class="thread-meta-row">
  <div class="meta-pill">
    <span class="dot" style="background:${ticket.status === 'open' ? 'var(--primary)' : ticket.status === 'pending' ? 'var(--orange)' : ticket.status === 'resolved' ? 'var(--green)' : '#bfbfbf'}"></span>
    ${capitalize(ticket.status)}
  </div>
  <div class="meta-pill">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    ${capitalize(ticket.priority)} priority
  </div>
  ${ticket.sla.state !== 'na' ? `<div class="meta-pill" style="${ticket.sla.state === 'breach' ? 'color:var(--red);border-color:var(--red);background:var(--red-soft)' : ticket.sla.state === 'warn' ? 'color:var(--orange);border-color:var(--orange);background:var(--orange-soft)' : ''}">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    ${ticket.sla.state === 'breach' ? 'SLA Breached · ' + ticket.sla.label + ' overdue' : ticket.sla.state === 'warn' ? ticket.sla.label + ' remaining' : ticket.sla.label + ' remaining'}
  </div>` : ''}
  <div class="meta-pill">
    <span class="ticket-chan-icon ${chanClass}" style="width:12px;height:12px;background:transparent;padding:0">${ICONS[ticket.channel]}</span>

  </div>
</div>`;
}

/* ══════════════════════════════════════════
   Thread Messages Render
══════════════════════════════════════════ */
function renderThreadMessages(ticket) {
  const container = document.getElementById('threadMessages');
  let html = '';

  ticket.thread.forEach((msg, idx) => {
    if (msg.type === 'note') {
      const agent = getAgent(msg.agentId);
      html += `<div class="msg-note-group">
  <div class="msg-note-label">🔒 Internal Note</div>
  <div class="msg-note-bubble">${msg.text}</div>
  <div class="msg-note-meta">${agent ? agent.name : 'Agent'} · ${msg.time}</div>
</div>`;
    } else if (msg.type === 'customer') {
      const c = ticket.customer;
      html += `<div class="msg-group from-customer">
  <div class="msg-avatar-wrap">
    <div class="avatar" style="background:${c.color};width:34px;height:34px;font-size:13px">${c.initials}</div>
  </div>
  <div class="msg-body-wrap">
    <div class="msg-sender-line"><span class="msg-sender-name">${c.name}</span> <span>${msg.time}</span></div>
    <div class="msg-bubble">${msg.text}</div>
  </div>
</div>`;
    } else if (msg.type === 'agent') {
      const agent = getAgent(msg.agentId);
      html += `<div class="msg-group from-agent">
  <div class="msg-avatar-wrap">
    <div class="avatar" style="background:${agent ? agent.color : '#1565c0'};width:34px;height:34px;font-size:13px">${agent ? agent.initials : '??'}</div>
  </div>
  <div class="msg-body-wrap">
    <div class="msg-sender-line"><span class="msg-sender-name">${agent ? agent.name : 'Agent'}</span> <span>${msg.time}</span></div>
    <div class="msg-bubble">${msg.text}</div>
  </div>
</div>`;
    }

    // Add a divider before the last message if it's from today
    if (idx === ticket.thread.length - 2 && ticket.thread.length > 2) {
      // subtle separator
    }
  });

  if (ticket.thread.length === 1) {
    html += `<div class="thread-divider">No replies yet — be the first to respond</div>`;
  }

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

  // Orders section
  let ordersHtml = '';

  ${ticket.orders.map(o => `<div class="order-card">

  let historyHtml = '';
  if (ticket.ticketHistory.length > 0) {

    historyHtml = `<div class="sidebar-section">

  ${ticket.ticketHistory.map(h => `<div class="ticket-history-item">

  sidebar.innerHTML = contactHtml + statsHtml + tagsHtml + ordersHtml + historyHtml;

/* ══════════════════════════════════════════
   Interactions
══════════════════════════════════════════ */
function selectTicket(id) {
  selectedTicketId = id;
  // Mark as read
  const t = getTicket(id);
  if (t) t.unread = false;
  renderTicketList();
  renderThreadHeader(t);
  renderThreadMessages(t);
  renderSidebar(t);
}

function setFilter(el, val) {
  document.querySelectorAll('.col-left-filters .filter-row:first-child .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function toggleFilter(el) {
  el.classList.toggle('active');
}

function switchReplyTab(tab) {
  activeReplyTab = tab;
  ['Reply', 'Note', 'Forward'].forEach(t => {
    document.getElementById('replyTab' + t).classList.remove('active');
  });
  document.getElementById('replyTab' + capitalize(tab === 'note' ? 'Note' : tab === 'forward' ? 'Forward' : 'Reply')).classList.add('active');

  const ta = document.getElementById('replyTextarea');
  if (tab === 'note') {
    ta.placeholder = 'Add an internal note (not visible to customer)…';
    ta.style.background = '#fffbe6';
    ta.style.borderColor = '#ffe58f';
  } else if (tab === 'forward') {
    ta.placeholder = 'Forward to email address…';
    ta.style.background = '';
    ta.style.borderColor = '';
  } else {
    ta.placeholder = 'Type your reply… (Ctrl+Enter to send)';
    ta.style.background = '';
    ta.style.borderColor = '';
  }
}

function insertQuickReply(text) {
  const ta = document.getElementById('replyTextarea');
  ta.value = text;
  ta.focus();
}

function sendReply() {
  const ta = document.getElementById('replyTextarea');
  const text = ta.value.trim();
  if (!text) return;
  const ticket = getTicket(selectedTicketId);
  if (!ticket) return;

  if (activeReplyTab === 'note') {
    ticket.thread.push({ type: 'note', time: 'Just now', agentId: 'a1', text });
  } else {
    ticket.thread.push({ type: 'agent', time: 'Just now', agentId: 'a1', text });
  }
  ta.value = '';
  renderThreadMessages(ticket);
}

function resolveTicket(id) {
  const ticket = getTicket(id);
  if (ticket) {
    ticket.status = 'resolved';
    renderTicketList();
    renderThreadHeader(ticket);
  }
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    sendReply();
  }
});

/* ══════════════════════════════════════════
   Init
══════════════════════════════════════════ */
(function init() {
  renderTicketList();
  const t = getTicket(selectedTicketId);
  renderThreadHeader(t);
  renderThreadMessages(t);
  renderSidebar(t);
})();
</script>
