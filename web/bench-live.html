<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bench Live — model×flow 实时流水线</title>
<link rel="stylesheet" href="shared.css">
<style>
  :root{ --done:#389e0d; --work:#1677ff; --stall:#d48806; --idle:#bfbfbf; } /* base tokens from shared.css */
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;}
  .pagehead{padding:10px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;background:var(--container)}
  .pagehead h1{font-size:16px;margin:0;font-weight:650}
  .sub{color:var(--mut);font-size:12px}
  .wrap{display:grid;grid-template-columns:1fr 460px;gap:0;height:calc(100vh - 96px)}
  .grid{padding:16px;overflow:auto}
  table.mx{border-collapse:separate;border-spacing:10px 10px;width:100%}
  table.mx th{color:var(--mut);font-weight:600;font-size:12px;text-align:left;padding:0 6px}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;min-height:92px;transition:border-color .15s;display:block;width:100%;text-align:left;color:inherit;font:inherit}
  .cell:hover{border-color:#bcd6ff}
  .cell.sel{border-color:var(--work);box-shadow:0 0 0 1px var(--work) inset}
  .cell.empty{opacity:.45;cursor:default}
  .crow{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .dot.done{background:var(--done)} .dot.working{background:var(--work);animation:p 1.1s infinite}
  .dot.stalled{background:var(--stall)} .dot.idle{background:var(--idle)}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  .ttl{font-weight:600;font-size:13px} .meta{color:var(--mut);font-size:11px;margin-left:auto;white-space:nowrap}
  .last{color:var(--mut);font-size:11.5px;margin-top:4px;max-height:34px;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .scn{color:var(--mut);font-size:11px;font-weight:600;padding:6px 6px 0}
  /* stream panel */
  .stream{border-left:1px solid var(--line);display:flex;flex-direction:column;height:100%}
  .shead{padding:11px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .shead .x{margin-left:auto;color:var(--mut);cursor:pointer;font-size:18px;line-height:1}
  .slog{flex:1;overflow:auto;padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
  .it{padding:6px 8px;border-radius:7px;margin-bottom:6px;white-space:pre-wrap;word-break:break-word;border:1px solid transparent}
  .it.think{background:#fafafa;color:#8a8a8a} .it.tool{background:#f0f7ff;color:#0958d9;border-color:#bcd6ff}
  .it.say{background:#f6ffed;color:#389e0d;border-color:#b7eb8f} .it.step{color:var(--mut);font-size:11px;padding:2px 8px}
  .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;opacity:.7;margin-right:6px}
  .empty-stream{color:var(--mut);padding:30px;text-align:center}
  .badge{font-size:11px;padding:1px 7px;border-radius:20px;border:1px solid var(--line);color:var(--mut)}
  .legend{margin-left:auto;display:flex;gap:12px;font-size:11px;color:var(--mut);align-items:center}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
</style>
</head>
<body>
<nav class="app-nav">
  <span class="brand"><span class="dot"></span>企业应用示例库</span>
  <a href="index.html">画廊</a><a href="test-report.html">测试中心</a>
  <a href="runs.html">历次跑测</a><a href="bench-live.html" class="cur">实时看板</a><a href="dashboard.html">仪表盘</a>
</nav>
<div class="pagehead">
  <h1>Bench Live</h1>
  <span class="sub">model × flow × scenario · opencode 实时会话(自动关联)</span>
  <span class="legend">
    <span><i class="dot done" style="background:var(--done)"></i>done</span>
    <span><i class="dot" style="background:var(--work)"></i>working</span>
    <span><i class="dot" style="background:var(--stall)"></i>stalled</span>
    <span id="upd">—</span>
  </span>
</div>
<div class="wrap">
  <div class="grid" id="grid">加载中…</div>
  <div class="stream" id="stream">
    <div class="shead"><b id="stitle">点左侧任意格看实时活动</b><span class="x" onclick="closeStream()">×</span></div>
    <div class="slog" id="slog"><div class="empty-stream">选一个 cell 查看它的 opencode 会话流(分页轮询)。</div></div>
  </div>
</div>
<script>
const COLS=[['qwen-plus','pure','plus·纯'],['qwen-plus','html','plus·html'],['qwen-max','pure','max·纯'],['qwen-max','html','max·html']];
const SCN=[['01','库存 inventory'],['02','资产 asset'],['03','内容 content-cal']];
let CELLS={}, cur=null, curMax=0;

function fmtAge(s){ if(s>=1e8)return''; if(s<90)return Math.round(s)+'s'; if(s<5400)return Math.round(s/60)+'m'; return Math.round(s/3600)+'h'; }
async function loadList(){
  try{
    const r=await fetch('/api/bench-live',{cache:'no-store'}); const d=await r.json();
    CELLS={}; (d.cells||[]).forEach(c=>CELLS[c.cell]=c);
    document.getElementById('upd').textContent='刷新 '+new Date((d.updated||0)*1000).toLocaleTimeString();
    render();
  }catch(e){ document.getElementById('upd').textContent='API 错误'; }
}
function render(){
  let h='<table class="mx"><thead><tr><th></th>';
  COLS.forEach(c=>h+='<th>'+c[2]+'</th>'); h+='</tr></thead><tbody>';
  SCN.forEach(([sc,scl])=>{
    h+='<tr><td class="scn">#'+sc+'<br>'+scl+'</td>';
    COLS.forEach(([m,f])=>{
      const key=m+'-'+f+'-'+sc, c=CELLS[key];
      if(!c){ h+='<td><div class="cell empty"><div class="crow"><span class="dot idle"></span><span class="ttl">'+m.replace('qwen-','')+'·'+f+'</span></div><div class="last">— 未开始 —</div></div></td>'; return; }
      const sel=cur===c.session?' sel':'';
      h+='<td><button class="cell'+sel+'" onclick="openStream(\''+c.session+'\',\''+key+'\')">'
        +'<div class="crow"><span class="dot '+c.status+'"></span><span class="ttl">'+c.model.replace('qwen-','')+'·'+c.flow+'</span>'
        +'<span class="meta">'+(c.tokensOut||0)+' tok · '+c.parts+'p · '+fmtAge(c.ageSec)+'</span></div>'
        +'<div class="last">'+esc(c.last||'')+'</div></button></td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('grid').innerHTML=h;
}
function esc(s){return (s||'').replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x]));}
async function openStream(sid,key){
  cur=sid; curMax=0; render();
  document.getElementById('stitle').textContent=key+'  ·  '+sid.slice(0,18);
  document.getElementById('slog').innerHTML='<div class="empty-stream">加载…</div>';
  await pumpStream(true);
}
function closeStream(){ cur=null; render(); document.getElementById('stitle').textContent='点左侧任意格看实时活动'; document.getElementById('slog').innerHTML='<div class="empty-stream">选一个 cell 查看它的 opencode 会话流。</div>'; }
async function pumpStream(reset){
  if(!cur) return;
  try{
    // fetch last page (tail): first get total via page0 size1? simpler: pull a big tail window
    const r=await fetch('/api/bench-live?session='+cur+'&tail=1&size=400',{cache:'no-store'});
    const d=await r.json(); const items=d.items||[];
    const log=document.getElementById('slog');
    log.innerHTML = items.length? items.map(it=>{
      const k=it.kind; const cls=(k==='think'||k==='tool'||k==='say'||k==='step')?k:'think';
      return '<div class="it '+cls+'"><span class="k">'+k+'</span>'+esc(it.text)+'</div>';
    }).join('') : '<div class="empty-stream">暂无活动</div>';
    log.scrollTop=log.scrollHeight;
  }catch(e){}
}
loadList(); setInterval(loadList,5000);
setInterval(()=>{ if(cur) pumpStream(false); },4000);
</script>
</body>
</html>
