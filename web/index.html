<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>企业应用示例库 — 50 场景原型</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 -apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#1f2329}
.wrap{max-width:1280px;margin:0 auto;padding:24px 18px 60px}
h1{font-size:22px;margin-bottom:4px}
.sub{color:#646a73;font-size:13px;margin-bottom:16px}
.bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center}
.bar button{border:1px solid #dcdfe5;background:#fff;border-radius:16px;padding:5px 14px;font-size:13px;cursor:pointer;color:#1f2329}
.bar button.on{background:#1f2329;color:#fff;border-color:#1f2329}
.barright{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.legend{font-size:12px;color:#8a9099;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.viewtoggle{display:flex;border:1px solid #dcdfe5;border-radius:8px;overflow:hidden}
.viewtoggle button{border:0!important;border-radius:0!important;background:#fff;padding:5px 12px;font-size:13px;cursor:pointer;color:#646a73;margin:0}
.viewtoggle button.on{background:#1f2329;color:#fff}
/* ---- 卡片视图 ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:14px}
.card{background:#fff;border:1px solid #eceef1;border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:.15s}
.card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.thumb{position:relative;height:148px;background:#f0f1f4 center/cover no-repeat;border-bottom:1px solid #eceef1}
.num{position:absolute;top:6px;left:6px;background:rgba(31,35,41,.82);color:#fff;font-size:11px;font-weight:600;border-radius:6px;padding:1px 7px}
.badges{position:absolute;top:6px;right:6px;display:flex;gap:4px}
.b{font-size:10px;font-weight:600;border-radius:6px;padding:1px 6px;color:#fff}
.body{padding:10px 12px 12px;position:relative}
.body h3{font-size:14px;margin-bottom:1px}
.en{color:#8a9099;font-size:11px;margin-bottom:5px}
.desc{color:#646a73;font-size:12px;line-height:1.45}
.tag{display:inline-block;margin-top:7px;font-size:11px;color:#646a73;background:#f0f1f4;border-radius:5px;padding:1px 7px}
.cardtest{position:absolute;right:10px;bottom:10px;font-size:11px;font-weight:600;color:#3370ff;text-decoration:none;background:#eef3ff;border-radius:6px;padding:2px 8px}
.cardspec{display:inline-block;margin-top:7px;margin-left:6px;font-size:11px;font-weight:600;color:#7c3aed;background:#f3eefe;border-radius:5px;padding:1px 7px;cursor:pointer}
.cardspec:hover{background:#7c3aed;color:#fff}
.cardtest:hover{background:#3370ff;color:#fff}
/* ---- 表格视图 ---- */
.tblwrap{overflow-x:auto;border:1px solid #eceef1;border-radius:12px;background:#fff}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{padding:8px 10px;text-align:left;border-bottom:1px solid #f0f1f4;white-space:nowrap;vertical-align:middle}
.tbl th{background:#fafbfc;font-weight:600;color:#646a73;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
.tbl th.sortable:hover{color:#3370ff}
.tbl th.sorted{color:#3370ff}
.tbl th.sorted::after{content:" ▾"}
.tbl th.sorted.asc::after{content:" ▴"}
.tbl tbody tr:hover{background:#f7f9ff}
.tbl td.cnum{color:#8a9099;font-variant-numeric:tabular-nums}
.tbl td.mod a{color:#1f2329;text-decoration:none;font-weight:600}
.tbl td.mod a:hover{color:#3370ff}
.tbl td.mod .men{color:#8a9099;font-size:11px;font-weight:400;margin-left:6px}
.tbl .tg{font-size:11px;color:#646a73;background:#f0f1f4;border-radius:5px;padding:1px 7px}
.osslink{color:#3370ff;text-decoration:none;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.osslink:hover{text-decoration:underline}
.copyb{margin-left:6px;border:1px solid #dcdfe5;background:#fff;border-radius:5px;cursor:pointer;font-size:11px;padding:0 6px;color:#646a73}
.copyb:hover{background:#3370ff;color:#fff;border-color:#3370ff}
.mut{color:#c0c4cc}
.detlink{color:#3370ff;text-decoration:none;font-weight:600}
.detlink:hover{text-decoration:underline}
.foot{margin-top:26px;color:#8a9099;font-size:12px;text-align:center}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:-1px;margin-right:2px}
.topnav{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
.navlink{flex:none;border:1px solid #dcdfe5;background:#fff;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;color:#1f2329;text-decoration:none;white-space:nowrap}
.navlink:hover{background:#1f2329;color:#fff;border-color:#1f2329}
@media(max-width:640px){.legend{display:none}}
.ghead{grid-column:1/-1;display:flex;align-items:baseline;gap:10px;margin:10px 2px 0;padding-top:4px;border-top:1px solid var(--border-soft,#eef0f3)}
.ghead:first-child{border-top:0;padding-top:0;margin-top:0}
.ghead .gt{font-size:15px;font-weight:700}
.ghead .gd{font-size:12px;color:#8a9099}
.tbl tr.grp td{background:#eef0f3;font-weight:700;font-size:12px;color:#1f2329;padding:8px 14px}
.b.v2{background:#7c3aed}
</style></head><body><div class="wrap">
<div class="topnav"><h1>企业应用示例库 — 50 场景原型</h1><a class="navlink" href="test-report.html">📊 测试中心</a> <a class="navlink" href="runs.html">🌳 历次跑测</a></div>
<div class="sub">按搜索量排序 · 缩略图为原型;徽章为主应用搭建/测试状态(本页即状态真源)· 表格模式含阿里云 OSS 原型链接、可点表头排序 · <span id="upd"></span></div>
<div class="bar" id="filterbar"></div>
<div class="grid" id="grid"></div>
<div class="tblwrap" id="tblwrap" style="display:none"><table class="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
<div class="foot" id="foot"></div>
</div>
<script>
var OSS='https://static-docs.nocobase.com/solution/templates/';
var D={modules:[]};
function boot(D2){D=D2;init();}
function ossUrl(m){return OSS+m.slug+'.html';}
function copyOss(url,btn){
 function done(){var t=btn.textContent;btn.textContent='✓';setTimeout(function(){btn.textContent=t;},900);}
 try{ if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done,fallback);return;} }catch(e){}
 fallback();
 function fallback(){var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);done();}
}
function init(){
document.getElementById('upd').textContent='更新 '+D.updated;
var BUILT={done:["已搭建","#2ea35a"],building:["搭建中","#e6a23c"],todo:["待搭建","#a8adb5"]};
var TEST={r1pass:["R1通过","#2ea35a"],r2pass:["R2通过","#2ea35a"],r1review:["R1待评审","#3370ff"],r3review:["R3待评审","#3370ff"],none:["",""]};
var REVIEW=["r1review","r3review"]; // 待评审状态集合
var BUILTRANK={done:0,building:1,todo:2};
var TESTRANK={r2pass:0,r1pass:1,r1review:2,r3review:3,none:4};
var SPECRANK={none:0,machine:1,human:2,full:3};
var PUBRANK={no:0,oss:1,cms:2};
var SPECMAP={machine:["机器","#3370ff"],human:["人读","#8b5cf6"],full:["✓全","#2ea35a"]};
var PUBMAP={oss:["OSS","#2ea35a"],cms:["CMS","#e6a23c"]};
function stg(m,k){return (m.stages&&m.stages[k])||(k=='published'?'no':'none');}
function sbadge(map,val){var x=map[val];if(!x)return '<span class="mut">—</span>';return '<span class="b" style="background:'+x[1]+'">'+x[0]+'</span>';}
function specCell(m){var v=stg(m,'spec'),x=SPECMAP[v];if(!x)return '<span class="mut">—</span>';
 var bd='<span class="b" style="background:'+x[1]+'">'+x[0]+'</span>';
 return (v=='human'||v=='full')?'<a href="'+m.slug+'.html#spec" target="_blank" rel="noopener" title="查看拆解设计稿" style="text-decoration:none">'+bd+'</a>':bd;}
var filters=[["all","全部"],["done","已搭建"],["building","搭建中"],["todo","待搭建"],["review","待评审"],["pass","已通过"]];
var cur="all";
var VIEW='card'; try{VIEW=localStorage.getItem('applib-view')||'card';}catch(e){}
var sortKey='num',sortAsc=true;
var SERIES=[
 {k:'v2',label:'🧩 轻量方案 V2 · 完整流程 Demo',desc:'一个 HTML 跑完整业务流程'},
 {k:'v1',label:'🎯 轻量方案 V1 · 单场景原型',desc:'每个高频场景一屏'}
];
function seriesOf(m){return m.series||'v1';}
function matches(m){if(m.status=="deprecated")return false;if(seriesOf(m)=='v2')return cur=="all";if(cur=="all")return true;if(cur=="pass")return m.test=="r1pass"||m.test=="r2pass";if(cur=="review")return REVIEW.indexOf(m.test)>=0;return m.built==cur;}
function badge(map,key){var x=map[key];if(!x||!x[0])return '<span class="mut">—</span>';return '<span class="b" style="background:'+x[1]+'">'+x[0]+'</span>';}
function visible(){return D.modules.filter(matches);}

function cardEl(m){
  var a=document.createElement('a');a.className='card';a.href=m.slug+'.html';
  var badges,testlink='';
  if(seriesOf(m)=='v2'){
   badges='<span class="b v2">完整流程</span>';
  }else{
   var bb=BUILT[m.built],tb=TEST[m.test];
   badges='<span class="b" style="background:'+bb[1]+'">'+bb[0]+'</span>';
   if(tb[0])badges+='<span class="b" style="background:'+tb[1]+'">'+tb[0]+'</span>';
   testlink=(m.test&&m.test!=='none')?'<span class="cardtest" onclick="event.stopPropagation();event.preventDefault();location.href=&#39;test-report.html&#39;">测试 →</span>':'';
  }
  var sv=stg(m,'spec');
  var speclink=(sv=='human'||sv=='full')?'<span class="cardspec" title="查看拆解设计稿" onclick="event.stopPropagation();event.preventDefault();window.open(\''+m.slug+'.html#spec\',\'_blank\');">🧩 拆解</span>':'';
  a.innerHTML='<div class="thumb" style="background-image:url(thumbs/'+m.num+'.jpg)"><span class="num">'+m.num+'</span><div class="badges">'+badges+'</div></div>'+
   '<div class="body"><h3>'+m.cn+'</h3><div class="en">'+m.en+'</div><div class="desc">'+m.desc+'</div><span class="tag">'+m.tag+'</span>'+speclink+testlink+'</div>';
  return a;
}
function renderCards(){
 var g=document.getElementById('grid');g.innerHTML='';var vis=visible();
 SERIES.forEach(function(s){
  var ms=vis.filter(function(m){return seriesOf(m)===s.k;});
  if(!ms.length)return;
  var h=document.createElement('div');h.className='ghead';
  h.innerHTML='<span class="gt">'+s.label+'</span><span class="gd">'+s.desc+' · '+ms.length+'</span>';
  g.appendChild(h);
  ms.forEach(function(m){g.appendChild(cardEl(m));});
 });
}

var COLS=[["num","#",1],["cn","模块",1],["tag","部门",1],["oss","阿里云原型(OSS)",0],["built","搭建",1],["test","测试",1],["spec","拆解",1],["pub","发布",1],["det","详情",0]];
function sortVal(m){
 if(sortKey=='num')return parseInt(m.num,10)||0;
 if(sortKey=='cn')return m.cn||'';
 if(sortKey=='tag')return m.tag||'';
 if(sortKey=='built')return BUILTRANK[m.built]==null?9:BUILTRANK[m.built];
 if(sortKey=='test')return TESTRANK[m.test]==null?9:TESTRANK[m.test];
 if(sortKey=='spec')return SPECRANK[stg(m,'spec')]!=null?SPECRANK[stg(m,'spec')]:9;
 if(sortKey=='pub')return PUBRANK[stg(m,'published')]!=null?PUBRANK[stg(m,'published')]:9;
 return 0;
}
function renderTable(){
 var thead=document.getElementById('thead'),tbody=document.getElementById('tbody');
 thead.innerHTML='<tr>'+COLS.map(function(c){
  var cls=c[2]?'sortable':'';if(c[2]&&sortKey==c[0])cls+=' sorted'+(sortAsc?' asc':'');
  return '<th class="'+cls+'"'+(c[2]?' data-k="'+c[0]+'"':'')+'>'+c[1]+'</th>';
 }).join('')+'</tr>';
 [].forEach.call(thead.querySelectorAll('th.sortable'),function(th){
  th.onclick=function(){var k=th.getAttribute('data-k');if(sortKey==k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=true;}renderTable();};
 });
 function rowHtml(m){
  var oss=ossUrl(m);
  var osscell='<a class="osslink" href="'+oss+'" target="_blank" rel="noopener" title="'+oss+'">'+m.slug+'.html</a>'+
              '<button class="copyb" title="复制 OSS 链接" onclick="copyOss(\''+oss+'\',this)">📋</button>';
  var builtcell,testcell,det;
  if(seriesOf(m)=='v2'){
   builtcell='<span class="b v2">完整流程</span>';testcell='<span class="mut">—</span>';
   det='<a class="detlink" href="'+m.slug+'.html" title="打开 demo">打开 →</a>';
  }else{
   builtcell=badge(BUILT,m.built);testcell=badge(TEST,m.test);
   det=(m.test&&m.test!=='none')?'<a class="detlink" href="test-report.html" title="去测试中心">测试 →</a>':'<span class="mut">—</span>';
  }
  return '<tr>'+
   '<td class="cnum">'+m.num+'</td>'+
   '<td class="mod"><a href="'+m.slug+'.html" title="打开本地原型">'+m.cn+'</a><span class="men">'+m.desc+'</span></td>'+
   '<td><span class="tg">'+m.tag+'</span></td>'+
   '<td>'+osscell+'</td>'+
   '<td>'+builtcell+'</td>'+
   '<td>'+testcell+'</td>'+
   '<td>'+specCell(m)+'</td>'+
   '<td>'+sbadge(PUBMAP,stg(m,'published'))+'</td>'+
   '<td>'+det+'</td>'+
  '</tr>';
 }
 var vis=visible(),html='';
 SERIES.forEach(function(s){
  var ms=vis.filter(function(m){return seriesOf(m)===s.k;});
  if(!ms.length)return;
  ms=ms.slice().sort(function(a,b){var x=sortVal(a),y=sortVal(b);var r=x<y?-1:x>y?1:0;return sortAsc?r:-r;});
  html+='<tr class="grp"><td colspan="9">'+s.label+' · '+ms.length+'</td></tr>'+ms.map(rowHtml).join('');
 });
 tbody.innerHTML=html;
}

function render(){
 var card=VIEW==='card';
 document.getElementById('grid').style.display=card?'':'none';
 document.getElementById('tblwrap').style.display=card?'none':'';
 if(card)renderCards();else renderTable();
 var active=D.modules.filter(function(x){return x.status!=='deprecated';}).length;
 document.getElementById('foot').textContent='企业应用示例库 — '+visible().length+' / '+active+' 场景 · 2026-06';
}

var fb=document.getElementById('filterbar');
filters.forEach(function(f){var b=document.createElement('button');b.textContent=f[1];if(f[0]=="all")b.className='on';
 b.onclick=function(){cur=f[0];[].forEach.call(fb.querySelectorAll('button:not(.vt)'),function(x){x.className='';});b.className='on';render();};fb.appendChild(b);});

var right=document.createElement('div');right.className='barright';
var vt=document.createElement('div');vt.className='viewtoggle';
[["card","⊞ 卡片"],["table","☰ 表格"]].forEach(function(v){
 var b=document.createElement('button');b.className='vt'+(VIEW===v[0]?' on':'');b.textContent=v[1];
 b.onclick=function(){VIEW=v[0];try{localStorage.setItem('applib-view',VIEW);}catch(e){}
  [].forEach.call(vt.children,function(x){x.className='vt';});b.className='vt on';render();};
 vt.appendChild(b);
});
right.appendChild(vt);
var lg=document.createElement('div');lg.className='legend';
lg.innerHTML='<span><span class="dot" style="background:#2ea35a"></span>已搭/通过</span><span><span class="dot" style="background:#3370ff"></span>待评审</span><span><span class="dot" style="background:#a8adb5"></span>待搭建</span>';
right.appendChild(lg);
fb.appendChild(right);

render();
}
fetch('library.json').then(function(r){return r.json();}).then(boot).catch(function(e){document.getElementById('grid').innerHTML='<div style="padding:24px;color:#c0392b">library.json 加载失败: '+e+'</div>';});
</script></body></html>
